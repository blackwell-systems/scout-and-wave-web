# Interface Contracts
interface_contracts:
  - name: "CompletionReport.Notes"
    description: |
      New optional string field added to CompletionReport in the Go SDK (scout-and-wave-go).
      Used by fixable failures to surface the agent's suggested fix text, and by escalate
      to surface the escalation reason. Mirrors the existing failure_type field pattern.
    definition: |
      // In pkg/protocol/types.go (scout-and-wave-go repo):
      type CompletionReport struct {
        // ... existing fields ...
        FailureType string `yaml:"failure_type,omitempty" json:"failure_type,omitempty"`
        Notes       string `yaml:"notes,omitempty" json:"notes,omitempty"`  // NEW
        Repo        string `yaml:"repo,omitempty" json:"repo,omitempty"`
      }
    location: "/Users/dayna.blackwell/code/scout-and-wave-go/pkg/protocol/types.go"

  - name: "AgentStatus.notes"
    description: |
      New optional string field on the TypeScript AgentStatus interface, mirroring
      CompletionReport.Notes. Populated from the agent_failed SSE event when the
      backend includes notes in the failure payload.
    definition: |
      // In web/src/types.ts:
      export interface AgentStatus {
        agent: string
        wave: number
        files: string[]
        status: AgentStatusValue
        branch?: string
        failure_type?: string
        notes?: string        // NEW — agent's suggested fix or escalation context
        message?: string
        output?: string
        startedAt?: number
        toolCalls?: ToolCallEntry[]
      }
    location: "/Users/dayna.blackwell/code/scout-and-wave-web/web/src/types.ts"

  - name: "AgentFailedData.notes"
    description: |
      The agent_failed SSE event payload gains an optional notes field, emitted
      by the Go engine when the agent's completion report includes notes.
      useWaveEvents.ts must read this field and store it on AgentStatus.
    definition: |
      // In web/src/types.ts:
      export interface AgentFailedData {
        agent: string
        wave: number
        status: string
        failure_type: string
        notes?: string   // NEW — optional, omitted when empty
        message: string
      }
    location: "/Users/dayna.blackwell/code/scout-and-wave-web/web/src/types.ts"

  - name: "rerunAgent (extended)"
    description: |
      The existing rerunAgent() function in api.ts gains an optional options bag
      to pass a scope_hint for timeout reruns. The backend ignores unknown body
      fields, so this is additive and backward-compatible.
    definition: |
      // In web/src/api.ts:
      export async function rerunAgent(
        slug: string,
        wave: number,
        agentLetter: string,
        opts?: { scopeHint?: string }
      ): Promise<void>
      // Body sent: { wave: number, scope_hint?: string }
    location: "/Users/dayna.blackwell/code/scout-and-wave-web/web/src/api.ts"

  - name: "handleWaveAgentRerun (implemented)"
    description: |
      The stub Go handler is replaced with a real implementation that reads the
      wave number from the request body, locates the agent's task from the IMPL
      manifest, and re-spawns a single-agent wave run. For timeout reruns, an
      optional scope_hint string is prepended to the agent's task prompt.
      The handler publishes agent_started / agent_complete / agent_failed SSE
      events on the slug broker, matching the existing wave runner pattern.
    definition: |
      // POST /api/wave/{slug}/agent/{letter}/rerun
      // Request body: { "wave": int, "scope_hint"?: string }
      // Response: 202 Accepted
      // SSE events published to slug broker: agent_started, agent_complete, agent_failed
      func (s *Server) handleWaveAgentRerun(w http.ResponseWriter, r *http.Request)
    location: "/Users/dayna.blackwell/code/scout-and-wave-web/pkg/api/wave_runner.go"

  - name: "handleScoutRerun"
    description: |
      New route: POST /api/scout/{slug}/rerun. Triggers a fresh Scout run for
      an existing slug. Uses the existing runScoutAgent machinery. Returns 202
      with { run_id } for SSE subscription via GET /api/scout/{runID}/events.
      The Re-Scout button in WaveBoard calls this (currently falls back to
      onRescout prop or rerunAgent; this gives it a dedicated endpoint).
    definition: |
      // POST /api/scout/{slug}/rerun
      // Request body: {} (empty — slug from path, feature description re-read from IMPL doc title)
      // Response: 202 { "run_id": string }
      func (s *Server) handleScoutRerun(w http.ResponseWriter, r *http.Request)
    location: "/Users/dayna.blackwell/code/scout-and-wave-web/pkg/api/scout.go"

