pre_mortem:
  overall_risk: medium
  rows:
    - scenario: |
        Agent B's wiring_validation.go AST walk misses call expressions in
        certain Go syntax patterns (e.g., method calls, goroutine invocations,
        indirect calls through function variables). ValidateWiringDeclarations
        reports false positives (gaps that are not real).
      likelihood: medium
      impact: medium
      mitigation: |
        The bufio grep fallback catches all substring matches. For the AST walk,
        check both ast.CallExpr.Fun as *ast.Ident AND *ast.SelectorExpr.Sel. Add
        a test case specifically for selector-style calls (pkg.Symbol()). Accept
        that false positives may occur for indirect calls — the gap report is
        advisory (does not block merge), so a false positive only creates noise.

    - scenario: |
        prepare-wave CheckWiringOwnership fires on legacy IMPL docs that predate
        the wiring block. All existing IMPLs have empty Wiring slices, so
        CheckWiringOwnership should be a no-op. But if an IMPL doc has a stale
        wiring entry pointing to a file no longer in file_ownership, prepare-wave
        will block on a stale obligation.
      likelihood: low
      impact: high
      mitigation: |
        CheckWiringOwnership only fires when manifest.Wiring is non-empty. For
        legacy IMPLs with empty wiring, it returns no violations. Document clearly
        in the prepare-wave error message that the obligation came from the wiring
        block and name the specific entry, so humans can fix the IMPL doc easily.

    - scenario: |
        Wave 2 Agents E and F depend on Wave 1 Agent B's changes being merged to
        main in scout-and-wave-go. If the scout-and-wave-go dependency in
        scout-and-wave-web's go.mod uses a replace directive pointing to a local
        path, the types are available immediately. If using a published version,
        Agent E/F would need a go get update before building.
      likelihood: medium
      impact: high
      mitigation: |
        This IMPL spans two repos. Verify the go.mod replace directive in
        scout-and-wave-web points to the local scout-and-wave-go path. If not,
        Agent E must run go get github.com/blackwell-systems/scout-and-wave-go@HEAD
        after Wave 1 merges. Document this in Agent E's task (done above).

    - scenario: |
        schema_unknown_keys.go may use a different mechanism to track known keys
        than a simple map. If it uses a different pattern (e.g., a JSON schema
        file), adding "wiring" may require a different approach.
      likelihood: low
      impact: low
      mitigation: |
        Agent B must read schema_unknown_keys.go before implementing. The file is
        small (~50 lines based on the codebase structure). If the mechanism differs
        from a simple map, adapt accordingly. The invariant is that "wiring" must
        not trigger an E16 unknown-key violation after this IMPL merges.

    - scenario: |
        ReviewScreen.tsx PanelKey union type update is missed. If the wiring key
        is added to the panels array but not to the PanelKey union type, the
        TypeScript build fails.
      likelihood: low
      impact: medium
      mitigation: |
        Agent F's task explicitly calls out both the union type and the panels
        array. The verification gate (npm run build) catches this immediately.

    - scenario: |
        finalize_wave.go's WiringReport field addition to FinalizeWaveResult
        conflicts with the FinalizeWaveResult type used in wave_runner.go which
        imports scout-and-wave-go as a dependency. The web app references
        engine.FinalizeWaveResult, not the cmd/saw local struct.
      likelihood: medium
      impact: medium
      mitigation: |
        cmd/saw/finalize_wave.go defines FinalizeWaveResult locally (it's a cmd
        package struct, not exported from pkg/). The engine package wraps this
        separately. Agent D adds WiringReport to the local cmd/saw FinalizeWaveResult.
        Agent G reads engine.FinalizeWaveResult from pkg/engine — check if engine
        package has its own result type. If so, Agent G may need to check a
        different field path. This is called out in Agent G's task as a conditional.
