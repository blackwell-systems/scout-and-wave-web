scaffolds:
  - file_path: pkg/protocol/wiring_types.go
    contents: |
      // WiringDeclaration declares that symbol DefinedIn.Symbol must be called
      // from CallerFile. Written by Scout in the IMPL doc wiring: block.
      // Enforced by prepare-wave pre-flight (Layer 3A) and validate-integration
      // post-merge check (Layer 3B). Injected into agent briefs by prepare-wave
      // (Layer 3C).
      type WiringDeclaration struct {
          Symbol              string `yaml:"symbol" json:"symbol"`
          DefinedIn           string `yaml:"defined_in" json:"defined_in"`
          MustBeCalledFrom    string `yaml:"must_be_called_from" json:"must_be_called_from"`
          Agent               string `yaml:"agent" json:"agent"`
          Wave                int    `yaml:"wave" json:"wave"`
          IntegrationPattern  string `yaml:"integration_pattern,omitempty" json:"integration_pattern,omitempty"`
      }

      // WiringValidationResult is returned by ValidateWiringDeclarations.
      type WiringValidationResult struct {
          Gaps    []WiringGap `json:"gaps" yaml:"gaps"`
          Valid   bool        `json:"valid" yaml:"valid"`
          Summary string      `json:"summary" yaml:"summary"`
      }

      // WiringGap is a single missing wiring: the symbol is declared but not
      // found in MustBeCalledFrom.
      type WiringGap struct {
          Declaration WiringDeclaration `json:"declaration" yaml:"declaration"`
          Reason      string            `json:"reason" yaml:"reason"`
          Severity    string            `json:"severity" yaml:"severity"` // always "error"
      }
    import_path: github.com/blackwell-systems/scout-and-wave-go/pkg/protocol
    status: pending

interface_contracts:
  - name: WiringDeclaration
    description: |
      New top-level struct added to IMPLManifest. Represents a declared wiring
      obligation: symbol X defined in file A must be called from file B.
      Written by Scout in IMPL doc wiring: block, enforced by tooling.
    definition: |
      type WiringDeclaration struct {
          Symbol             string `yaml:"symbol" json:"symbol"`
          DefinedIn          string `yaml:"defined_in" json:"defined_in"`
          MustBeCalledFrom   string `yaml:"must_be_called_from" json:"must_be_called_from"`
          Agent              string `yaml:"agent" json:"agent"`
          Wave               int    `yaml:"wave" json:"wave"`
          IntegrationPattern string `yaml:"integration_pattern,omitempty" json:"integration_pattern,omitempty"`
      }
    location: pkg/protocol/wiring_types.go

  - name: WiringValidationResult
    description: |
      Return type of ValidateWiringDeclarations. Contains gaps (missing wiring),
      a valid boolean, and a summary string. Used by finalize-wave and
      validate-integration to surface wiring errors.
    definition: |
      type WiringValidationResult struct {
          Gaps    []WiringGap `json:"gaps" yaml:"gaps"`
          Valid   bool        `json:"valid" yaml:"valid"`
          Summary string      `json:"summary" yaml:"summary"`
      }

      type WiringGap struct {
          Declaration WiringDeclaration `json:"declaration" yaml:"declaration"`
          Reason      string            `json:"reason" yaml:"reason"`
          Severity    string            `json:"severity" yaml:"severity"`
      }
    location: pkg/protocol/wiring_types.go

  - name: ValidateWiringDeclarations
    description: |
      Core enforcement function. For each WiringDeclaration in the manifest's
      Wiring slice, parses the MustBeCalledFrom file using Go AST (or falls
      back to bufio grep) and checks whether symbol appears as a call expression.
      Returns WiringValidationResult with severity: error for each missing call.
      Called by finalize-wave (post-merge) and validate-integration --wiring.
    definition: |
      func ValidateWiringDeclarations(
          manifest *IMPLManifest,
          repoPath string,
      ) (*WiringValidationResult, error)
    location: pkg/protocol/wiring_validation.go

  - name: CheckWiringOwnership
    description: |
      prepare-wave pre-flight check (Layer 3A). For each WiringDeclaration
      in the current wave, verifies that MustBeCalledFrom is in the owning
      agent's file_ownership. Returns a slice of violation strings (empty = OK).
      A non-empty slice causes prepare-wave to fail with exit 1.
    definition: |
      func CheckWiringOwnership(
          manifest *IMPLManifest,
          waveNum int,
      ) []string
    location: pkg/protocol/wiring_validation.go

  - name: FormatWiringBriefSection
    description: |
      Formats wiring declarations for a specific agent into a markdown section
      suitable for injection into the agent brief (.saw-agent-brief.md).
      Returns empty string if agent has no wiring obligations.
    definition: |
      func FormatWiringBriefSection(
          manifest *IMPLManifest,
          agentID string,
      ) string
    location: pkg/protocol/wiring_validation.go

  - name: IMPLManifest.Wiring field
    description: |
      New slice field on IMPLManifest, added alongside PreMortem, Scaffolds, etc.
      Populated by Scout in the IMPL doc wiring: block. Consumed by prepare-wave,
      finalize-wave, validate-integration, and extract-context.
    definition: |
      // In IMPLManifest:
      Wiring []WiringDeclaration `yaml:"wiring,omitempty" json:"wiring,omitempty"`
    location: pkg/protocol/types.go

  - name: WiringEntry (API type)
    description: |
      Web API representation of a WiringDeclaration, included in IMPLDocResponse
      so the ReviewScreen can display the Wiring panel.
    definition: |
      type WiringEntry struct {
          Symbol             string `json:"symbol"`
          DefinedIn          string `json:"defined_in"`
          MustBeCalledFrom   string `json:"must_be_called_from"`
          Agent              string `json:"agent"`
          Wave               int    `json:"wave"`
          IntegrationPattern string `json:"integration_pattern,omitempty"`
          Status             string `json:"status"` // "declared" | "verified" | "gap"
      }
    location: pkg/api/types.go (scout-and-wave-web)

