waves:
  - number: 1
    agents:
      - id: A
        task: |
          ## Agent A — Protocol Docs: Scout Prompt Rule + Execution Rule

          ### Repos and Files
          - `/Users/dayna.blackwell/code/scout-and-wave/implementations/claude-code/prompts/saw-skill.md`
          - `/Users/dayna.blackwell/code/scout-and-wave/protocol/execution-rules.md`

          ### What to implement

          **1. saw-skill.md — File Ownership Guidance update**

          Locate the Scout phase section that describes file ownership assignment
          (currently around "Assign file ownership and agent IDs" — step 7 in the
          Scout prompt). Add the following rule immediately after the disjoint
          ownership constraint paragraph:

          > **E35: Own the caller too (wiring obligation rule).** When an agent
          > implements function or type X that must be called from an existing
          > aggregation function Y in file Z (e.g., a validator registry, a CLI
          > command registration, a route table), file Z MUST be in that agent's
          > `file_ownership`. The agent who defines X owns the responsibility to
          > wire it in. If no single agent can own both sides (e.g., Z is modified
          > by a different agent in the same wave), create a `wiring:` entry in the
          > IMPL doc and assign the caller file to an integration agent in a later
          > wave.
          >
          > **Wiring declarations:** For every such obligation, write a `wiring:`
          > entry in the IMPL doc:
          > ```yaml
          > wiring:
          >   - symbol: ValidateReactions
          >     defined_in: pkg/protocol/reactions_validation.go
          >     must_be_called_from: pkg/protocol/schema_validation.go
          >     agent: B
          >     wave: 1
          >     integration_pattern: append  # "append" | "register" | "inject" | "call"
          > ```
          > prepare-wave pre-flight will reject if `must_be_called_from` is not in
          > the owning agent's `file_ownership`. validate-integration will grep/AST-
          > parse the caller file post-merge and report severity: error if the call
          > is absent.

          Also update the Integration completeness audit section (step 9 in the Scout
          prompt) to add: "New exported validator/handler/command → wiring: entry
          written and must_be_called_from file in agent ownership?"

          **2. execution-rules.md — E35 rule**

          Add a new rule section after E34:

          ```
          ## E35: Wiring Obligation Declaration

          **Trigger:** Scout identifies that an agent will implement an exported
          symbol (function, type, method) that must be called from an existing
          aggregation point in a file not created by that agent.

          **Rule:** The Scout MUST:
          1. Assign the aggregation file to the implementing agent's file_ownership
             (preferred), OR
          2. Write a wiring: entry in the IMPL doc if assigning to the same agent
             creates a same-wave conflict, and assign the caller to an integration
             agent in a later wave.

          **Wiring declaration schema:**
          ```yaml
          wiring:
            - symbol: <exported function or type name>
              defined_in: <relative path to implementing file>
              must_be_called_from: <relative path to caller/aggregator file>
              agent: <agent ID that owns both sides>
              wave: <wave number>
              integration_pattern: append | register | inject | call
          ```

          **Enforcement:**
          - prepare-wave pre-flight (Layer 3A): fails if must_be_called_from is
            not in the owning agent's file_ownership.
          - validate-integration --wiring (Layer 3B): post-merge grep/AST check
            that symbol actually appears as a call in must_be_called_from. Reports
            severity: error (not info) for declared but missing wiring.
          - Agent brief injection (Layer 3C): prepare-wave injects all wiring
            entries for the agent into .saw-agent-brief.md with explicit instruction.

          **Rationale:** The heuristic export scanner (E25/E26) detects gaps
          reactively post-merge. E35 makes wiring intent explicit and
          machine-checkable before and after execution.
          ```

          ### Tests
          No code tests required — this is documentation only. Verify:
          - E35 section number does not conflict with existing rules (E34 is the
            current last rule; add E35 after it).
          - Both files are syntactically valid markdown.
          - The wiring: YAML block example renders correctly.

          ### Verification gate
          ```
          # Check markdown is not broken (no duplicate E-numbers):
          grep -c "^## E35" /Users/dayna.blackwell/code/scout-and-wave/protocol/execution-rules.md
          # Expected: 1
          grep -c "E35" /Users/dayna.blackwell/code/scout-and-wave/implementations/claude-code/prompts/saw-skill.md
          # Expected: >= 1
          ```

          ### Constraints
          - Do NOT renumber existing E-rules.
          - Do NOT modify any Go source files — this agent owns only .md files.
          - The wiring: YAML example must exactly match the schema defined in
            the interface contracts (WiringDeclaration struct field names).

        files:
          - implementations/claude-code/prompts/saw-skill.md
          - protocol/execution-rules.md

      - id: B
        task: |
          ## Agent B — Go Schema: WiringDeclaration type + ValidateWiringDeclarations

          ### Repos and Files (all in scout-and-wave-go)
          - `pkg/protocol/types.go` — add Wiring field to IMPLManifest
          - `pkg/protocol/wiring_types.go` — scaffold exists; implement full types
          - `pkg/protocol/wiring_validation.go` — new file: core validation logic
          - `pkg/protocol/wiring_validation_test.go` — new file: tests
          - `pkg/protocol/schema_unknown_keys.go` — register "wiring" as known key

          ### What to implement

          **1. pkg/protocol/types.go**

          Add the Wiring field to IMPLManifest (after the existing Scaffolds field):
          ```go
          Wiring []WiringDeclaration `yaml:"wiring,omitempty" json:"wiring,omitempty"`
          ```

          **2. pkg/protocol/wiring_types.go** (scaffold file already committed)

          The scaffold provides the type stubs. Implement the complete types
          exactly matching the interface contracts:
          ```go
          package protocol

          // WiringDeclaration declares that Symbol (defined in DefinedIn) must
          // be called from MustBeCalledFrom. Written by Scout in IMPL doc wiring:
          // block. Enforced by prepare-wave (Layer 3A) and validate-integration
          // (Layer 3B). Injected into agent briefs (Layer 3C).
          type WiringDeclaration struct {
              Symbol             string `yaml:"symbol" json:"symbol"`
              DefinedIn          string `yaml:"defined_in" json:"defined_in"`
              MustBeCalledFrom   string `yaml:"must_be_called_from" json:"must_be_called_from"`
              Agent              string `yaml:"agent" json:"agent"`
              Wave               int    `yaml:"wave" json:"wave"`
              IntegrationPattern string `yaml:"integration_pattern,omitempty" json:"integration_pattern,omitempty"`
          }

          type WiringValidationResult struct {
              Gaps    []WiringGap `json:"gaps" yaml:"gaps"`
              Valid   bool        `json:"valid" yaml:"valid"`
              Summary string      `json:"summary" yaml:"summary"`
          }

          type WiringGap struct {
              Declaration WiringDeclaration `json:"declaration" yaml:"declaration"`
              Reason      string            `json:"reason" yaml:"reason"`
              Severity    string            `json:"severity" yaml:"severity"`
          }
          ```

          **3. pkg/protocol/wiring_validation.go** (new file)

          Implement three functions:

          **ValidateWiringDeclarations(manifest *IMPLManifest, repoPath string) (*WiringValidationResult, error)**

          For each entry in manifest.Wiring:
          - Resolve the absolute path: filepath.Join(repoPath, entry.MustBeCalledFrom)
          - Attempt Go AST parse (go/parser, go/ast). Walk the AST looking for
            *ast.CallExpr where the function name (ast.SelectorExpr.Sel or ast.Ident)
            matches entry.Symbol exactly.
          - If AST parse fails (non-Go file, parse error), fall back to bufio line
            scanner: check if any line contains entry.Symbol as a substring.
          - If symbol not found by either method: append WiringGap{
              Declaration: entry,
              Reason: fmt.Sprintf("symbol %q not found as a call in %s", entry.Symbol, entry.MustBeCalledFrom),
              Severity: "error",
            }
          - Set result.Valid = len(result.Gaps) == 0
          - Set result.Summary = descriptive string

          **CheckWiringOwnership(manifest *IMPLManifest, waveNum int) []string**

          Build a set of files owned by each agent in waveNum (from manifest.FileOwnership
          where fo.Wave == waveNum). For each WiringDeclaration where entry.Wave == waveNum:
          - Find the agent's owned files.
          - If entry.MustBeCalledFrom is NOT in the agent's file set, append:
            fmt.Sprintf("wiring entry for %q: must_be_called_from %q is not in agent %s file_ownership (wave %d)",
              entry.Symbol, entry.MustBeCalledFrom, entry.Agent, waveNum)
          Return the violations slice (empty = OK).

          **FormatWiringBriefSection(manifest *IMPLManifest, agentID string) string**

          Filter manifest.Wiring for entries where entry.Agent == agentID.
          If none, return "".
          Otherwise build a markdown section:
          ```
          ## Wiring Obligations

          The following symbols MUST be wired into their caller files. This is
          declared in the IMPL doc wiring: block and will be checked post-merge
          by validate-integration (severity: error if missing).

          | Symbol | Defined In | Must Be Called From | Pattern |
          |--------|------------|---------------------|---------|
          | FuncName | path/to/impl.go | path/to/caller.go | append |
          ```

          **4. pkg/protocol/schema_unknown_keys.go**

          Find the known-keys set (the map or slice that lists allowed top-level
          YAML keys). Add "wiring" to it so E16 validation does not flag it as
          an unknown key.

          ### Tests (wiring_validation_test.go)

          Write table-driven tests for all three functions:

          TestValidateWiringDeclarations:
          - Case: symbol found as AST call → Valid=true, no gaps
          - Case: symbol not found → Valid=false, gap with severity="error"
          - Case: non-Go file (use a temp .yaml file) → falls back to grep, works
          - Case: empty manifest.Wiring → Valid=true, no gaps
          - Case: file does not exist → returns error or gap

          TestCheckWiringOwnership:
          - Case: must_be_called_from in agent's files → no violations
          - Case: must_be_called_from NOT in agent's files → violation string returned
          - Case: wave mismatch (entry.Wave != checked wave) → entry skipped

          TestFormatWiringBriefSection:
          - Case: agent has wiring obligations → section with table returned
          - Case: agent has no obligations → empty string returned

