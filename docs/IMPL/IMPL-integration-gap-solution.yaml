title: 'Integration Gap Solution: Wiring Declarations, Scout Rule, and Tooling Enforcement'
feature_slug: integration-gap-solution
verdict: SUITABLE
suitability_assessment: |
  The integration gap problem spans three naturally disjoint layers across two repositories:
  (1) the IMPL schema and protocol validation layer in scout-and-wave-go/pkg/protocol/,
  (2) the sawtools command layer (prepare-wave, finalize-wave, validate-integration, extract-context)
      in scout-and-wave-go/cmd/saw/, and
  (3) the web API + UI layer in scout-and-wave-web.

  Additionally, the Scout prompt in scout-and-wave (protocol repo) is a single file
  change handled by Agent A as a standalone protocol-doc task. This is parallel to
  the Go SDK work.

  File decomposition: 12+ files across two repos with cleanly disjoint ownership.
  No two agents touch the same file within a wave.

  Interface discoverability: The WiringDeclaration type and ValidateWiringDeclarations
  function signatures can be fully defined before implementation starts — they flow
  one-way from schema (Agent B) to validation (Agent C) to command layer (Agent D)
  to web (Wave 2 agents). All contracts are stable.

  Parallelization value: Wave 1 has 4 parallel agents. Go build+test cycle is ~30s.
  Average 3-5 files per agent. Tasks involve non-trivial logic (AST-based grep,
  schema field addition, pre-flight validation, brief injection, SSE event emission).
  Clear speedup over sequential.

  Estimated times:
  - Scout phase: ~20 min (dependency mapping across 3 repos)
  - Agent execution: ~55 min (4 agents x ~12 min avg, Wave 1 parallel; ~2 agents
    x 10 min Wave 2; ~10 min Wave 3 integration wiring)
  - Merge and verification: ~10 min
  Total SAW time: ~95 min

  Sequential baseline: ~6 agents x 15 min = ~90 min + overhead = ~110 min
  Time savings: modest speed gain; primary value is coordination artifact and
  ensuring no layer is dropped.

  Pre-implementation check: No prior implementation of wiring: block exists anywhere
  in the codebase. ValidateIntegration currently runs heuristic-only export scanning;
  it does NOT check wiring: declarations (those don't exist yet). prepare-wave has no
  wiring pre-flight. The IMPL schema has no Wiring field. All work is TODO.

