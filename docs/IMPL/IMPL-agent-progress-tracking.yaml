          ```

          ## Interfaces to Call

          None. Agent A has no external dependencies within this wave.

          ## Tests to Write

          1. `TestProgressTracker_Update` - Verify Update() creates new entry and updates existing entry
          2. `TestProgressTracker_Get` - Verify Get() returns correct entry and nil when not found
          3. `TestProgressTracker_GetAll` - Verify GetAll() returns all entries for slug, empty slice when none exist
          4. `TestProgressTracker_Clear` - Verify Clear() removes all entries for slug, leaves other slugs untouched
          5. `TestProgressTracker_PercentDone` - Verify PercentDone calculation: 0 commits = 0%, 2/3 files = 66%, 3/3 files = 100%
          6. `TestProgressTracker_Concurrency` - Verify concurrent Update() and Get() calls don't race (run with `-race`)

          ## Verification Gate

          ```bash
          cd /Users/dayna.blackwell/code/scout-and-wave-web
          go build ./pkg/api/...
          go vet ./pkg/api/...
          go test ./pkg/api/... -run TestProgressTracker -race
          ```

          ## Constraints

          - Must be goroutine-safe: multiple agents emit tool calls concurrently
          - Get() and GetAll() must return copies of AgentProgress, not pointers into the internal map (to prevent external mutation)
          - PercentDone must be clamped to 100 even if commitsMade > len(filesOwned) (edge case: agent makes extra commits)
          - Clear() is called at the start of `handleWaveStart` to reset state for a new run
        files:
          - "pkg/api/progress_tracker.go"
          - "pkg/api/progress_tracker_test.go"

      - id: "B"
        task: |
          ## What to Implement

          Parse `agent_tool_call` SSE events to extract file writes and commands, then emit `agent_progress` SSE events. The parser:
          1. Listens for `agent_tool_call` events (already flowing through the SSE broker)
          2. Parses the `Input` field (JSON string) to detect:
             - `Write` tool calls: extract `file_path` and set `current_action = "Writing <file_path>"`
             - `Bash` tool calls: extract `command` and set `current_action = "Running <first 50 chars of command>"`
          3. Tracks commit count by counting `Bash` tool calls where `command` starts with `"git commit"`
          4. Calls `ProgressTracker.Update()` with the parsed state
          5. Emits `agent_progress` SSE event with the updated progress

          The parser is registered as a middleware in the SSE broker's publish path.

          ## Interfaces to Implement

          Add `AgentProgressPayload` to `pkg/api/types.go`:
          ```go
          // AgentProgressPayload is the Data payload for the "agent_progress" SSE event.
          type AgentProgressPayload struct {
            Agent         string `json:"agent"`
            Wave          int    `json:"wave"`
            CurrentFile   string `json:"current_file"`
            CurrentAction string `json:"current_action"`
            PercentDone   int    `json:"percent_done"`
          }
          ```

          Implement progress parser in `pkg/api/progress_parser.go`:
          ```go
          package api

