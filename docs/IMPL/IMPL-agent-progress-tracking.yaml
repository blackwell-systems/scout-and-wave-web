      - id: "C"
        task: |
          ## What to Implement

          Implement `GET /api/wave/{slug}/status` endpoint that returns progress for all agents in the currently-running wave. The endpoint:
          1. Extracts `slug` from the URL path
          2. Calls `ProgressTracker.GetAll(slug)` to retrieve all agent progress entries
          3. Returns them as `WaveStatusResponse` JSON

          ## Interfaces to Implement

          Add `WaveStatusResponse` to `pkg/api/types.go`:
          ```go
          // WaveStatusResponse is the JSON body for GET /api/wave/{slug}/status.
          type WaveStatusResponse struct {
            Slug   string           `json:"slug"`
            Agents []*AgentProgress `json:"agents"`
          }
          ```

          Implement handler in `pkg/api/progress_status_handler.go`:
          ```go
          package api

          import (
            "encoding/json"
            "net/http"
          )

          // handleWaveStatus serves GET /api/wave/{slug}/status.
          // Returns progress for all agents in the currently-running wave.
          func (s *Server) handleWaveStatus(w http.ResponseWriter, r *http.Request) {
            slug := r.PathValue("slug")
            if slug == "" {
              http.Error(w, "missing slug", http.StatusBadRequest)
              return
            }

            agents := s.progressTracker.GetAll(slug)

            resp := WaveStatusResponse{
              Slug:   slug,
              Agents: agents,
            }

            w.Header().Set("Content-Type", "application/json")
            json.NewEncoder(w).Encode(resp) //nolint:errcheck
          }
          ```

          Wire the handler in `pkg/api/server.go` `New()` function:
          ```go
          // After line 56 (after mux.HandleFunc("GET /api/wave/{slug}/events", s.handleWaveEvents))
          mux.HandleFunc("GET /api/wave/{slug}/status", s.handleWaveStatus)
          ```

          Initialize `progressTracker` field in `Server` struct in `pkg/api/server.go`:
          ```go
          // In Server struct (after broker field, around line 20):
          progressTracker *ProgressTracker

          // In New() function, after broker initialization (around line 40):
          progressTracker: NewProgressTracker(),
          ```

          Clear progress state at wave start in `pkg/api/wave_runner.go` `handleWaveStart()`:
          ```go
          // After line 42 (after s.stages.Clear(slug))
          s.progressTracker.Clear(slug)
          ```

          ## Interfaces to Call

          - `ProgressTracker.GetAll(slug)` (from Agent A)

          ## Tests to Write

          1. `TestHandleWaveStatus_EmptySlug` - Verify 400 Bad Request when slug is missing
          2. `TestHandleWaveStatus_NoAgents` - Verify empty agents array when no progress entries exist
          3. `TestHandleWaveStatus_MultipleAgents` - Verify all agents for slug are returned, agents from other slugs are excluded

          ## Verification Gate

          ```bash
          cd /Users/dayna.blackwell/code/scout-and-wave-web
          go build ./pkg/api/...
          go vet ./pkg/api/...
          go test ./pkg/api/... -run TestHandleWaveStatus
          ```

          ## Constraints

          - Must handle missing slug gracefully (400 Bad Request)
          - Must return empty array when no agents are running (not null)
          - Must not return progress for other slugs (GetAll must filter by slug prefix)
          - Response must use `json:"agents"` field name (lowercase) to match TypeScript client conventions
        files:
          - "pkg/api/progress_status_handler.go"
          - "pkg/api/server.go"
        dependencies:
          - "A"

# Pre-Mortem
pre_mortem:
  overall_risk: "low"
  rows:
    - scenario: "Agent B's JSON parsing fails on malformed tool call Input fields"
      likelihood: "low"
      impact: "low"
      mitigation: "Wrap json.Unmarshal in recover() block; skip events with parse errors; log to stderr"
    - scenario: "Race condition between ParseAndEmitProgress and ProgressTracker.Update"
      likelihood: "low"
      impact: "medium"
      mitigation: "ProgressTracker uses sync.RWMutex; all methods acquire locks; verify with -race flag"
    - scenario: "commitsMade counter drifts if agent is rerun mid-wave"
      likelihood: "medium"
      impact: "low"
      mitigation: "Clear() is called at wave start; counter resets; UI shows 'rerun in progress' indicator"

