          - Current action (e.g., "Writing pkg/api/foo.go", "Running go test")
          - Files owned by the agent (from IMPL doc file ownership table)
          - Number of commits made (used to calculate percent done)
          - Percent done (commits made / files owned)

          ## Interfaces to Implement

