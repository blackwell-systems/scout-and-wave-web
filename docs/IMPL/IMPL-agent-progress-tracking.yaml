            //    - If ToolName == "Write": extract "file_path" from Input JSON
            //    - If ToolName == "Bash": extract "command" from Input JSON
            // 5. Build currentFile and currentAction strings
            // 6. If command starts with "git commit", increment commitsMade counter (stored per agent in a map)
            // 7. Get filesOwned from IMPL doc (call engine.ParseIMPLDoc + find agent in wave)
            // 8. Call s.progressTracker.Update(slug, wave, agent, filesOwned, currentFile, currentAction, commitsMade)
            // 9. Retrieve updated progress: progress := s.progressTracker.Get(slug, wave, agent)
            // 10. Emit agent_progress SSE event:
            //     s.broker.Publish(slug, SSEEvent{
            //         Event: "agent_progress",
            //         Data: AgentProgressPayload{
            //             Agent:         progress.Agent,
            //             Wave:          progress.Wave,
            //             CurrentFile:   progress.CurrentFile,
            //             CurrentAction: progress.CurrentAction,
            //             PercentDone:   progress.PercentDone,
            //         },
            //     })
          }
          ```

          Hook the parser into the SSE broker by modifying `handleWaveEvents` in `pkg/api/wave.go`:
          ```go
          // In handleWaveEvents, after line 78 (after fmt.Fprintf):
          if ev.Event == "agent_tool_call" {
            s.ParseAndEmitProgress(ev, slug)
          }
          ```

          ## Interfaces to Call

          - `ProgressTracker.Update(slug, wave, agent, filesOwned, currentFile, currentAction, commitsMade)` (from Agent A)
          - `ProgressTracker.Get(slug, wave, agent)` (from Agent A)
          - `sseBroker.Publish(slug, SSEEvent)` (existing)
          - `engine.ParseIMPLDoc(implPath)` (existing, to get filesOwned list)

          ## Tests to Write

          1. `TestParseAndEmitProgress_WriteTool` - Verify Write tool call emits progress with correct file_path
          2. `TestParseAndEmitProgress_BashTool` - Verify Bash tool call emits progress with command snippet
          3. `TestParseAndEmitProgress_GitCommit` - Verify "git commit" command increments commitsMade counter
          4. `TestParseAndEmitProgress_IgnoreResults` - Verify IsResult=true events are skipped
          5. `TestParseAndEmitProgress_PercentDone` - Verify PercentDone calculation: 1 commit / 2 files = 50%

          ## Verification Gate

          ```bash
          cd /Users/dayna.blackwell/code/scout-and-wave-web
          go build ./pkg/api/...
          go vet ./pkg/api/...
          go test ./pkg/api/... -run TestParseAndEmitProgress
          ```

          ## Constraints

          - Only parse tool invocations (IsResult=false), not results (IsResult=true)
          - Input field is a JSON string; must unmarshal it to extract tool parameters
          - Command snippets must be truncated to 50 chars max to avoid bloating SSE payloads
          - filesOwned list comes from the IMPL doc's file ownership table; cache per agent to avoid re-parsing on every tool call
          - commitsMade counter must be stored per "slug/wave/agent" key (use a separate map, not in ProgressTracker)
        files:
