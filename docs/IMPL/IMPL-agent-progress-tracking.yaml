state: "SCOUT_PENDING"

# Suitability Assessment
# ----------------------
# Verdict: SUITABLE
#
# Rationale:
# 1. File decomposition: Work decomposes into 3 agents with disjoint file ownership:
#    - Agent A: progress tracker (new file `pkg/api/progress_tracker.go`)
#    - Agent B: SSE event parser and progress events (new file `pkg/api/progress_parser.go`)
#    - Agent C: `/api/wave/{slug}/status` endpoint (modifies `pkg/api/server.go`, new handler file)
#
# 2. Investigation-first items: None. The `agent_tool_call` SSE event schema is already defined in
#    `pkg/orchestrator/events.go` and flows through the existing SSE broker. No investigation needed.
#
# 3. Interface discoverability: All cross-agent interfaces can be defined before implementation:
#    - Agent A defines `ProgressTracker` type and methods
#    - Agent B consumes `ProgressTracker` to emit `agent_progress` events
#    - Agent C reads from `ProgressTracker` to serve status endpoint
#
# 4. Pre-implementation status: All items are TO-DO. No existing progress tracking exists in the codebase.
#
# 5. Parallelization value check: High value. Agents are independent (single wave), and each involves non-trivial logic:
#    - Agent A: State management for multiple concurrent agents
#    - Agent B: Parsing JSON from `agent_tool_call.Input` field, detecting file writes/commands
#    - Agent C: HTTP handler + JSON serialization
#
# Estimated times:
# - Scout phase: ~8 min (dependency mapping, interface contracts, IMPL doc)
# - Agent execution: ~15 min (3 agents × 5 min avg, fully parallel)
# - Merge & verification: ~3 min
# Total SAW time: ~26 min
#
# Sequential baseline: ~22 min (3 agents × 7 min avg sequential time with context switches)
# Time savings: Marginal speedup, but high coordination value (interface contracts prevent API drift).
#
# Recommendation: Proceed. The IMPL doc provides interface contracts and ownership clarity that prevent rework even if parallelization savings are modest.

# Quality Gates
