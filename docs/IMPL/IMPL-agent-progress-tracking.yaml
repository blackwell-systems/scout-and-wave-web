  level: "standard"
  gates:
    - type: "build"
      command: "go build ./..."
      required: true
    - type: "test"
      command: "go test ./pkg/api/..."
      required: true
    - type: "lint"
      command: "go vet ./..."
      required: false
      description: "Check for common Go mistakes"

# Scaffolds
# No scaffolds needed - agents have independent type ownership. Agent A defines `ProgressTracker`,
# Agent B defines `AgentProgressPayload`, Agent C imports both.

# Interface Contracts
interface_contracts:
  - name: "ProgressTracker"
    description: "Goroutine-safe in-memory store tracking per-agent progress during wave execution."
    definition: |
      package api

      import "sync"

      // ProgressTracker tracks per-agent progress during wave execution.
      type ProgressTracker struct {
        mu      sync.RWMutex
        entries map[string]*AgentProgress // key: "slug/wave/agent"
      }

      // AgentProgress represents the current state of an agent's execution.
      type AgentProgress struct {
        Agent         string   `json:"agent"`
        Wave          int      `json:"wave"`
        CurrentFile   string   `json:"current_file"`
        CurrentAction string   `json:"current_action"`
        FilesOwned    []string `json:"files_owned"`
        CommitsMade   int      `json:"commits_made"`
        PercentDone   int      `json:"percent_done"` // 0-100, based on commits_made / len(files_owned)
      }

      func NewProgressTracker() *ProgressTracker
      func (pt *ProgressTracker) Update(slug string, wave int, agent string, filesOwned []string, currentFile string, currentAction string, commitsMade int)
      func (pt *ProgressTracker) Get(slug string, wave int, agent string) *AgentProgress
      func (pt *ProgressTracker) GetAll(slug string) []*AgentProgress
      func (pt *ProgressTracker) Clear(slug string)
    location: "pkg/api/progress_tracker.go"

  - name: "AgentProgressPayload"
    description: "SSE event payload emitted when agent progress updates."
    definition: |
      package api

      // AgentProgressPayload is the Data payload for the "agent_progress" SSE event.
      type AgentProgressPayload struct {
        Agent         string `json:"agent"`
        Wave          int    `json:"wave"`
        CurrentFile   string `json:"current_file"`
        CurrentAction string `json:"current_action"`
        PercentDone   int    `json:"percent_done"`
      }
    location: "pkg/api/types.go"

  - name: "WaveStatusResponse"
    description: "JSON response body for `GET /api/wave/{slug}/status`."
    definition: |
      package api

      // WaveStatusResponse is the JSON body for GET /api/wave/{slug}/status.
      type WaveStatusResponse struct {
        Slug   string           `json:"slug"`
        Agents []*AgentProgress `json:"agents"`
      }
    location: "pkg/api/types.go"

