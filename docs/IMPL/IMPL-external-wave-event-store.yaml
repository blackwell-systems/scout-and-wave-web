interface_contracts:
  - name: "SlugEntry"
    description: |
      Internal per-slug state held by the singleton store. Not exported to
      consumers — used only inside waveEventStore.ts.
    definition: |
      interface SlugEntry {
        state: AppWaveState
        eventSource: EventSource | null
        refCount: number
        listeners: Set<() => void>
        seeded: boolean
      }
    location: "web/src/stores/waveEventStore.ts"

  - name: "getSnapshot"
    description: |
      Returns the current AppWaveState for a given slug. Called by
      useSyncExternalStore as the getSnapshot argument. Returns initialWaveState
      if no entry exists for the slug. Must return a referentially stable object
      (same reference if state has not changed) to avoid infinite re-renders.
    definition: |
      export function getSnapshot(slug: string): AppWaveState
    location: "web/src/stores/waveEventStore.ts"

  - name: "subscribe"
    description: |
      Subscribes a React component to state changes for a given slug. On first
      subscriber (refCount 0 -> 1): opens the EventSource SSE connection and
      runs disk seeding via fetchDiskWaveStatus. On last unsubscribe (refCount
      1 -> 0): closes the EventSource but RETAINS state in the Map so remounts
      get cached state. Returns an unsubscribe function compatible with
      useSyncExternalStore's subscribe signature.
    definition: |
      export function subscribe(slug: string, listener: () => void): () => void
    location: "web/src/stores/waveEventStore.ts"

  - name: "dispatch"
    description: |
      Dispatches a WaveAction to the store for a given slug. Runs the existing
      waveEventsReducer, replaces the entry's state, and notifies all listeners.
      Used internally by SSE event handlers. Not called by React components directly.
    definition: |
      export function dispatch(slug: string, action: WaveAction): void
    location: "web/src/stores/waveEventStore.ts"

  - name: "resetStore"
    description: |
      Test-only function that clears all entries from the store Map and closes
      any open EventSources. Exported for use in test afterEach cleanup.
    definition: |
      export function resetStore(): void
    location: "web/src/stores/waveEventStore.ts"

