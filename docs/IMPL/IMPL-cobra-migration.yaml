          - cmd/saw/merge_cmd_test.go
          - cmd/saw/merge_wave_test.go
        dependencies: []

      - id: D
        task: |
          ## What to Implement
          Refactor check-conflicts, freeze-check, mark-complete, run-gates,
          validate-scaffolds, and update-agent-prompt commands to cobra.

          ## Specific Commands

          **check_conflicts.go**: Convert `runCheckConflicts` to `newCheckConflictsCmd`.
          Positional arg: manifest-path (cobra.ExactArgs(1)).

          **freeze_check.go**: Convert `runFreezeCheck` to `newFreezeCheckCmd`.
