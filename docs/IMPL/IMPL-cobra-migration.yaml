                  newDetectScaffoldsCmd(),
                  newExtractCommandsCmd(),
              )
              if err := rootCmd.Execute(); err != nil {
                  os.Exit(1)
              }
          }
          ```

          Remove `printUsage` function entirely — cobra generates help automatically.

          ## go.mod
          Run `go get github.com/spf13/cobra` to add the dependency, then `go mod tidy`.

          ## Tests to Update
          The `TestPrintUsage` and `TestPrintUsage_IncludesMerge` tests in commands_test.go
