# Waves
waves:
  - number: 1
    agents:
      - id: A
        task: |
          ## What to Implement
          Refactor the serve, wave, status, scout, and scaffold commands from
          `runXxx(args []string) error` with `flag.NewFlagSet` to cobra `newXxxCmd() *cobra.Command`
          constructors. Preserve ALL existing behavior exactly.

          ## Pattern to Follow
          For each command, convert from this pattern:
          ```go
          func runServe(args []string) error {
              fs := flag.NewFlagSet("serve", flag.ContinueOnError)
              addr := fs.String("addr", "localhost:7432", "Listen address")
              if err := fs.Parse(args); err != nil { ... }
              // ... body ...
          }
          ```
          To this cobra pattern:
          ```go
          func newServeCmd() *cobra.Command {
              var addr string
              cmd := &cobra.Command{
                  Use:   "serve",
                  Short: "Start a local HTTP server for reviewing IMPL docs",
                  RunE: func(cmd *cobra.Command, args []string) error {
                      // ... body using addr variable ...
                  },
              }
              cmd.Flags().StringVar(&addr, "addr", "localhost:7432", "Listen address")
              return cmd
          }
          ```

          ## Specific Commands to Convert

          **serve_cmd.go**: Convert `runServe` to `newServeCmd`. Flags: --addr, --impl-dir, --repo, --no-browser.
          Keep `openBrowser` as a standalone helper function.

          **commands.go**: Convert `runWave` to `newWaveCmd`, `runStatus` to `newStatusCmd`,
          `runScout` to `newScoutCmd`, `runScaffold` to `newScaffoldCmd`.
          Keep helper functions (`findRepoRoot`, `slugify`, `locatePromptFile`) and
          the `waveOrchestrator` interface + `engineOrchAdapter` struct unchanged.
          Keep `orchestratorNewFunc` var for test seam.
          Flags for wave: --impl (required, use MarkFlagRequired), --wave (default 1), --auto.
          Flags for status: --impl (required), --json, --missing.
          Flags for scout: --feature (required), --impl, --repo, --backend.
          Flags for scaffold: --impl (required), --repo, --backend.

          ## Tests to Update
          Update tests in commands_test.go, wave_cmd_test.go, serve_cmd_test.go,
          and wave_loop_test.go. Tests currently call `runXxx([]string{...})` directly.
          After migration, tests should call the cobra command's `Execute()` method or
          continue calling the RunE function directly. Preserve all test semantics.

          For tests that check flag parsing errors, use `cmd.SetArgs(args)` then `cmd.Execute()`.
          For tests using `orchestratorNewFunc` seam, that pattern stays the same.

          ## Verification Gate
          ```bash
          go build ./cmd/saw/
          go vet ./cmd/saw/...
          go test ./cmd/saw/ -run "TestRunWave|TestRunStatus|TestRunServe|TestRunScout|TestRunScaffold|TestPrintUsage|TestFindRepoRoot|TestLocatePromptFile"
          ```

          ## Constraints
          - Do NOT remove `findRepoRoot`, `slugify`, `locatePromptFile`, `splitComma` helpers
          - Do NOT remove `waveOrchestrator` interface or `engineOrchAdapter`
          - Do NOT remove `orchestratorNewFunc` var — tests depend on it
          - Preserve the `flag.ErrHelp` return-nil behavior (cobra handles help automatically, so remove those checks)
          - Keep `openBrowser` function in serve_cmd.go
          - Import `"github.com/spf13/cobra"` in each file that defines commands
          - The `version` var stays in main.go (Agent F handles it)
          - Do NOT modify main.go — Agent F owns it
        files:
          - cmd/saw/serve_cmd.go
          - cmd/saw/commands.go
          - cmd/saw/commands_test.go
          - cmd/saw/serve_cmd_test.go
          - cmd/saw/wave_cmd_test.go
          - cmd/saw/wave_loop_test.go
        dependencies: []

      - id: B
        task: |
          ## What to Implement
          Refactor validate, render, extract-context, and set-completion commands from
          `runXxx(args []string) error` with `flag.NewFlagSet` to cobra `newXxxCmd() *cobra.Command`.

          ## Pattern to Follow
          Same cobra pattern as Agent A. For commands that take positional args
          (validate, render take manifest-path as positional), use `cobra.ExactArgs(1)`
          or `cobra.MinimumNArgs(N)` in the Args field. For set-completion which
          takes `<manifest-path> <agent-id>`, use `cobra.ExactArgs(2)`.

          ## Specific Commands

          **validate.go**: Convert `runValidate` to `newValidateCmd`.
          Positional arg: manifest-path (use cobra.ExactArgs(1), access via args[0]).
          Flag: --fix (bool).

          **render.go**: Convert `runRender` to `newRenderCmd`.
          Positional arg: manifest-path (cobra.ExactArgs(1)).
          Keep `renderMarkdown` helper function unchanged.

          **extract.go**: Convert `runExtractContext` to `newExtractContextCmd`.
          Flags: --impl (required), --agent (required). Use cmd.MarkFlagRequired.

          **completion.go**: Convert `runSetCompletion` to `newSetCompletionCmd`.
          Positional args: manifest-path, agent-id (cobra.ExactArgs(2)).
          Reads YAML from stdin — that logic stays the same.

          ## Tests to Update
          Update validate_test.go, render_test.go, extract_test.go, completion_test.go.
          Tests calling `runXxx([]string{...})` should call the cobra command's Execute()
          or call RunE directly. For tests that check "missing argument" errors, cobra's
          Args validation handles this automatically — test via cmd.SetArgs + Execute.

          ## Verification Gate
          ```bash
          go build ./cmd/saw/
          go vet ./cmd/saw/...
          go test ./cmd/saw/ -run "TestValidate|TestRender|TestExtractContext|TestRunSetCompletion"
          ```

          ## Constraints
          - Keep `renderMarkdown` helper in render.go
          - Keep `contains` and `containsHelper` in validate_test.go
          - Do NOT modify main.go
          - Import `"github.com/spf13/cobra"`
        files:
          - cmd/saw/validate.go
          - cmd/saw/render.go
          - cmd/saw/extract.go
          - cmd/saw/completion.go
          - cmd/saw/validate_test.go
          - cmd/saw/render_test.go
          - cmd/saw/extract_test.go
          - cmd/saw/completion_test.go
        dependencies: []

