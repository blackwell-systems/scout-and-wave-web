          - Keep `runMergeWaveNoExit` in merge_wave_test.go (tests need it for os.Exit avoidance)
          - Do NOT modify main.go
          - Import `"github.com/spf13/cobra"`
        files:
          - cmd/saw/merge_cmd.go
