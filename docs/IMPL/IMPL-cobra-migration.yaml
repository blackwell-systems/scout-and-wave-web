# IMPL: cobra-migration
title: "Migrate CLI from flag.FlagSet to Cobra"
feature_slug: cobra-migration
verdict: SUITABLE
test_command: "go test ./cmd/saw/..."
lint_command: "go vet ./..."
state: SCOUT_PENDING

# Suitability Assessment
# ----------------------
# Verdict: SUITABLE
#
# 1. File decomposition: YES — 22 command files in cmd/saw/ can be split across
#    agents with disjoint ownership. main.go is the integration point (root command
#    wiring) and belongs to a dedicated agent. go.mod is orchestrator-owned
#    (cobra dependency addition applied before Wave 1).
#
# 2. Investigation-first: NO — This is a straightforward mechanical refactor.
#    The SDK repo already uses cobra successfully, providing a proven pattern.
#
# 3. Interface discoverability: YES — Each command's cobra.Command constructor
#    (newXxxCmd) returns *cobra.Command. The root command wires them via AddCommand.
#    Signatures are fully known before implementation starts.
#
# 4. Pre-implementation status check:
#    Total items: 22 commands + main.go + go.mod
#    Already implemented (DONE): 0 (no cobra usage exists in web binary)
#    Partially implemented (PARTIAL): 0
#    Not implemented (TO-DO): 24 items
#
# 5. Parallelization value: HIGH — 22 command files are fully independent
#    refactors. Build/test cycle is moderate (~15s). Each agent touches 1-3 files.
#    All command agents run in Wave 1 (fully parallel), only root wiring in Wave 2.
#
# Estimated times:
# - Scout phase: ~8 min
# - Agent execution: ~15 min (5 agents x 10 min avg, all Wave 1 parallel + 1 Wave 2)
# - Merge & verification: ~5 min
# Total SAW time: ~28 min
#
# Sequential baseline: ~60 min (6 agents x 10 min sequential)
# Time savings: ~32 min (~53% faster)
# Recommendation: Clear speedup. Proceed.

# Quality Gates
