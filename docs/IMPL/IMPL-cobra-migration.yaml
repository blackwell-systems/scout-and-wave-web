          **update_prompt.go**: Convert `runUpdateAgentPrompt` to `newUpdateAgentPromptCmd`.
          Positional arg: manifest-path (cobra.ExactArgs(1)).
          Flag: --agent (required). Reads from stdin.

          ## Verification Gate
          ```bash
          go build ./cmd/saw/
          go vet ./cmd/saw/...
          go test ./cmd/saw/ -run "TestCheckConflicts|TestFreezeCheck|TestMarkComplete|TestRunGates|TestValidateScaffolds|TestUpdateAgentPrompt" -count=1
          ```

          ## Constraints
          - These files have no existing tests; do NOT add new tests unless a test file already exists
          - Do NOT modify main.go
          - Import `"github.com/spf13/cobra"`
        files:
          - cmd/saw/check_conflicts.go
