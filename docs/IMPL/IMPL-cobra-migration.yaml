  level: standard
  gates:
    - type: build
      command: "go build ./cmd/saw/"
      required: true
    - type: test
      command: "go test ./cmd/saw/..."
      required: true
    - type: lint
      command: "go vet ./cmd/saw/..."
      required: false
      description: "Check for common Go mistakes"

# Scaffolds
scaffolds:
  - file_path: cmd/saw/root.go
    contents: |
      package main

      import "github.com/spf13/cobra"

      // repoDir is the repository root directory, bound via --repo-dir persistent flag.
      var repoDir string

      func newRootCmd() *cobra.Command {
          cmd := &cobra.Command{
              Use:     "saw",
              Short:   "SAW Orchestration CLI with embedded web UI",
              Version: version,
          }
          cmd.PersistentFlags().StringVar(&repoDir, "repo-dir", ".", "Repository root directory")
          return cmd
      }
    import_path: "github.com/blackwell-systems/scout-and-wave-web/cmd/saw"
    status: pending

