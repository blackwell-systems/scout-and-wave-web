      - id: E
        task: |
          ## What to Implement
          Refactor analyze-deps, analyze-suitability, detect-cascades,
          detect-scaffolds, and extract-commands commands to cobra.

          ## Specific Commands

          **analyze_deps.go**: Convert `runAnalyzeDeps` to `newAnalyzeDepsCmd`.
          Positional arg: repo-root (cobra.ExactArgs(1)).
          Flag: --target (comma-separated file list).
          Keep `splitComma` helper function.

          **analyze_suitability.go**: Convert `runAnalyzeSuitability` to `newAnalyzeSuitabilityCmd`.
          Positional args: requirements-file, repo-root (cobra.ExactArgs(2)).
          Keep `parseRequirements` helper function.

