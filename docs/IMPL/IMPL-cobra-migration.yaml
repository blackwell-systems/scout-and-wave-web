        task: |
          ## What to Implement
          Create the root cobra.Command in root.go and rewrite main.go to use it.
          Also add `github.com/spf13/cobra` to go.mod.

          ## root.go (new file)
          Create `cmd/saw/root.go` containing `newRootCmd() *cobra.Command`:
          ```go
          package main

          import "github.com/spf13/cobra"

          var repoDir string

          func newRootCmd() *cobra.Command {
              cmd := &cobra.Command{
                  Use:     "saw",
                  Short:   "SAW Orchestration CLI with embedded web UI",
                  Version: version,
              }
              cmd.PersistentFlags().StringVar(&repoDir, "repo-dir", ".", "Repository root directory")
              return cmd
          }
          ```

          ## main.go (rewrite)
          Replace the switch-case dispatch with cobra root command wiring:
          ```go
          package main

          import (
              "fmt"
              "os"
          )

          var version = "dev"

          func main() {
              rootCmd := newRootCmd()
              rootCmd.AddCommand(
                  newServeCmd(),
                  newWaveCmd(),
                  newStatusCmd(),
                  newScoutCmd(),
                  newScaffoldCmd(),
                  newValidateCmd(),
                  newMergeCmd(),
                  newMergeWaveCmd(),
                  newCurrentWaveCmd(),
                  newRenderCmd(),
                  newExtractContextCmd(),
                  newSetCompletionCmd(),
                  newCheckConflictsCmd(),
                  newFreezeCheckCmd(),
