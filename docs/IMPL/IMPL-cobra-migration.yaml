          ```bash
          go get github.com/spf13/cobra && go mod tidy
          go build ./cmd/saw/
          go vet ./cmd/saw/...
          go test ./cmd/saw/...
          ```

          ## Constraints
          - The `version` var MUST stay in main.go (set via ldflags at build time)
          - All 22 newXxxCmd() functions must be wired via AddCommand — miss none
          - Run go mod tidy after adding cobra
          - Verify `./saw --version` prints the version
          - Verify `./saw --help` lists all subcommands
          - Verify `./saw serve --help` shows serve-specific flags
        files:
          - cmd/saw/root.go
          - cmd/saw/main.go
        dependencies:
          - A
          - B
          - C
          - D
          - E

# Pre-Mortem
pre_mortem:
  overall_risk: medium
  rows:
    - scenario: "Tests call runXxx() directly but function signatures change"
      likelihood: medium
      impact: medium
      mitigation: |
        Agent A owns the test files alongside the command files.
        Tests should call cmd.Execute() or the RunE closure directly.
        wave_loop_test.go uses orchestratorNewFunc seam which stays unchanged.
    - scenario: "os.Exit(1) calls in RunE closures cause test process termination"
      likelihood: medium
      impact: high
      mitigation: |
        Commands like check-conflicts, freeze-check, run-gates, merge-wave, validate
        currently call os.Exit(1). These must be converted to return a sentinel error
        or use cobra's SilenceErrors + exit in main. Agents must replace os.Exit(1)
        with returning a non-nil error from RunE, and let cobra handle the exit.
    - scenario: "Merge conflicts in commands_test.go which is large and shared"
      likelihood: low
      impact: medium
      mitigation: |
        commands_test.go is assigned entirely to Agent A. No other agent touches it.
        The printUsage tests will be removed/converted by Agent A since printUsage
        is removed by Agent F.
    - scenario: "go.mod cobra dependency not available in agent worktrees"
      likelihood: medium
      impact: high
      mitigation: |
        The scaffold step must add cobra to go.mod before Wave 1 launches.
        Alternatively, each agent can run `go get github.com/spf13/cobra` in
        their worktree. Agent F in Wave 2 runs go mod tidy as final cleanup.

# Known Issues
known_issues:
  - title: "os.Exit calls in command handlers"
    description: |
      Several commands (check-conflicts, freeze-check, run-gates, merge-wave, validate)
      call os.Exit(1) directly inside what will become RunE closures. Cobra expects RunE
      to return errors, not exit the process. Each agent converting these commands MUST
      replace os.Exit(1) with returning a custom error, and the root command should handle
      exit codes.
    status: "Must be addressed during migration"
    workaround: |
      Return a sentinel error type (e.g., ExitError{Code: 1}) from RunE. In main.go,
      check for this error type after rootCmd.Execute() and call os.Exit with the code.
      Example: type ExitError struct{ Code int }; func (e ExitError) Error() string { ... }

