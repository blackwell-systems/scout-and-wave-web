  - ✅ Frontend components: ProgramBoard.tsx, ProgramContractsPanel.tsx, ProgramDependencyGraph.tsx
  - ✅ API layer: programApi.ts (6 functions), types/program.ts (5 types)
  - ✅ All tests passing: go test ./pkg/api/ -run TestProgram, npm run build

  **Missing integration (NOT suitable for SAW):**

  1. Backend route registration in server.go (7 lines):
     - GET /api/programs                            → handleListPrograms
     - GET /api/program/{slug}                      → handleGetProgramStatus
     - GET /api/program/{slug}/tier/{n}             → handleGetTierStatus
     - POST /api/program/{slug}/tier/{n}/execute    → handleExecuteTier
     - GET /api/program/{slug}/contracts            → handleGetProgramContracts
     - POST /api/program/{slug}/replan              → handleReplanProgram
     - GET /api/program/events                      → handleProgramEvents

  2. Frontend navigation in App.tsx (~10 lines):
     - Add "Programs" button to header (next to Pipeline)
     - Add showPrograms state + toggle handler
     - Render ProgramBoard in center column (similar to PipelineView pattern)
     - Add program slug selection + onSelectImpl callback to navigate to WaveBoard

  **Why NOT suitable for SAW:**

  - Only 2 files need modification (~20 lines total)
  - No logic implementation — just wiring existing functions
  - No parallelization opportunity (both edits are trivial)
  - Both changes are append-only (no conflicts)
  - SAW overhead (Scout analysis, wave setup, worktree creation, merge ceremony)
    would take longer than making the edits directly

  **Recommended approach:**
  Direct edits in a single commit. Pattern matching against existing routes and
  navigation (Pipeline button, PipelineView) makes this a 5-minute task.

  **File decomposition check:** Cannot decompose into ≥2 agents with disjoint ownership.
  Backend and frontend changes are in separate files but neither change is substantial
  enough to justify SAW coordination overhead.

  **Time estimate:**
  - Direct implementation: 5-10 minutes (pattern matching, test, commit)
  - SAW workflow: 15-20 minutes (Scout, validate, wave setup, merge, cleanup)

  **Verdict:** Sequential implementation recommended. Mark as NOT_SUITABLE and
  provide direct implementation guidance below.

