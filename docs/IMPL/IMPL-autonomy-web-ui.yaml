scaffolds:
  - file_path: "web/src/types/autonomy.ts"
    contents: |
      // Autonomy level type — mirrors pkg/autonomy.Level
      export type AutonomyLevel = 'gated' | 'supervised' | 'autonomous'

      // Autonomy config — mirrors pkg/autonomy.Config
      export interface AutonomyConfig {
        level: AutonomyLevel
        max_auto_retries: number
        max_queue_depth: number
      }

      // Queue item — mirrors pkg/queue.Item
      export interface QueueItem {
        title: string
        priority: number
        depends_on?: string[]
        feature_description: string
        status: 'queued' | 'in_progress' | 'complete' | 'blocked'
        autonomy_override?: string
        require_review?: boolean
        slug?: string
        file_path?: string
      }

      // Daemon state — mirrors pkg/engine.DaemonState
      export interface DaemonState {
        running: boolean
        current_impl?: string
        current_wave?: number
        queue_depth: number
        completed_count: number
        blocked_count: number
      }

      // Pipeline entry — combined view of completed + executing + queued
      export interface PipelineEntry {
        slug: string
        title: string
        status: 'complete' | 'executing' | 'blocked' | 'queued'
        wave_progress?: string        // e.g. "Wave 2/3"
        active_agent?: string         // e.g. "Agent B"
        blocked_reason?: string
        queue_position?: number
        depends_on?: string[]
        completed_at?: string
        elapsed_seconds?: number
      }

      // Pipeline response from GET /api/pipeline
      export interface PipelineResponse {
        entries: PipelineEntry[]
        metrics: PipelineMetrics
        autonomy_level: AutonomyLevel
      }

      // Throughput metrics
      export interface PipelineMetrics {
        impls_per_hour: number
        avg_wave_seconds: number
        queue_depth: number
        blocked_count: number
        completed_count: number
      }

      // Add queue item request
      export interface AddQueueItemRequest {
        title: string
        priority: number
        feature_description: string
        depends_on?: string[]
        autonomy_override?: string
        require_review?: boolean
      }
    import_path: "@/types/autonomy"
    status: committed (0b840d904159daa512c285bbe59d492b5507e231)

interface_contracts:
  - name: "handleGetPipeline"
    description: |
      GET /api/pipeline — returns combined pipeline view with completed IMPLs,
      currently executing IMPL, and queued items. Includes throughput metrics
      and current autonomy level.
    definition: |
      func (s *Server) handleGetPipeline(w http.ResponseWriter, r *http.Request)
      // Response body: PipelineResponse JSON
    location: "pkg/api/pipeline_handler.go"

  - name: "handleListQueue / handleAddQueue / handleDeleteQueue / handleReorderQueue"
    description: |
      CRUD endpoints for the IMPL queue.
      GET /api/queue — list queue items sorted by priority.
      POST /api/queue — add a new queue item.
      DELETE /api/queue/{slug} — remove a queue item.
      PUT /api/queue/{slug}/priority — update priority.
    definition: |
      func (s *Server) handleListQueue(w http.ResponseWriter, r *http.Request)
      func (s *Server) handleAddQueue(w http.ResponseWriter, r *http.Request)
      func (s *Server) handleDeleteQueue(w http.ResponseWriter, r *http.Request)
      func (s *Server) handleReorderQueue(w http.ResponseWriter, r *http.Request)
    location: "pkg/api/queue_handler.go"

  - name: "handleGetAutonomy / handleSaveAutonomy"
    description: |
      GET /api/autonomy — returns current autonomy config from saw.config.json.
      PUT /api/autonomy — saves autonomy config section.
    definition: |
      func (s *Server) handleGetAutonomy(w http.ResponseWriter, r *http.Request)
      func (s *Server) handleSaveAutonomy(w http.ResponseWriter, r *http.Request)
    location: "pkg/api/autonomy_handler.go"

  - name: "handleDaemonStart / handleDaemonStop / handleDaemonStatus / handleDaemonEvents"
    description: |
      POST /api/daemon/start — start daemon loop.
      POST /api/daemon/stop — stop daemon loop.
      GET /api/daemon/status — get current daemon state.
      GET /api/daemon/events — SSE stream of daemon events.
    definition: |
      func (s *Server) handleDaemonStart(w http.ResponseWriter, r *http.Request)
      func (s *Server) handleDaemonStop(w http.ResponseWriter, r *http.Request)
      func (s *Server) handleDaemonStatus(w http.ResponseWriter, r *http.Request)
      func (s *Server) handleDaemonEvents(w http.ResponseWriter, r *http.Request)
    location: "pkg/api/daemon_handler.go"

  - name: "PipelineView component"
    description: |
      Top-level page component showing all IMPLs across the pipeline lifecycle.
      Fetches from GET /api/pipeline and subscribes to SSE pipeline_updated events.
    definition: |
      interface PipelineViewProps {
        onSelectImpl: (slug: string) => void
        onClose: () => void
      }
      export default function PipelineView(props: PipelineViewProps): JSX.Element
    location: "web/src/components/PipelineView.tsx"

  - name: "QueuePanel component"
    description: |
      Queue management panel with add/remove/reorder capabilities.
      Used within PipelineView or as a standalone sidebar panel.
    definition: |
      interface QueuePanelProps {
        onSelectItem?: (slug: string) => void
      }
      export default function QueuePanel(props: QueuePanelProps): JSX.Element
    location: "web/src/components/QueuePanel.tsx"

