state: SCOUT_PENDING

# Suitability Assessment
# ----------------------
# Verdict: SUITABLE
#
# 1. File decomposition: YES — Feature spans 6+ new backend files (queue handler,
#    pipeline handler, daemon handler, autonomy config handler, autonomy types)
#    and 8+ new frontend files (PipelineView, PipelineRow, QueuePanel,
#    AutonomySettings, DaemonControl, new hooks, new types). Clean decomposition
#    into backend API agents and frontend component agents with no conflicting
#    file writes.
#
# 2. Investigation-first: NO — The autonomy backend (v0.58.0) is complete and
#    tested. All types (autonomy.Config, queue.Item, engine.DaemonState,
#    engine.Event) are stable. No unknowns to investigate.
#
# 3. Interface discoverability: YES — Backend types from scout-and-wave-go are
#    fully defined. API endpoint contracts (request/response shapes) can be
#    specified up front. Frontend component props derive from API responses.
#
# 4. Pre-implementation status check:
#    Total items: 8 (4 backend handlers + 4 frontend component groups)
#    Already implemented (DONE): 0
#    Partially implemented (PARTIAL): 1 (config handler exists, needs autonomy section)
#    Not implemented (TO-DO): 7
#
# 5. Parallelization value: HIGH — Build+test cycle ~45s (Go build + npm build
#    + vitest). 6 agents across 2 waves. Backend agents (wave 1) are fully
#    independent. Frontend agents (wave 2) depend on backend types but not
#    on each other. Average 3 files per agent.
#
# Estimated times:
# - Scout phase: ~8 min (dependency mapping, interface contracts, IMPL doc)
# - Agent execution: ~25 min (6 agents x 12 min avg, 2 waves with parallelism)
# - Merge & verification: ~5 min
# Total SAW time: ~38 min
#
# Sequential baseline: ~72 min (6 agents x 12 min avg sequential)
# Time savings: ~34 min (~47% faster)
# Recommendation: Clear speedup. Proceed.

suitability_assessment: |
  SUITABLE. The autonomy layer backend (v0.58.0 in scout-and-wave-go) provides
  stable types and functions. This feature adds API endpoints and React UI
  components to expose them. Work decomposes cleanly into backend handlers
  (wave 1, independent) and frontend components (wave 2, depend on types).
  6 agents across 2 waves with ~47% time savings over sequential.

