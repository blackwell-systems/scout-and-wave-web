waves:
  - number: 1
    agents:
      - id: A
        task: |
          ## What to Implement
          Pipeline API handler: GET /api/pipeline that returns a combined view of
          all IMPLs across the lifecycle (completed, executing, queued) with
          throughput metrics and current autonomy level.

          The handler should:
          1. Load completed IMPLs from docs/IMPL/complete/ (use existing listImpls logic)
          2. Check for currently executing IMPL from server's activeRuns sync.Map
          3. Load queued items using queue.NewManager(repoPath).List()
          4. Load autonomy config using autonomy.LoadConfig(repoPath)
          5. Compute metrics (completed count, queue depth, blocked count)
          6. Return PipelineResponse JSON

          Define these types in the handler file:

          ```go
          type PipelineEntry struct {
              Slug          string   `json:"slug"`
              Title         string   `json:"title"`
              Status        string   `json:"status"` // complete, executing, blocked, queued
              WaveProgress  string   `json:"wave_progress,omitempty"`
              ActiveAgent   string   `json:"active_agent,omitempty"`
              BlockedReason string   `json:"blocked_reason,omitempty"`
              QueuePosition int      `json:"queue_position,omitempty"`
              DependsOn     []string `json:"depends_on,omitempty"`
              CompletedAt   string   `json:"completed_at,omitempty"`
              ElapsedSecs   int      `json:"elapsed_seconds,omitempty"`
          }

          type PipelineMetrics struct {
              ImplsPerHour  float64 `json:"impls_per_hour"`
              AvgWaveSecs   float64 `json:"avg_wave_seconds"`
              QueueDepth    int     `json:"queue_depth"`
              BlockedCount  int     `json:"blocked_count"`
              CompletedCount int    `json:"completed_count"`
          }

          type PipelineResponse struct {
              Entries       []PipelineEntry `json:"entries"`
              Metrics       PipelineMetrics `json:"metrics"`
              AutonomyLevel string          `json:"autonomy_level"`
          }
          ```

          Use existing imports:
          - `github.com/blackwell-systems/scout-and-wave-go/pkg/autonomy`
          - `github.com/blackwell-systems/scout-and-wave-go/pkg/queue`

          ## Tests to Write
          1. TestHandleGetPipeline_Empty — no IMPLs, no queue items, returns empty entries
          2. TestHandleGetPipeline_WithQueue — queue items present, returns correct ordering
          3. TestHandleGetPipeline_MixedStatus — completed + queued items, checks status mapping

          ## Verification Gate
          ```bash
          cd /Users/dayna.blackwell/code/scout-and-wave-web && go build ./... && go vet ./... && go test ./pkg/api/ -run TestHandleGetPipeline -timeout 30s
          ```

          ## Constraints
          - Do NOT modify server.go — route registration happens in wave 2
          - Handler receives *Server receiver to access cfg.RepoPath and activeRuns
          - Follow existing handler patterns: JSON response, proper error status codes
          - Use filepath.Join for all path construction
        files:
          - "pkg/api/pipeline_handler.go"
          - "pkg/api/pipeline_handler_test.go"
        dependencies: []

      - id: B
        task: |
          ## What to Implement
          Queue management API handlers:

          1. GET /api/queue — list all queue items sorted by priority
             Uses queue.NewManager(s.cfg.RepoPath).List()
             Returns JSON array of queue.Item

          2. POST /api/queue — add a new queue item
             Request body: AddQueueRequest{Title, Priority, FeatureDescription, DependsOn, AutonomyOverride, RequireReview}
             Uses queue.NewManager(s.cfg.RepoPath).Add(item)
             Returns 201 with the created item

          3. DELETE /api/queue/{slug} — remove a queue item from disk
             Find the item file in docs/IMPL/queue/ matching the slug, delete it
             Returns 204 on success

          4. PUT /api/queue/{slug}/priority — update an item's priority
             Request body: {priority: int}
             Read the item, update priority, rewrite the file
             Returns 200

          Define request types in the handler file:

          ```go
          type AddQueueRequest struct {
              Title              string   `json:"title"`
              Priority           int      `json:"priority"`
              FeatureDescription string   `json:"feature_description"`
              DependsOn          []string `json:"depends_on,omitempty"`
              AutonomyOverride   string   `json:"autonomy_override,omitempty"`
              RequireReview      bool     `json:"require_review,omitempty"`
          }

          type UpdatePriorityRequest struct {
              Priority int `json:"priority"`
          }
          ```

          Import `github.com/blackwell-systems/scout-and-wave-go/pkg/queue`

          After any mutation (add, delete, reorder), broadcast "impl_list_updated"
          via s.globalBroker.broadcast("impl_list_updated") so the frontend refreshes.

          ## Tests to Write
          1. TestHandleListQueue_Empty — no queue dir, returns empty array
          2. TestHandleAddQueue — adds item, verifies file created
          3. TestHandleDeleteQueue — creates then deletes, verifies 204
          4. TestHandleAddQueue_InvalidBody — bad JSON returns 400

          ## Verification Gate
          ```bash
          cd /Users/dayna.blackwell/code/scout-and-wave-web && go build ./... && go vet ./... && go test ./pkg/api/ -run TestHandleQueue -timeout 30s
          ```

          ## Constraints
          - Do NOT modify server.go — route registration happens in wave 2
          - Follow existing handler patterns in impl_handlers.go for style
          - Queue directory: filepath.Join(s.cfg.RepoPath, "docs", "IMPL", "queue")
          - Use os.MkdirAll to ensure queue dir exists before writes
        files:
          - "pkg/api/queue_handler.go"
          - "pkg/api/queue_handler_test.go"
        dependencies: []

      - id: C
        task: |
          ## What to Implement
          Two handler files for autonomy config and daemon control:

          **File 1: pkg/api/autonomy_handler.go**

          1. GET /api/autonomy — load autonomy config
             Uses autonomy.LoadConfig(s.cfg.RepoPath)
             Returns JSON: autonomy.Config (level, max_auto_retries, max_queue_depth)

          2. PUT /api/autonomy — save autonomy config
             Request body: autonomy.Config JSON
             Validates level is one of "gated", "supervised", "autonomous"
             Uses autonomy.SaveConfig(s.cfg.RepoPath, cfg)
             Broadcasts "impl_list_updated" to refresh any pipeline views
             Returns 200

          **File 2: pkg/api/daemon_handler.go**

          Add a daemonState field to track the running daemon:

          ```go
          // These fields are added conceptually — the agent should store them
          // on the Server struct via a dedicated sub-struct or sync fields.
          // Use a mutex-protected struct:

          type daemonControl struct {
              mu     sync.Mutex
              cancel context.CancelFunc
              state  *engine.DaemonState
              events []engine.Event // ring buffer, last 100
          }
          ```

          Handlers:

          3. POST /api/daemon/start — start the daemon
             Creates a context, starts engine.RunDaemon() in a goroutine
             with OnEvent callback that stores events and broadcasts SSE
             Returns 200 with DaemonState or 409 if already running

          4. POST /api/daemon/stop — stop the daemon
             Calls the stored cancel func
             Returns 200

          5. GET /api/daemon/status — return current DaemonState
             Returns the stored state, or {running: false} if never started

          6. GET /api/daemon/events — SSE stream of daemon events
             Similar to handleGlobalEvents pattern: subscribe to a channel,
             write events as SSE, heartbeat every 30s.
             Emit stored recent events on connect (replay buffer).

          Imports:
          - `github.com/blackwell-systems/scout-and-wave-go/pkg/autonomy`
          - `github.com/blackwell-systems/scout-and-wave-go/pkg/engine`

          ## Tests to Write
          1. TestHandleGetAutonomy_Default — no config file, returns default (gated)
          2. TestHandleSaveAutonomy — save supervised, read back, verify
          3. TestHandleSaveAutonomy_InvalidLevel — returns 400 for bad level
          4. TestHandleDaemonStatus_NotRunning — returns {running: false}
          5. TestHandleDaemonStart_AlreadyRunning — returns 409

          ## Verification Gate
          ```bash
          cd /Users/dayna.blackwell/code/scout-and-wave-web && go build ./... && go vet ./... && go test ./pkg/api/ -run "TestHandleAutonomy|TestHandleDaemon" -timeout 30s
          ```

          ## Constraints
          - Do NOT modify server.go — route registration happens in wave 2
          - The daemonControl struct should be a field on Server, but since
            server.go is owned by wave 2 agent F, declare it as a package-level
            var in daemon_handler.go: `var globalDaemon daemonControl`
            Agent F will wire it properly when registering routes.
          - For daemon SSE events, create a dedicated daemonBroker (same pattern
            as globalBroker) declared in daemon_handler.go
          - engine.RunDaemon requires DaemonOpts — populate RepoPath from
            s.cfg.RepoPath, load AutonomyConfig via autonomy.LoadConfig
        files:
          - "pkg/api/autonomy_handler.go"
          - "pkg/api/autonomy_handler_test.go"
          - "pkg/api/daemon_handler.go"
          - "pkg/api/daemon_handler_test.go"
