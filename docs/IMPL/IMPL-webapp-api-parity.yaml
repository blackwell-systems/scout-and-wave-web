    - scenario: Import-impls endpoint creates PROGRAM manifest with invalid structure, breaking tier execution
      likelihood: low
      impact: high
      mitigation: Agent C must validate tier numbers (1-N) and IMPL slugs before saving. Use protocol.ValidateProgramManifest() if available.
    - scenario: Frontend components reference old API patterns instead of new sawClient methods
      likelihood: low
      impact: low
      mitigation: Agent H updates sawClient first, then Agents E/F/G import from apiClient.ts. All agents must import from '../lib/apiClient', not '../api.ts'.
    - scenario: Go build fails due to missing imports or SDK version mismatch
      likelihood: low
      impact: medium
