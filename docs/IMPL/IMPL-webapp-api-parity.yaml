title: 'Webapp API Feature Parity - Missing SDK Integrations'
feature_slug: webapp-api-parity
verdict: SUITABLE
suitability_assessment: |
  ## Suitability Assessment

  **Verdict: SUITABLE**

  This feature adds 5 missing API endpoints to scout-and-wave-web that exist in the
  scout-and-wave-go SDK, as identified by the comprehensive feature gap audit. All
  five items are straightforward API handler additions with clear SDK function calls.

  **Five suitability questions:**

  1. **File decomposition**: YES - Work cleanly separates into 9 distinct files:
     - 3 new API handler files (interview, validation, import handlers)
     - 1 existing handler file modification (program_handler.go for replan wiring)
     - 4 new React component files (InterviewLauncher, ValidationPanel, ImportPanel, ReplanButton)
     - 1 frontend API client update (apiClient.ts)
     No conflicting modifications to the same file across agents.

  2. **Investigation-first items**: NO - All SDK functions already exist and are
     tested. No root cause analysis needed. Function signatures are known:
     - `interview.NewDeterministicManager()` - fully implemented
     - `protocol.ValidateIntegration()` - fully implemented
     - `protocol.ValidateWiringDeclarations()` - fully implemented
     - `protocol.ParseProgramManifest()` + import logic - fully implemented
     - `POST /api/program/{slug}/replan` handler - already exists, just needs UI wiring

  3. **Interface discoverability**: YES - All request/response schemas are derivable
     from existing SDK types and CLI command implementations. No runtime discovery needed.

  4. **Pre-implementation status check**: Per the audit document, these 5 features
     are confirmed as NOT INTEGRATED:
     - Interview mode: CLI exists, no web endpoint
     - Integration validation: SDK function exists, no web endpoint
     - Wiring validation: SDK function exists, no web endpoint
     - Import-impls: CLI exists, no web endpoint
     - Program replan: Handler exists but not called from UI
     Status: All 5 are TODO (0% implemented in web layer).

  5. **Parallelization value check**:
     - **Build/test cycle**: `go build ./...` + `go test ./...` takes ~20-30s
     - **Files per agent**: 2-3 files per agent (high implementation density)
     - **Agent independence**: Wave 1 (backend handlers) and Wave 2 (frontend components)
       are fully independent within each wave. Cross-wave dependency is clean (Wave 2
       depends on Wave 1 API contracts).
     - **Task complexity**: Each agent involves non-trivial logic (SSE streaming, SDK
       integration, React state management). Not simple documentation edits.
     - **Recommendation**: SUITABLE - parallelization provides clear value for 5 independent
       API integrations with moderate complexity each.

  **Time-to-value estimate:**

  Estimated times:
  - Scout phase: ~8 min (dependency mapping, interface contracts, IMPL doc)
  - Agent execution: ~25 min (5 agents × 5 min avg, 2 waves with parallelism)
  - Merge & verification: ~5 min
  Total SAW time: ~38 min

  Sequential baseline: ~50 min (5 agents × 10 min avg sequential time)
  Time savings: ~12 min (24% faster)

  Recommendation: Clear speedup. Each agent is independently testable and the wave
  structure allows parallel execution of backend handlers (Wave 1) and frontend
  components (Wave 2 after Wave 1 merges).

