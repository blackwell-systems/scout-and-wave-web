interface_contracts:
  - name: InterviewStartRequest
    description: JSON request body for POST /api/interview/start
    definition: |
      type InterviewStartRequest struct {
          Description string `json:"description"`
          MaxQuestions int   `json:"max_questions,omitempty"`
          ProjectPath string `json:"project_path,omitempty"`
      }
    location: pkg/api/interview_handlers.go
  - name: InterviewStartResponse
    description: JSON response for POST /api/interview/start
    definition: |
      type InterviewStartResponse struct {
          RunID string `json:"run_id"`
      }
    location: pkg/api/interview_handlers.go
  - name: InterviewSSEEvent
    description: SSE event types for interview progress
    definition: |
      // Event types: "question", "answer_recorded", "phase_complete", "complete", "error"
      type InterviewQuestionEvent struct {
          Phase       string `json:"phase"`
          QuestionNum int    `json:"question_num"`
          MaxQuestions int   `json:"max_questions"`
          Text        string `json:"text"`
          Hint        string `json:"hint,omitempty"`
      }
    location: pkg/api/interview_handlers.go
  - name: ValidateIntegrationResponse
    description: JSON response for GET /api/impl/{slug}/validate-integration
    definition: |
      type ValidateIntegrationResponse struct {
          Valid bool                    `json:"valid"`
          Wave  int                     `json:"wave"`
          Gaps  []protocol.IntegrationGap `json:"gaps"`
      }
    location: pkg/api/validation_handlers.go
  - name: ValidateWiringResponse
    description: JSON response for GET /api/impl/{slug}/validate-wiring
    definition: |
      type ValidateWiringResponse struct {
          Valid bool                    `json:"valid"`
          Gaps  []protocol.WiringGap    `json:"gaps"`
      }
    location: pkg/api/validation_handlers.go
  - name: ImportIMPLsRequest
    description: JSON request body for POST /api/impl/import
    definition: |
      type ImportIMPLsRequest struct {
          ProgramSlug string            `json:"program_slug"`
          IMPLPaths   []string          `json:"impl_paths"`
          TierMap     map[string]int    `json:"tier_map"` // slug -> tier number
          Discover    bool              `json:"discover,omitempty"`
          RepoDir     string            `json:"repo_dir,omitempty"`
      }
    location: pkg/api/import_handlers.go
  - name: ImportIMPLsResponse
    description: JSON response for POST /api/impl/import
    definition: |
      type ImportIMPLsResponse struct {
          ProgramPath string   `json:"program_path"`
          Imported    []string `json:"imported"` // slugs imported
          Skipped     []string `json:"skipped"`  // slugs skipped (already present)
      }
    location: pkg/api/import_handlers.go
  - name: sawClient.interview namespace
    description: Frontend API client interview methods
    definition: |
      interview: {
        start(description: string, opts?: {maxQuestions?: number, projectPath?: string}): Promise<{runId: string}>
        subscribeEvents(runId: string): EventSource
        answer(runId: string, answer: string): Promise<void>
      }
    location: web/src/lib/apiClient.ts
  - name: sawClient.impl.validation namespace
    description: Frontend API client validation methods
    definition: |
      impl: {
        validateIntegration(slug: string, wave: number): Promise<ValidateIntegrationResponse>
        validateWiring(slug: string): Promise<ValidateWiringResponse>
        importImpls(req: ImportIMPLsRequest): Promise<ImportIMPLsResponse>
      }
    location: web/src/lib/apiClient.ts

waves:
  - number: 1
    agents:
      - id: A
        task: |
          ## Agent A — Interview Mode API Handler

          **What to implement:**
          Add a new API handler file `pkg/api/interview_handlers.go` that exposes the
          interview-mode CLI functionality (E37E) as an HTTP/SSE endpoint. This allows
          the web UI to conduct structured requirements interviews without using the CLI.

          **Interface contracts:**
          - `InterviewStartRequest`: JSON body with `description`, `max_questions`, `project_path`
          - `InterviewStartResponse`: JSON with `run_id`
          - SSE events: `question`, `answer_recorded`, `phase_complete`, `complete`, `error`

          **Implementation requirements:**
          1. Add `POST /api/interview/start` handler that:
             - Decodes `InterviewStartRequest` from request body
             - Generates a unique run ID (use `generateRunID()` pattern from scout.go)
             - Calls `interview.NewDeterministicManager(docsDir)` from scout-and-wave-go
             - Calls `mgr.Start(interview.InterviewConfig{...})` to begin interview
             - Stores cancel func in `s.interviewRuns sync.Map` (add this field to Server)
             - Returns 202 Accepted with `{"run_id": "<id>"}`

          2. Add `GET /api/interview/{runID}/events` SSE handler that:
             - Subscribes to interview progress events via a goroutine
             - Publishes SSE events for each question, answer, phase change, completion
             - Uses the same SSE pattern as `handleScoutEvents` (broker.subscribe)
             - Emits event types: `question`, `answer_recorded`, `phase_complete`, `complete`, `error`

          3. Add `POST /api/interview/{runID}/answer` handler that:
             - Accepts JSON body with `{"answer": "..."}`
             - Calls `mgr.Answer(doc, answer)` to record the answer
             - Returns next question or completion status
             - Publishes SSE event for `answer_recorded`

          4. Add `POST /api/interview/{runID}/cancel` handler that:
             - Calls stored cancel func from `s.interviewRuns`
             - Saves interview state via `mgr.Save(doc, docPath)`
             - Returns 200 OK

          **SDK integration points:**
          - Import `github.com/blackwell-systems/scout-and-wave-go/pkg/interview`
          - Use `interview.NewDeterministicManager(docsDir)` to create manager
          - Use `interview.InterviewConfig` struct for start parameters
          - Use `interview.InterviewDoc` and `interview.InterviewQuestion` types
          - Call `mgr.Resume(path)` for resuming interrupted interviews

          **Testing requirements:**
          - Unit test for `POST /api/interview/start` with valid request
          - Unit test for SSE event streaming (mock manager)
          - Unit test for answer recording
          - Integration test: start interview, answer 2 questions, verify SSE events

          **Verification gate:**
          ```bash
          go build ./... && \
          go vet ./pkg/api/interview_handlers.go && \
          go test -v ./pkg/api -run TestInterview
          ```

          **Constraints:**
          - Follow existing SSE broker pattern from `wave.go` and `scout.go`
          - Store interview run state in `sync.Map` for cancellation support
          - Use `s.makeDeps()` helper to construct service dependencies
          - Match existing error handling: 400 for bad input, 500 for SDK errors
        files:
          - pkg/api/interview_handlers.go
        dependencies: []

      - id: B
        task: |
          ## Agent B — Validation Endpoints (E25/E26/E35)

          **What to implement:**
          Add a new API handler file `pkg/api/validation_handlers.go` that exposes the
          integration validation (E25/E26) and wiring validation (E35) SDK functions as
          HTTP endpoints. These validate cross-agent integration points and wiring declarations.

          **Interface contracts:**
          - `ValidateIntegrationResponse`: JSON with `valid`, `wave`, `gaps[]`
          - `ValidateWiringResponse`: JSON with `valid`, `gaps[]`

          **Implementation requirements:**
          1. Add `GET /api/impl/{slug}/validate-integration?wave=N` handler that:
             - Extracts `slug` from path and `wave` from query param
             - Resolves IMPL doc path via `service.ResolveIMPLPath(deps, slug)`
             - Loads manifest via `protocol.Load(yamlPath)`
             - Calls `protocol.ValidateIntegration(manifest, waveNum, repoPath)`
             - Returns JSON with validation result and gaps

          2. Add `GET /api/impl/{slug}/validate-wiring` handler that:
             - Extracts `slug` from path
             - Resolves IMPL doc path and loads manifest
             - Calls `protocol.ValidateWiringDeclarations(manifest, repoPath)`
             - Returns JSON with validation result and gaps

          **SDK integration points:**
          - Import `github.com/blackwell-systems/scout-and-wave-go/pkg/protocol`
          - Use `protocol.ValidateIntegration(manifest *IMPLManifest, waveNum int, repoPath string)`
            which returns `(*IntegrationReport, error)`
          - Use `protocol.ValidateWiringDeclarations(manifest *IMPLManifest, repoPath string)`
            which returns `(*WiringValidationResult, error)`
          - Both functions return structs with `Gaps []IntegrationGap` and `Gaps []WiringGap`

          **Testing requirements:**
          - Unit test for integration validation with no gaps
          - Unit test for integration validation with gaps (mock manifest with missing wiring)
          - Unit test for wiring validation with valid declarations
          - Unit test for wiring validation with missing caller files

          **Verification gate:**
          ```bash
          go build ./... && \
          go vet ./pkg/api/validation_handlers.go && \
          go test -v ./pkg/api -run TestValidation
          ```

          **Constraints:**
          - Use existing `service.ResolveIMPLPath()` helper for path resolution
          - Return 404 if IMPL slug not found
          - Return 400 if wave parameter is invalid (non-integer or <1)
          - Match existing response format: `{"valid": true/false, "gaps": [...]}`
        files:
          - pkg/api/validation_handlers.go
        dependencies: []

      - id: C
        task: |
          ## Agent C — Import-Impls API Handler

          **What to implement:**
          Add a new API handler file `pkg/api/import_handlers.go` that exposes the
          import-impls CLI functionality as an HTTP endpoint. This allows the web UI
          to import existing IMPL docs into a PROGRAM manifest for tiered execution.

          **Interface contracts:**
          - `ImportIMPLsRequest`: JSON body with `program_slug`, `impl_paths[]`, `tier_map{}`, `discover`, `repo_dir`
          - `ImportIMPLsResponse`: JSON with `program_path`, `imported[]`, `skipped[]`

          **Implementation requirements:**
          1. Add `POST /api/impl/import` handler that:
             - Decodes `ImportIMPLsRequest` from request body
             - Validates required fields: `program_slug` must be non-empty
             - Either `impl_paths` or `discover: true` must be provided
             - Resolves program manifest path via `filepath.Join(repoPath, "docs/PROGRAM", "PROGRAM-"+programSlug+".yaml")`
             - If `discover: true`, glob for IMPL files in `docs/IMPL/*.yaml` and `docs/IMPL/complete/*.yaml`
             - Parse or create program manifest via `protocol.ParseProgramManifest()`
             - For each IMPL path:
               - Load IMPL manifest via `protocol.Load()`
               - Extract feature_slug
               - Check if already in program (skip if present)
               - Add to tier specified in `tier_map[slug]` (default tier 1 if not specified)
             - Save updated program manifest via `protocol.SaveProgramManifest()`
             - Return JSON with imported/skipped counts

          **SDK integration points:**
          - Import `github.com/blackwell-systems/scout-and-wave-go/pkg/protocol`
          - Use `protocol.ParseProgramManifest(path string)` to load PROGRAM manifest
          - Use `protocol.SaveProgramManifest(manifest, path)` to save updated manifest
          - Use `protocol.Load(path)` to load each IMPL doc
          - Reference `cmd/saw/import_impls_cmd.go` for implementation pattern

          **Testing requirements:**
          - Unit test for import with explicit IMPL paths
          - Unit test for discover mode (glob for IMPLs in fixtures)
          - Unit test for tier assignment from tier_map
          - Unit test for skipping already-present IMPLs
          - Unit test for creating new PROGRAM manifest if it doesn't exist

          **Verification gate:**
          ```bash
          go build ./... && \
          go vet ./pkg/api/import_handlers.go && \
          go test -v ./pkg/api -run TestImport
          ```

          **Constraints:**
          - Default to tier 1 if slug not in `tier_map`
          - Skip IMPL if already present in program (no duplicate additions)
          - Create minimal PROGRAM manifest if file doesn't exist (like CLI does)
          - Use `s.makeDeps()` helper for repo path resolution
          - Return 400 if neither `impl_paths` nor `discover` is provided
        files:
          - pkg/api/import_handlers.go
        dependencies: []

      - id: D
        task: |
          ## Agent D — API Route Registration

          **What to implement:**
          Register the 4 new API routes in `pkg/api/server.go` for the handlers created
          by Agents A, B, and C. Also add the new `interviewRuns sync.Map` field to the
          Server struct for interview cancellation support.

          **Implementation requirements:**
          1. Add `interviewRuns sync.Map` field to Server struct (line ~42):
             ```go
             interviewRuns    sync.Map        // runID -> context.CancelFunc; tracks in-progress interview runs
             ```

          2. Register interview routes in `New()` function after line 148:
             ```go
             s.mux.HandleFunc("POST /api/interview/start", s.handleInterviewStart)
             s.mux.HandleFunc("GET /api/interview/{runID}/events", s.handleInterviewEvents)
             s.mux.HandleFunc("POST /api/interview/{runID}/answer", s.handleInterviewAnswer)
             s.mux.HandleFunc("POST /api/interview/{runID}/cancel", s.handleInterviewCancel)
             ```

          3. Register validation routes after interview routes:
             ```go
             s.mux.HandleFunc("GET /api/impl/{slug}/validate-integration", s.handleValidateIntegration)
             s.mux.HandleFunc("GET /api/impl/{slug}/validate-wiring", s.handleValidateWiring)
             ```

          4. Register import route after validation routes:
             ```go
             s.mux.HandleFunc("POST /api/impl/import", s.handleImportIMPLs)
             ```

          **Testing requirements:**
          - No new tests needed (routes are tested via handler tests in Agents A, B, C)
          - Verify `go build ./...` passes after route registration

          **Verification gate:**
          ```bash
          go build ./... && \
          go vet ./pkg/api/server.go
          ```

          **Constraints:**
          - Insert route registrations in logical grouping (interview routes together, validation routes together)
          - Follow existing route naming convention: noun-verb (e.g., `/api/interview/start`)
          - Do not modify any existing route registrations
          - Add interviewRuns field in sync.Map block with other run trackers (after line 42)
        files:
          - pkg/api/server.go
        dependencies: []

  - number: 2
    agents:
      - id: E
        task: |
          ## Agent E — InterviewLauncher Component

          **What to implement:**
          Create a new React component `web/src/components/InterviewLauncher.tsx` that
          provides a UI for starting and conducting structured requirements interviews.
          This component consumes the API endpoints created by Agent A.

          **Implementation requirements:**
          1. Component structure:
             - Form inputs: feature description (textarea), max questions (number input), project path (optional)
             - "Start Interview" button (POST /api/interview/start)
             - Interview progress panel (appears after start, shows current question)
             - Answer input (textarea) and "Submit Answer" button
             - Phase progress indicator (e.g., "Phase 2/6: Scope")
             - "Cancel Interview" button

          2. State management:
             - `runId: string | null` — current interview run ID
             - `question: string` — current question text
             - `phase: string` — current phase name
             - `questionNum: number` — current question number
             - `maxQuestions: number` — total questions
             - `isComplete: boolean` — interview completion status
             - `requirementsPath: string | null` — output file path after completion

          3. API integration:
             - Call `sawClient.interview.start(description, opts)` on form submit
             - Subscribe to SSE via `sawClient.interview.subscribeEvents(runId)`
             - Handle SSE event types: `question`, `answer_recorded`, `phase_complete`, `complete`, `error`
             - Call `sawClient.interview.answer(runId, answer)` on answer submit
             - On `complete` event, show link to REQUIREMENTS.md and suggest next steps

          4. UI design:
             - Match existing component styling (Card, CardHeader, CardContent from ui/card)
             - Show phase progress bar (1/6, 2/6, ..., 6/6)
             - Disable answer input while waiting for next question
             - Show loading spinner during SSE events
             - Display completion message with REQUIREMENTS.md path and "Launch Scout" button

          **Testing requirements:**
          - Unit test: component renders form inputs correctly
          - Unit test: start button calls sawClient.interview.start with form values
          - Unit test: SSE question event updates component state
          - Unit test: answer submit calls sawClient.interview.answer

          **Verification gate:**
          ```bash
          cd web && npm run build && npm test -- InterviewLauncher.test.tsx
          ```

          **Constraints:**
          - Import sawClient from '../lib/apiClient'
          - Use existing UI components from './ui/' directory
          - Follow existing component patterns (see ScoutLauncher.tsx for SSE example)
          - Add component to SettingsScreen.tsx as a new tab/section (or create a dedicated route)
        files:
