interface_contracts:
    - name: GET /api/files/tree
      description: |
        Returns recursive directory tree for a repository.
        Security: validates path stays within repo root, skips .git and node_modules.
      definition: |
        Query params: repo (string), path (string, optional, defaults to repo root)
        Response: FileTreeResponse (200 OK)
        Error: 400 Bad Request if path escapes repo root or repo not found
      location: pkg/api/files_handler.go
    - name: GET /api/files/read
      description: |
        Returns file content as plain text with language detection.
        Security: validates path, rejects files >1MB, detects binary files.
      definition: |
        Query params: repo (string), path (string)
        Response: FileContentResponse (200 OK)
        Error: 400 Bad Request if path invalid, 413 if file too large, 415 if binary
      location: pkg/api/files_handler.go
    - name: GET /api/files/diff
      description: |
        Returns git diff for modified files (unstaged + staged changes).
        Uses git diff HEAD for unstaged, git diff --cached for staged.
      definition: |
        Query params: repo (string), path (string)
        Response: { repo: string, path: string, diff: string } (200 OK)
        Error: 400 Bad Request if file not modified or path invalid
      location: pkg/api/files_handler.go
    - name: GET /api/files/status
      description: |
        Returns git status for all tracked/untracked files in repository.
        Maps to M (modified), A (added), U (untracked), D (deleted).
      definition: |
        Query params: repo (string)
        Response: GitStatusResponse (200 OK)
        Error: 400 Bad Request if repo not found
      location: pkg/api/files_handler.go
    - name: useFileBrowser hook
      description: |
        React hook managing file browser state: tree loading, file content,
        diff view, git status. Abstracts API calls and loading states.
      definition: |
        export function useFileBrowser(repo: string): {
          tree: FileNode | null
          content: string | null
          diff: string | null
          language: string
          loading: boolean
          error: string | null
          loadTree: (path?: string) => Promise<void>
          loadFile: (path: string) => Promise<void>
          loadDiff: (path: string) => Promise<void>
          refreshStatus: () => Promise<void>
        }
      location: web/src/hooks/useFileBrowser.ts
    - name: FileNode type
      description: |
        Recursive tree node representing files and directories.
        Shared across FileTree component and useFileBrowser hook.
      definition: |
        See scaffolds section (web/src/types/filebrowser.ts)
      location: web/src/types/filebrowser.ts
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## What to Implement
            Backend API handler with 4 endpoints for file browsing and git integration:
            - GET /api/files/tree — recursive directory tree (skips .git, node_modules, build artifacts)
            - GET /api/files/read — file content with size limit (<1MB) and binary detection
            - GET /api/files/diff — git diff for modified files
            - GET /api/files/status — git status for all files in repo

            ## Interfaces to Implement
            All endpoints accept `repo` query param (repo name from SAWConfig.repos).
            Use existing Config.RepoPath resolution pattern from browse_handler.go.

            Response types (as Go structs):
            ```go
            type FileNode struct {
              Name      string      `json:"name"`
              Path      string      `json:"path"`
              IsDir     bool        `json:"is_dir"`
              Children  []FileNode  `json:"children,omitempty"`
              GitStatus *string     `json:"git_status,omitempty"`
            }

            type FileTreeResponse struct {
              Repo string   `json:"repo"`
              Root FileNode `json:"root"`
            }

            type FileContentResponse struct {
              Repo     string `json:"repo"`
              Path     string `json:"path"`
              Content  string `json:"content"`
              Language string `json:"language"`
              Size     int64  `json:"size"`
            }

            type GitFileStatus struct {
              Path   string `json:"path"`
              Status string `json:"status"` // "M", "A", "U", "D"
            }

            type GitStatusResponse struct {
              Repo  string          `json:"repo"`
              Files []GitFileStatus `json:"files"`
            }
            ```

            ## Interfaces to Call
            - Server.cfg.RepoPath (string) — base repo path
            - filepath.Clean() — sanitize paths, detect .. escapes
            - os.ReadDir() — read directory contents
            - os.Stat() — check file size before reading
            - os.ReadFile() — read file contents (with 1MB size check)
            - exec.Command("git", "status", "--porcelain") — get git status
            - exec.Command("git", "diff", "HEAD", "--", path) — get diff for file

            Language detection: use file extension mapping (.go → "go", .ts → "typescript", .tsx → "tsx", etc.)

            ## Tests to Write
            1. TestHandleFilesTree_Basic — returns tree for valid repo
            2. TestHandleFilesTree_PathEscape — rejects paths with ../
            3. TestHandleFilesRead_Success — returns file content
            4. TestHandleFilesRead_TooLarge — rejects files >1MB
            5. TestHandleFilesRead_Binary — detects binary files (check for null bytes)
            6. TestHandleFilesDiff_Modified — returns diff for modified file
            7. TestHandleFilesStatus_Success — returns git status array

            ## Verification Gate
            ```bash
            go build ./pkg/api
            go test ./pkg/api -run TestHandleFiles
            ```

            ## Constraints
            - Security: ALWAYS validate path is within repo root (reject if filepath.Clean reveals .. escape)
            - Skip these directories when building tree: .git, node_modules, dist, build, target, .next
            - Binary file detection: read first 512 bytes, check for null bytes
            - Size limit: reject files >1MB (1048576 bytes) with 413 Payload Too Large
            - Git commands: run in repo root directory (use exec.Cmd.Dir)
            - Error handling: return 400 for bad paths, 404 for missing files, 413 for oversized files
          files:
            - pkg/api/files_handler.go
            - pkg/api/files_handler_test.go
        - id: C
          task: |
            ## What to Implement
            React hook managing file browser state and API interactions.
            Handles tree loading, file content fetching, diff viewing, and git status refresh.

            Also add 4 new API client functions to api.ts for backend communication.

            ## Interfaces to Implement
            Hook signature:
            ```typescript
            export function useFileBrowser(repo: string): {
              tree: FileNode | null
              content: string | null
              diff: string | null
              language: string
              loading: boolean
              error: string | null
              selectedPath: string | null
              loadTree: (path?: string) => Promise<void>
              loadFile: (path: string) => Promise<void>
              loadDiff: (path: string) => Promise<void>
              refreshStatus: () => Promise<void>
            }
            ```

            API client functions (add to api.ts):
            ```typescript
            export async function fetchFileTree(repo: string, path?: string): Promise<FileTreeResponse>
            export async function fetchFileContent(repo: string, path: string): Promise<FileContentResponse>
            export async function fetchFileDiff(repo: string, path: string): Promise<{ repo: string, path: string, diff: string }>
            export async function fetchGitStatus(repo: string): Promise<GitStatusResponse>
            ```

            ## Interfaces to Call
            - fetch() — call /api/files/tree, /api/files/read, /api/files/diff, /api/files/status
            - useState, useCallback from React
            - FileNode, FileTreeResponse, FileContentResponse, GitStatusResponse from scaffold types

            ## Tests to Write
            1. test('useFileBrowser loads tree on mount')
            2. test('useFileBrowser loads file content')
            3. test('useFileBrowser handles API errors')
            4. test('useFileBrowser refreshes git status')

            Use vitest + @testing-library/react. Mock fetch with vi.fn().

            ## Verification Gate
            ```bash
            cd web && npm test -- useFileBrowser
            cd web && npx tsc --noEmit
            ```

            ## Constraints
            - Hook must NOT auto-load tree on mount (only when loadTree() is called)
            - Loading state: true during any async operation, false when complete
            - Error state: store error message string, clear on successful operation
            - Git status refresh: fetch status, merge into tree nodes by matching paths
            - API client functions: follow existing pattern in api.ts (check response.ok, throw Error)
          files:
            - web/src/hooks/useFileBrowser.ts
            - web/src/api.ts
        - id: D
          task: |
            ## What to Implement
            Read-only code viewer component using @uiw/react-codemirror.
            Displays syntax-highlighted file content with line numbers.

            ## Interfaces to Implement
            Component props:
            ```typescript
            interface FileViewerProps {
              content: string
              language: string
              path: string
              loading?: boolean
            }
            export default function FileViewer(props: FileViewerProps): JSX.Element
            ```

            ## Interfaces to Call
            - CodeMirror from @uiw/react-codemirror
            - Language extensions: @codemirror/lang-javascript, @codemirror/lang-python (imported dynamically)
            - Theme: use app's current theme (light/dark detection via document.documentElement.classList)

            Language mapping:
            - "go" → @codemirror/lang-go
            - "typescript", "tsx" → @codemirror/lang-javascript (TypeScript mode)
            - "javascript", "jsx" → @codemirror/lang-javascript
            - "python" → @codemirror/lang-python
            - "yaml", "yml" → text mode (no highlighting)
            - "markdown", "md" → text mode

            ## Tests to Write
            1. test('FileViewer renders content')
            2. test('FileViewer shows loading state')
            3. test('FileViewer applies correct language mode')

            ## Verification Gate
            ```bash
            cd web && npm test -- FileViewer
            cd web && npx tsc --noEmit
            ```

            ## Constraints
            - Read-only: pass readOnly={true} to CodeMirror
            - Line numbers: enabled by default
            - Height: use height="600px" or make it fill parent container
            - Dark mode detection: check document.documentElement.classList.contains('dark')
            - Loading state: show skeleton loader (animate-pulse div) while loading
            - Path display: show file path above editor in muted text
          files:
            - web/src/components/FileBrowser/FileViewer.tsx
        - id: E
          task: |
            ## What to Implement
            Git diff viewer component displaying unified diff format with +/- line highlighting.
            Uses CodeMirror in diff mode or custom syntax highlighting for diff output.

            ## Interfaces to Implement
            Component props:
            ```typescript
            interface DiffViewerProps {
              diff: string
              path: string
              loading?: boolean
            }
            export default function DiffViewer(props: DiffViewerProps): JSX.Element
            ```

            ## Interfaces to Call
            - CodeMirror from @uiw/react-codemirror (or react-syntax-highlighter as fallback)
            - Existing MarkdownContent component pattern for code block rendering

            ## Tests to Write
            1. test('DiffViewer renders diff content')
            2. test('DiffViewer highlights added lines')
            3. test('DiffViewer highlights removed lines')

            ## Verification Gate
            ```bash
            cd web && npm test -- DiffViewer
            cd web && npx tsc --noEmit
            ```

            ## Constraints
            - Read-only: no editing of diff content
            - Line colors:
              - Lines starting with '+' (not '+++') → green background
              - Lines starting with '-' (not '---') → red background
              - Lines starting with '@@' → blue/muted background (hunk headers)
            - Use monospace font (font-mono class)
            - Loading state: show skeleton loader while loading
            - Empty state: if diff is empty, show "No changes" message
          files:
            - web/src/components/FileBrowser/DiffViewer.tsx
        - id: F
          task: |
            ## What to Implement
            Recursive tree navigation component with expand/collapse, git status badges,
            and file selection. Auto-expands first 2 levels on initial render.

            ## Interfaces to Implement
            Component props:
            ```typescript
            interface FileTreeProps {
              tree: FileNode
              onSelect: (path: string, isDir: boolean) => void
              selectedPath?: string | null
            }
            export default function FileTree(props: FileTreeProps): JSX.Element
            ```

            Internal recursive component:
            ```typescript
            interface TreeNodeProps {
              node: FileNode
              depth: number
              onSelect: (path: string, isDir: boolean) => void
              selectedPath?: string | null
            }
            function TreeNode(props: TreeNodeProps): JSX.Element
            ```

            ## Interfaces to Call
            - useState, useEffect from React
            - FileNode type from scaffold
            - Lucide icons: ChevronRight, ChevronDown, File, Folder, FolderOpen

            ## Tests to Write
            1. test('FileTree renders tree structure')
            2. test('FileTree expands/collapses directories')
            3. test('FileTree highlights selected file')
            4. test('FileTree auto-expands first 2 levels')
            5. test('FileTree shows git status badges')

            ## Verification Gate
            ```bash
            cd web && npm test -- FileTree
            cd web && npx tsc --noEmit
            ```

            ## Constraints
            - Auto-expand: directories at depth 0 and 1 start expanded (use useEffect to set initial state)
            - Git status badges:
              - M → yellow dot + "M" label
              - A → green dot + "A" label
              - U → blue dot + "U" label
              - D → red dot + "D" label (show in tree but with strikethrough)
            - Selection highlight: selected file/dir has blue background
            - Indentation: 16px per depth level (use style={{ paddingLeft: depth * 16 }})
            - Click behavior: directories toggle expand/collapse AND call onSelect, files only call onSelect
            - Scroll: wrap in overflow-y-auto container
          files:
            - web/src/components/FileBrowser/FileTree.tsx
        - id: G
          task: |
            ## What to Implement
            Fuzzy search file picker modal (⌘P / ⌘K style). Filter-as-you-type with
            keyboard navigation, jumps directly to selected file.

            ## Interfaces to Implement
            Component props:
            ```typescript
            interface FilePickerProps {
              files: string[]  // flat array of all file paths
              onSelect: (path: string) => void
              onClose: () => void
            }
            export default function FilePicker(props: FilePickerProps): JSX.Element
            ```

            ## Interfaces to Call
            - useState, useEffect, useRef from React
            - Existing CommandPalette component pattern (reuse modal structure, keyboard nav logic)
            - Search icon from lucide-react

            ## Tests to Write
            1. test('FilePicker filters files on input')
            2. test('FilePicker navigates with arrow keys')
            3. test('FilePicker selects with Enter')
            4. test('FilePicker closes with Escape')

            ## Verification Gate
            ```bash
            cd web && npm test -- FilePicker
            cd web && npx tsc --noEmit
            ```

            ## Constraints
            - Copy CommandPalette structure: fixed overlay with centered modal
            - Filter logic: case-insensitive includes (file.toLowerCase().includes(query.toLowerCase()))
            - Keyboard nav: ArrowUp/ArrowDown to move selection, Enter to select, Escape to close
            - Active item highlight: use same blue primary color as CommandPalette
            - Max height: 400px with overflow-y-auto
            - Auto-focus input on mount (use inputRef.current?.focus())
            - Click outside to close: onMouseDown on backdrop calls onClose
          files:
            - web/src/components/FileBrowser/FilePicker.tsx
    - number: 2
      agents:
        - id: B
          task: |
            ## What to Implement
            Register 4 new file browser API routes in server.go New() function.
            Add routes after existing browse routes, before the static file handler.

