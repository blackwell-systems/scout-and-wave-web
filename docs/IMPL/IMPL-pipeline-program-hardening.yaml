              the function continues and processes remaining manifests
            - `TestBuildImplProgramMap_MissingDocsDir` — repo path has no docs/ directory,
              returns empty map without error
            - `TestBuildImplProgramMap_TierContext` — IMPL slug in manifest has Tier=2,
              verifies returned implProgramInfo has programTier=2 and programTiersTotal>=2

            ### Verification gate
            ```
            go build ./...
            go vet ./...
            go test ./pkg/api/... -run TestBuildImplProgramMap -v
            go test ./pkg/api/... -run TestHandleGetPipeline -v
            ```

            ### Constraints
