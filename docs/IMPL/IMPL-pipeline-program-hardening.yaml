pre_mortem:
    overall_risk: medium
    rows:
        - scenario: |
            Q5 onStage removal creates a cross-agent coordination gap. Agent C removes
            the parameter from runProgramTier signature; Agent A must remove the no-op
            lambda from handleExecuteTier. If Agent A misses this, the build fails with
            "too many arguments" error on the runProgramTier call.
          likelihood: medium
          impact: high
          mitigation: |
            Both agents are in Wave 1 with disjoint file ownership. The compilation error
            will be caught by each agent's `go build ./...` gate. Agent A's task description
            explicitly notes the dependency. The finalize-wave build check will also catch it.
            If Agent A misses it, the merge fails cleanly — no silent data corruption.
        - scenario: |
            B5 consolidation (activeProgramRuns → Server field) breaks existing tests
            in program_handler_test.go that reference the package-level var directly
            (e.g., `activeProgramRuns.Store("test-program", struct{}{})`).
          likelihood: high
          impact: medium
          mitigation: |
            Agent A's task explicitly calls this out and instructs updating the tests.
            The test file `program_handler_test.go` is in Agent A's implicit scope
            since it tests code A owns. The compilation failure from a missing var will
            be caught immediately by `go build ./... ` in the verification gate.
        - scenario: |
            Agent D adds `title` to ImplTierStatus via ImplReference. If the backend's
            TierStatusDetail does not include title in JSON output, the frontend field
            is always undefined and displays incorrectly in ProgramBoard.
          likelihood: low
          impact: low
          mitigation: |
            Agent D's task instructs checking TierStatusDetail in the SDK. If title is
            absent, making it optional (`title?: string`) is safe and backward-compatible.
            ProgramBoard currently uses `impl.slug` for display anyway; title is additive.
        - scenario: |
            B6 cache TTL causes stale pipeline data during high-frequency pipeline updates.
            A 15-second TTL means a newly-started program execution may not appear in the
            pipeline for up to 15 seconds.
          likelihood: medium
          impact: low
          mitigation: |
            The pipeline also shows execution state from s.activeRuns (uncached). The
            implProgramMap cache only affects the program_slug/program_title/tier context
            fields. A stale cache means the tier badge disappears temporarily, not that
            the entry disappears. Users can force-refresh. TTL can be tuned down if UX
            feedback indicates it's too long.
        - scenario: |
            Q2 reconnection logic in ProgramBoard creates a closure-captured variable
            issue where `retryTimeout` and `currentEventSource` are re-initialized on
            each useEffect run, causing memory leaks if programSlug changes rapidly.
          likelihood: low
          impact: low
          mitigation: |
            Agent F's task uses local variables inside the useEffect closure, which is
            standard React pattern. The cleanup function properly clears the timeout and
            closes the EventSource. TypeScript strict mode will catch type errors.
            Agent F's verification gate includes `tsc --noEmit`.
