            ### What to implement

            **B2 — Fix resolveIMPLPathForProgram search order**

            The current search order is:
            1. `docs/IMPL/` (active, may contain stale in-progress copy)
            2. `docs/IMPL/complete/` (complete, canonical)

            Complete docs are canonical. Reverse the order:
            ```go
            implDirs := []string{
                filepath.Join(repoPath, "docs", "IMPL", "complete"),
                filepath.Join(repoPath, "docs", "IMPL"),
            }
            ```

            This is a 2-line change but has correctness impact: a completed IMPL that
            still has a stale active copy will now correctly use the complete version.

            **U3 — Emit program_impl_wave_progress SSE event**

            In `runProgramTier`, after calling `runWaveLoopFunc` and before checking
            completion, load the IMPL manifest and emit a wave progress event:

            ```go
            // After runWaveLoopFunc returns, reload the manifest to get current wave state
            implManifest, err := protocol.Load(implPath)
            if err != nil {
                // ... existing error handling ...
            }

            // Emit wave progress: count completed waves vs total
            completedWaves := 0
            totalWaves := len(implManifest.Waves)
            for _, w := range implManifest.Waves {
                if isWaveComplete(w) {
                    completedWaves++
                }
            }
            publish("program_impl_wave_progress", map[string]interface{}{
                "program_slug": programSlug,
                "impl_slug":    implSlug,
                "current_wave": completedWaves,
                "total_waves":  totalWaves,
            })
            ```

            For `isWaveComplete`, a wave is complete when all agents in the wave have
            completion reports. Use `protocol.CurrentWave(implManifest) == nil` to check
            full completion, but for mid-execution progress use the wave state from the
            manifest's completion reports. A simpler heuristic: count waves where
            `len(wave.Agents) > 0 && all agents have CompletionReports`.

            If counting is complex, emit a simplified version: `current_wave` = 0 when
            execution is running, `total_waves` = len(implManifest.Waves). The key
            contract is the event name and fields — ProgramBoard (Agent F) will handle
            the rendering.

