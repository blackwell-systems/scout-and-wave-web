            ### What to implement

            **B1 — Fix slug collision in buildImplProgramMap**

            Currently, when the same IMPL slug appears in two PROGRAM manifests, the last
            write silently wins:
            ```go
            result[impl.Slug] = implProgramInfo{...}  // silently overwrites
            ```

            Fix: before writing, check if the slug already exists. If it does, log a
            warning and skip the duplicate (first-write-wins is more predictable than
            last-write-wins). Alternatively, collect all parents and return a multi-value
            map — but for V1, first-write-wins with a log warning is sufficient and avoids
            changing the `implProgramInfo` struct shape.

            ```go
            if existing, exists := result[impl.Slug]; exists {
                log.Printf("buildImplProgramMap: slug %q claimed by both %q and %q; keeping first",
                    impl.Slug, existing.programSlug, manifest.ProgramSlug)
                continue
            }
            result[impl.Slug] = implProgramInfo{...}
            ```

            **B6 — Add TTL cache to buildImplProgramMap**

            `buildImplProgramMap` is called on every `GET /api/pipeline` with no caching.
            Add a package-level cache with a 15-second TTL.

            ```go
            type implProgramCache struct {
                mu      sync.Mutex
                data    map[string]implProgramInfo
                builtAt time.Time
                ttl     time.Duration
            }

            var implProgramCacheInstance = &implProgramCache{ttl: 15 * time.Second}

            func (c *implProgramCache) get(repos []RepoEntry) map[string]implProgramInfo {
                c.mu.Lock()
                defer c.mu.Unlock()
                if c.data != nil && time.Since(c.builtAt) < c.ttl {
                    return c.data
                }
                c.data = buildImplProgramMapFresh(repos)
                c.builtAt = time.Now()
                return c.data
            }
            ```

            Rename the existing `buildImplProgramMap` to `buildImplProgramMapFresh`
            (unexported helper). The exported-facing call site in `handleGetPipeline`
            changes from `buildImplProgramMap(repos)` to `implProgramCacheInstance.get(repos)`.

            Import `"sync"` and `"time"` if not already present (they likely are from
            existing usage).

            **U2 — Backend: add tier context fields to PipelineEntry and buildImplProgramMap**

            Extend `implProgramInfo` with tier data:
