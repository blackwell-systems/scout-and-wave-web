            3. Update the call to `runWaveLoopFunc` — check if `onStage` was passed
               through to `runWaveLoopFunc`. If so, pass `nil` or a no-op directly at
               the call site rather than routing through the outer parameter
            4. Update `runWaveLoopFunc` variable type if `onStage` was part of it

            Check `program_runner_test.go` — the test mock `runWaveLoopFunc` includes
            `onStage` in its signature. Update test mocks accordingly.

            ### Tests to write / update
            - `TestResolveIMPLPathForProgram_SearchOrder` — create both an active and
              a complete copy of the same IMPL; verify the complete copy is returned
            - Update existing `program_runner_test.go` mocks to remove `onStage` from
