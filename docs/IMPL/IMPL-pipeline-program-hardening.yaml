title: Pipeline and Program System Hardening
feature_slug: pipeline-program-hardening
verdict: SUITABLE
suitability_assessment: |
    The work spans 8 distinct files across Go backend and TypeScript frontend with
    natural decomposition boundaries. 16 items (B1-B6, U1-U4, Q1-Q5) distribute
    cleanly across 7 agents in 2 waves.

    File decomposition: 8 files, no two agents in the same wave own the same file.
    The one structural tension — B5 touches both server.go and program_handler.go —
    is resolved by assigning both files to Agent A, which also handles B3, B4, Q4,
    and U4 since all are in program_handler.go.

    Interface discoverability: The U1 ImplReference base type is defined in Wave 1
    (Agent D, types files) and consumed by Wave 2 (Agent E, PipelineRow.tsx). The
    contract is fully specifiable before implementation starts.

    U2 backend (new PipelineEntry fields + buildImplProgramMap tier lookup) lands in
    Wave 1 with Agent B (owns pipeline_handler.go). Wave 2 Agent E reads the new
    fields from the already-updated type definitions (Agent D, Wave 1).

    Pre-implementation check: All 16 items confirmed as TODO against current codebase.
    Known issue: program_handler_test.go TestHandleReplanProgram_NotImplemented expects
    HTTP 501 but current code returns 202. This is a pre-existing stale test; it does
    not block the current work (no agent touches handleReplanProgram).

    Parallelization value: HIGH. Go build+test cycle is ~30s. Agents A-D run fully
    in parallel in Wave 1 (4x speedup on foundation). Wave 2 agents E-G also run
    in parallel. Estimated 2-wave sequential time ~60-80 min; parallel ~25-35 min.

    Estimated times:
    - Scout phase: ~15 min
    - Agent execution: ~30 min (Wave 1: 4 agents parallel; Wave 2: 3 agents parallel)
    - Merge and verification: ~5 min
    Total SAW time: ~50 min
    Sequential baseline: ~90 min
    Time savings: ~40 min (~45% faster)
