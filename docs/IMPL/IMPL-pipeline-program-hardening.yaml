                programSlug       string
                programTitle      string
                programTier       int  // which tier this IMPL belongs to
                programTiersTotal int  // total tiers in the program
            }
            ```

            In `buildImplProgramMapFresh`, when iterating `manifest.Impls`, find the
            tier number for each IMPL by looking it up in `manifest.Tiers`:
            ```go
            // Each ProgramIMPL has a Tier field (int) from the protocol package.
            // manifest.Tiers is []ProgramTier; len(manifest.Tiers) gives total tiers.
            result[impl.Slug] = implProgramInfo{
                programSlug:       manifest.ProgramSlug,
                programTitle:      manifest.Title,
                programTier:       impl.Tier,          // from ProgramIMPL.Tier
                programTiersTotal: len(manifest.Tiers),
            }
            ```

            Extend the `PipelineEntry` Go struct:
            ```go
            ProgramTier       int `json:"program_tier,omitempty"`
            ProgramTiersTotal int `json:"program_tiers_total,omitempty"`
            ```

            Update all three places in `handleGetPipeline` where `implProgramMap` is
            consulted (completed, active, queued sections) to also set these new fields:
            ```go
            if pi, ok := implProgramMap[slug]; ok {
                e.ProgramSlug       = pi.programSlug
                e.ProgramTitle      = pi.programTitle
                e.ProgramTier       = pi.programTier
                e.ProgramTiersTotal = pi.programTiersTotal
            }
            ```

            Check `protocol.ProgramIMPL` struct in the scout-and-wave-go SDK to confirm
            the `Tier int` field name (it is used in program_handler_test.go as `Tier: 1`).

            ### Tests to write
            Add tests for `buildImplProgramMapFresh` (not the cache wrapper) in a new
            file `pkg/api/pipeline_impl_program_map_test.go`:
            - `TestBuildImplProgramMap_Empty` — no docs dir, returns empty map
