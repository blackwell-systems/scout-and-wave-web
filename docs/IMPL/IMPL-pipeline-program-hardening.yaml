interface_contracts:
    - name: ImplReference
      description: |
        Shared base TypeScript interface extracted from PipelineEntry and ImplTierStatus.
        Defines the minimal identity fields common to any IMPL reference in the UI.
      definition: |
        export interface ImplReference {
          slug: string
          title: string
          status: string
        }
      location: web/src/types/autonomy.ts
    - name: PipelineEntry (updated)
      description: |
        Extends ImplReference. Adds program_tier and program_tiers_total for U2 tier
        context rendering. Agent B populates these from the PROGRAM manifest in
        buildImplProgramMap; Agent E renders them in PipelineRow.
      definition: |
        export interface PipelineEntry extends ImplReference {
          repo?: string
          wave_progress?: string
          active_agent?: string
          blocked_reason?: string
          queue_position?: number
          depends_on?: string[]
          completed_at?: string
          elapsed_seconds?: number
          program_slug?: string
          program_title?: string
          program_tier?: number        // tier number within parent program (U2)
          program_tiers_total?: number // total tiers in parent program (U2)
        }
      location: web/src/types/autonomy.ts
    - name: ImplTierStatus (updated)
      description: |
        Extends ImplReference. Adds title field and optional wave_progress for U3
        wave depth rendering in ProgramBoard ImplCard.
      definition: |
        export interface ImplTierStatus extends ImplReference {
          wave_progress?: string  // e.g. "Wave 2/3" emitted via program_impl_wave_progress SSE (U3)
        }
      location: web/src/types/program.ts
    - name: implProgramInfo (updated)
      description: |
        Extended to hold tier number and total tiers for U2. Agent B updates both
        the struct definition and buildImplProgramMap to populate these fields.
        PipelineEntry Go struct also gains ProgramTier and ProgramTiersTotal JSON fields.
      definition: |
        type implProgramInfo struct {
          programSlug       string
          programTitle      string
          programTier       int  // tier number the IMPL belongs to (from ProgramIMPL.Tier)
          programTiersTotal int  // total number of tiers in the PROGRAM manifest
        }

        // PipelineEntry additions (Go struct):
        ProgramTier       int `json:"program_tier,omitempty"`
        ProgramTiersTotal int `json:"program_tiers_total,omitempty"`
      location: pkg/api/pipeline_handler.go
    - name: program_impl_wave_progress (SSE event)
      description: |
        New SSE event emitted by runProgramTier during IMPL execution (U3).
        Carries current_wave and total_waves so ProgramBoard can render "Wave N/M"
        instead of a static 50% progress bar.
      definition: |
        event: program_impl_wave_progress
        data: {
          "program_slug": string,
          "impl_slug": string,
          "current_wave": int,
          "total_waves": int
        }
      location: pkg/api/program_runner.go
    - name: activeProgramRuns (consolidated)
      description: |
        B5: activeProgramRuns moves from a package-level var in program_handler.go to
        a field on Server. This eliminates the unsynchronized split with s.activeRuns.
        Agent A updates Server struct and all references in program_handler.go.
      definition: |
        // In Server struct (server.go):
        activeProgramRuns sync.Map  // slug -> struct{}; program tier executions

        // All program_handler.go references change from:
        //   activeProgramRuns.Store/Load/Delete
        // to:
        //   s.activeProgramRuns.Store/Load/Delete
      location: pkg/api/server.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Agent A — program_handler.go + server.go (B3, B4, B5, Q4, U4)

            ### Files owned
            - `pkg/api/program_handler.go`
            - `pkg/api/server.go`

            ### What to implement

            **B5 — Consolidate activeProgramRuns into Server struct**

            In `server.go`, add `activeProgramRuns sync.Map` as a field on the `Server`
            struct (between `mergingRuns` and `testingRuns`, maintaining alphabetical
            grouping). Remove the package-level `var activeProgramRuns sync.Map` from
            `program_handler.go`. Update every reference in `program_handler.go` from
            `activeProgramRuns.XYZ` to `s.activeProgramRuns.XYZ` (Load, Store, Delete,
            LoadOrStore). This is the foundational fix; B3 and B4 build on it.

            **B3 — Fix handleExecuteTier cleanup gap**

            The current code calls `activeProgramRuns.Delete(slug)` at line 179 for the
            path-resolution error case, but if any panic occurs between `LoadOrStore`
            succeeding and the goroutine's `defer activeProgramRuns.Delete(slug)` running,
            the slug stays locked. Fix: add a handler-level defer immediately after
            `LoadOrStore` succeeds that deletes on any return before the goroutine launch.
            Use a `launched` boolean flag to suppress the handler-level cleanup once the
            goroutine is running.

            Pattern:
            ```go
            if _, loaded := s.activeProgramRuns.LoadOrStore(slug, struct{}{}); loaded {
                http.Error(w, "program tier already executing", http.StatusConflict)
                return
            }
            launched := false
            defer func() {
                if !launched {
                    s.activeProgramRuns.Delete(slug)
                }
            }()

            // ... path resolution, body decode ...

            go func() {
                defer s.activeProgramRuns.Delete(slug)
                // ... runProgramTier ...
            }()
            launched = true
            w.WriteHeader(http.StatusAccepted)
            ```

            **B4 — Clean up activeProgramRuns on server shutdown**

            The server's shutdown context (the `ctx` passed to `Start`/`StartTLS`) is
            cancelled on SIGTERM, but goroutines running `runProgramTier` do not observe
            it. After the goroutine launch, pass the server's shutdown context into the
            goroutine so it can select on `ctx.Done()` and emit `program_blocked` + clean up.

            The cleanest approach: store `context.Context` alongside the slug in
            `activeProgramRuns` (value becomes `context.CancelFunc` or a small struct),
            OR pass a context cancel through the run. For minimum invasiveness, add a
            `serverCtx context.Context` field to `Server` that is set in `New()` via a
            package-level cancelable context, cancelled in `Start`/`StartTLS` on shutdown.

            If adding `serverCtx` to Server is too broad in scope for this wave, an
            acceptable fallback is: make `runProgramTier` accept a `ctx context.Context`
            argument and check `ctx.Done()` in the per-IMPL loop. Pass `r.Context()`
            extended with a server-lifetime context.

            Either approach must ensure: when the server shuts down mid-execution, the
            goroutine emits `program_blocked` with reason "server shutdown" and calls
            `s.activeProgramRuns.Delete(slug)`.

            **Q4 — Return 400 on bad JSON in handleReplanProgram**

            Replace:
            ```go
            _ = json.NewDecoder(r.Body).Decode(&body)
            ```
            with:
            ```go
            if err := json.NewDecoder(r.Body).Decode(&body); err != nil && err != io.EOF {
                http.Error(w, "invalid request body: "+err.Error(), http.StatusBadRequest)
                return
            }
            ```
            Import `"io"` if not already present. Note: empty body (io.EOF) is acceptable
            since all fields have defaults, so only non-EOF decode errors return 400.

            **U4 — Pre-flight IMPL validation in handleGetProgramStatus**

            In `handleGetProgramStatus`, after loading the manifest and before calling
            `GetProgramStatus`, iterate each tier's IMPL slugs and verify the IMPL doc
            exists on disk (search both `docs/IMPL/` and `docs/IMPL/complete/`). Collect
            missing slugs into a slice. If any are missing, return a 200 response with a
            `validation_errors` field listing them rather than surfacing the error mid-execution.

            Add a `ValidationErrors []string` field to `ProgramStatusResponse`:
            ```go
            type ProgramStatusResponse struct {
                // ... existing fields ...
                ValidationErrors []string `json:"validation_errors,omitempty"`
            }
            ```

            The validation loop:
            ```go
            var validationErrors []string
            for _, tier := range manifest.Tiers {
                for _, implSlug := range tier.Impls {
                    if _, err := resolveIMPLPathForProgram(implSlug, repoPath); err != nil {
                        validationErrors = append(validationErrors, fmt.Sprintf("tier %d: IMPL %q not found", tier.Number, implSlug))
                    }
                }
            }
            ```

            ### Tests to write / update
            - Add `TestHandleGetProgramStatus_ValidationErrors` in `program_handler_test.go`
              that creates a PROGRAM manifest referencing a non-existent IMPL slug and
              asserts the response contains `validation_errors` with the missing slug.
            - Add `TestHandleReplanProgram_BadJSON` that sends `{invalid}` and asserts 400.
            - Add `TestHandleExecuteTier_CleanupOnPathError` that (using a minimal server
              without a valid program path) verifies `activeProgramRuns` does not retain
              the slug after handleExecuteTier returns an error.

            ### Verification gate
            ```
            go build ./...
            go vet ./...
            go test ./pkg/api/... -run TestHandleGetProgramStatus -v
            go test ./pkg/api/... -run TestHandleExecuteTier -v
            go test ./pkg/api/... -run TestHandleReplanProgram -v
            ```

            ### Constraints
            - Do NOT modify program_runner.go (owned by Agent C)
            - Do NOT modify pipeline_handler.go (owned by Agent B)
            - The package-level `var activeProgramRuns sync.Map` must be removed; all
              existing tests that reference it directly (e.g. `activeProgramRuns.Store`)
              must be updated to use `server.activeProgramRuns` or test helpers
            - Check program_handler_test.go for tests that use `activeProgramRuns` directly
              and update them to use a server field approach
          files:
            - pkg/api/program_handler.go
            - pkg/api/server.go
        - id: B
          task: |
            ## Agent B — pipeline_handler.go (B1, B6, U2 backend)

            ### Files owned
