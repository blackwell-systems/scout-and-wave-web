          3. Improve the status indicator in the header:
             - Running: add a spinning ring icon (not just bouncing dots)
             - Complete: show a checkmark icon that scales in
             - Failed: show an X icon with brief shake
          4. Add a smooth expand/collapse transition for the output section
          5. Add file count badge in the header (e.g., "3 files" pill)

          ## Interfaces to Call
          - Import icons from `lucide-react`: Check, Loader2, X
          - Use `getAgentColor` from `../lib/agentColors` (already imported in AgentCard)

          ## Tests to Write
          No new tests needed - these are visual-only changes to existing components.

          ## Verification Gate
          ```bash
          cd /Users/dayna.blackwell/code/scout-and-wave-web/web && npx tsc --noEmit && npx vite build
          ```

          ## Constraints
          - Do NOT change any component prop interfaces
          - Do NOT change any onClick handlers or functional behavior
          - Keep all existing CSS animation classes (exec-node-running, etc.)
          - Hover effects must be subtle (max 2px translate, max 1.05 scale)
        files:
          - "web/src/components/AgentCard.tsx"
        dependencies: []

      - id: "D"
        task: |
          ## What to Implement
          Improve navigation components: CommandPalette, ImplList sidebar, and ResumeBanner.
          Focus on smoother transitions, better visual hierarchy, and keyboard UX.

          ## Specific Changes

          ### web/src/components/CommandPalette.tsx
          The palette works well but lacks visual polish.

          1. Add a backdrop blur overlay (bg-black/50 backdrop-blur-sm) instead of transparent
          2. Add a scale+fade entrance animation for the palette card
          3. Enhance the active result row:
             - Add a left accent bar (3px) in primary color
             - Add a subtle slide animation when active index changes
          4. Add result type icons: different icons for active vs complete plans
          5. Add a subtle shimmer loading state if results take time to filter
          6. Improve the footer keyboard hints with better styled kbd elements

          ### web/src/components/ImplList.tsx
          The sidebar list is functional but visually flat.

          1. Enhance the EntryRow component:
             - Add a smooth slide-in animation for the hover card (currently just appears)
             - Replace the plain green dot with a status-aware indicator:
               - Active: pulsing green dot (already has this, keep it)
               - Complete: static checkmark icon with muted styling
             - Add a hover background transition that's smoother (150ms ease)
          2. Improve the repo section headers:
             - Add a subtle left border accent in a repo-specific color
             - Better collapse/expand animation (height transition, not instant)
          3. Improve the "Completed" section toggle:
             - Add a count badge with the `animate-count-pulse` class when count changes
             - Better visual separation from active entries
          4. Enhance the delete button:
             - Fade in from right on hover (already opacity transition, make it slide too)
             - Add a brief red flash on the row when delete is triggered

          ### web/src/components/ResumeBanner.tsx
          Read the existing file. Enhance with:
          1. A slide-down entrance animation when interrupted sessions are detected
          2. A pulsing attention indicator (amber dot or icon)
          3. Better visual hierarchy between the message and the action

          ## Interfaces to Call
          - Import icons from `lucide-react` as needed (Check, Circle, AlertCircle)
