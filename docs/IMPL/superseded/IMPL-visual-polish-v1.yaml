pre_mortem:
  overall_risk: "low"
  rows:
    - scenario: "Animation classes referenced by agents B-E before Agent A defines them"
      likelihood: "low"
      impact: "low"
      mitigation: |
        All agents are in wave 1 (parallel). Tailwind classes that don't exist are silently
        ignored - no build failures. Agents can use inline keyframe styles as fallback.
        Post-merge, Agent A's CSS will activate all class-based animations.
    - scenario: "CSS specificity conflicts between agent changes"
      likelihood: "low"
      impact: "low"
      mitigation: |
        Each agent owns disjoint files. CSS conflicts would only occur via global
        selectors in index.css (Agent A only). Other agents use component-scoped
        Tailwind classes. Post-merge build verification catches any issues.
    - scenario: "TypeScript compilation failures from lucide-react icon imports"
      likelihood: "low"
      impact: "medium"
      mitigation: |
        lucide-react v0.577.0 is already installed and used extensively.
        Agents should verify icon names exist in the package before using them.
    - scenario: "Animation jank on lower-powered devices"
      likelihood: "medium"
      impact: "low"
      mitigation: |
        Agent A adds prefers-reduced-motion media query to disable all animations.
        All animations use CSS transforms/opacity only (GPU-composited properties).
        No layout-triggering properties (width, height, margin) are animated.

known_issues:
  - title: "Hardcoded gray colors in WaveBoard and StageTimeline"
    description: |
      Several components use hardcoded Tailwind gray shades (bg-gray-50, text-gray-600)
      instead of theme CSS variables (bg-muted, text-muted-foreground). This means they
      don't fully follow the active Base16 theme. Agents E and B should migrate these
      to theme-aware classes where practical, but full migration is out of scope.
    status: "Pre-existing, partial fix in this work"
    workaround: "Components still render correctly, just with slightly off-theme grays"

