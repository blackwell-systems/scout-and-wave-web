waves:
  - number: 1
    agents:
      - id: "A"
        task: |
          ## What to Implement
          Extend the animation and styling foundation in index.css and tailwind.config.js.
          The app already has some CSS animations (panel-in, exec-node-pulse, exec-node-shake,
          exec-node-complete, exec-jewel-fill, exec-check-in, exec-edge transitions). You will
          ADD new general-purpose animations alongside them, not replace them.

          ## Specific Changes

          ### web/src/index.css
          Add the following AFTER the existing `/* Check mark fade-in */` section at the bottom:

          1. **Transition utility animations:**
             - `fade-in-up`: opacity 0->1, translateY(8px)->0, 200ms ease-out
             - `fade-in-down`: opacity 0->1, translateY(-8px)->0, 200ms ease-out
             - `fade-in-scale`: opacity 0->1, scale(0.95)->1, 200ms ease-out
             - `slide-in-right`: translateX(100%)->0 + opacity, 250ms ease-out
             - `slide-in-left`: translateX(-100%)->0 + opacity, 250ms ease-out

          2. **Loading/progress animations:**
             - `shimmer`: background-position sweep for skeleton loading, 2s linear infinite
             - `progress-stripe`: diagonal stripe animation for progress bars, 1s linear infinite
             - `count-pulse`: scale(1)->1.15->1, 300ms ease-out, for number changes

          3. **Stagger delay utility classes:**
             - `.stagger-1` through `.stagger-5` with 50ms increments (50ms, 100ms, 150ms, 200ms, 250ms)

          4. **Enhanced skeleton loading:**
             - Replace the existing `animate-pulse` skeleton pattern with a shimmer gradient:
             ```css
             .skeleton-shimmer {
               background: linear-gradient(90deg,
                 hsl(var(--muted)) 25%,
                 hsl(var(--muted-foreground) / 0.08) 50%,
                 hsl(var(--muted)) 75%);
               background-size: 200% 100%;
               animation: shimmer 2s linear infinite;
             }
             ```

          5. **Focus ring utility** (accessibility):
             ```css
             .focus-ring {
               outline: 2px solid hsl(var(--ring));
               outline-offset: 2px;
             }
             *:focus-visible { @apply focus-ring; }
             ```

          ### web/tailwind.config.js
          Add `animation` and `keyframes` entries to `theme.extend` matching the keyframes
          defined in index.css. This makes them available as Tailwind classes like
          `animate-fade-in-up`, `animate-shimmer`, etc.

          Also add a `transitionTimingFunction` extension:
          ```js
          transitionTimingFunction: {
            'bounce-out': 'cubic-bezier(0.34, 1.56, 0.64, 1)',
          }
          ```

          ## Tests to Write
          No tests needed for CSS-only changes. TypeScript compilation validates syntax.

          ## Verification Gate
          ```bash
          cd /Users/dayna.blackwell/code/scout-and-wave-web/web && npx tsc --noEmit && npx vite build
          ```

          ## Constraints
          - Do NOT modify or remove any existing keyframes or classes in index.css
          - All new animations must respect `prefers-reduced-motion` via a media query:
            `@media (prefers-reduced-motion: reduce) { .animate-* { animation: none !important } }`
          - Use CSS custom properties (hsl vars) for all colors, never hardcoded hex
          - Keep animation durations under 300ms for micro-interactions
        files:
          - "web/src/index.css"
          - "web/tailwind.config.js"
        dependencies: []

      - id: "B"
        task: |
          ## What to Implement
          Enhance status indicators, progress visualization, and overview panel polish.
          These components currently have minimal styling; add visual depth and feedback.

          ## Specific Changes

          ### web/src/components/ProgressBar.tsx
          The current progress bar is a simple blue fill with no visual interest.

          1. Add an animated striped pattern to the fill when progress is active (not 100%):
             - Use a CSS gradient with diagonal stripes + the `animate-progress-stripe` class
             - When complete (100%), remove stripes, add a brief green flash transition
          2. Add a subtle glow/shadow to the fill bar matching the fill color
          3. Add smooth width transitions (already has `transition-all duration-500`, keep it)
          4. Show the percentage text inside the bar when it's wide enough (>30%),
             outside when narrow
          5. Add color transitions: blue while in progress, green at 100%

          ### web/src/components/StageTimeline.tsx
          The pipeline stage indicators are flat and static.

          1. Replace the simple colored dots with more expressive indicators:
             - Running: pulsing ring animation (not just `animate-pulse` on a dot)
             - Complete: green checkmark with a brief scale-in animation
             - Failed: red X with a brief shake animation
             - Pending: subtle breathing opacity animation
          2. Add connecting lines between stages that fill/color as stages complete
          3. Add staggered fade-in animation when the timeline first renders
          4. Add a subtle elapsed time display next to running stages

          ### web/src/components/review/OverviewPanel.tsx
          The overview panel is a single line of text with no visual hierarchy.

          1. Convert the stats into visual stat cards/chips:
             - Each stat (files, agents, waves) gets its own mini card with an icon
             - Use lucide-react icons: FileText for files, Users for agents, Layers for waves
          2. Add the suitability verdict as a prominent colored badge (not just colored text)
          3. Add a subtle border-left accent bar in the verdict color
          4. Add hover tooltips on stat cards showing more detail

          ### web/src/components/SuitabilityBadge.tsx
          Read the existing file first. Enhance the badge with:
          1. A subtle background gradient based on the verdict
          2. An icon (CheckCircle for SUITABLE, XCircle for NOT SUITABLE, AlertTriangle for CAVEATS)
          3. A brief scale-in animation when it first renders

          ## Interfaces to Call
          - Import `FileText`, `Users`, `Layers`, `CheckCircle`, `XCircle`, `AlertTriangle` from `lucide-react`
          - Use existing Tailwind theme colors (hsl vars) for all styling

          ## Tests to Write
          1. Verify ProgressBar renders correctly at 0%, 50%, and 100%
          2. Verify StageTimeline renders stage entries with correct status classes

          ## Verification Gate
          ```bash
          cd /Users/dayna.blackwell/code/scout-and-wave-web/web && npx tsc --noEmit && npx vite build
          ```

          ## Constraints
          - Do NOT change component prop interfaces (maintain backward compatibility)
          - All animations should use CSS classes, not inline JS animation
          - Use existing theme CSS variables for all colors
          - ProgressBar must remain functional without JavaScript animation (CSS-only fill)
        files:
          - "web/src/components/ProgressBar.tsx"
          - "web/src/components/StageTimeline.tsx"
          - "web/src/components/review/OverviewPanel.tsx"
          - "web/src/components/SuitabilityBadge.tsx"
        dependencies: []

      - id: "C"
        task: |
          ## What to Implement
          Polish the AgentCard component with micro-interactions and hover effects.

          ## Specific Changes

          ### web/src/components/AgentCard.tsx
          The card already has glowing borders per status. Enhance further:

          1. Add a subtle gradient background that shifts based on status:
             - Running: dark with a faint blue radial gradient in top-left
             - Complete: dark with a faint green tint
             - Failed: dark with a faint red tint
