          ## Tests to Write
          1. CommandPalette: verify keyboard navigation still works (ArrowDown, ArrowUp, Enter, Escape)
          2. ImplList: verify entries render with correct selected state

          ## Verification Gate
          ```bash
          cd /Users/dayna.blackwell/code/scout-and-wave-web/web && npx tsc --noEmit && npx vite build
          ```

          ## Constraints
          - Do NOT change any component prop interfaces
          - Do NOT change filtering/selection logic in CommandPalette
          - Do NOT change the repo grouping logic in ImplList
