state: "SCOUT_PENDING"

# Suitability Assessment
# ----------------------
# Verdict: SUITABLE
#
# 1. File decomposition: YES - Work decomposes cleanly into 5 agents across
#    disjoint component files. No two agents share a file. The changes target
#    CSS/animation utilities, individual component groups, and layout components
#    that are architecturally separate.
#
# 2. Investigation-first: NO - All enhancement targets are visible in the
#    current codebase. No unknown bugs or race conditions to diagnose.
#
# 3. Interface discoverability: YES - Agents share only Tailwind utility classes
#    and CSS custom properties/keyframes, which can be fully specified upfront.
#    No runtime interface contracts needed between agents.
#
# 4. Pre-implementation status check:
#    Total items: 5 workstreams
#    Already implemented (DONE): 0
#    Partially implemented (PARTIAL): 1 (basic animations exist in index.css)
#    Not implemented (TO-DO): 4
#    Agent A adjusted to "extend existing animation system" rather than "create from scratch"
#
# 5. Parallelization value: HIGH - Each agent touches 2-4 files independently.
#    TypeScript build + Vite check takes ~15s. All 5 agents can run in a single
#    wave since they own completely disjoint files.
#
# Estimated times:
# - Scout phase: ~8 min
# - Agent execution: ~12 min (5 agents x 10 min avg, all parallel in 1 wave)
# - Merge & verification: ~4 min
# Total SAW time: ~24 min
#
# Sequential baseline: ~50 min (5 agents x 10 min sequential)
# Time savings: ~26 min (~52% faster)
# Recommendation: Clear speedup - proceed with parallel execution.

quality_gates:
  level: "standard"
  gates:
    - type: "typecheck"
      command: "cd web && npx tsc --noEmit"
      required: true
    - type: "build"
      command: "cd web && npx vite build"
      required: true
    - type: "test"
      command: "cd web && npx vitest run"
      required: false
      description: "Run existing component tests to check for regressions"

scaffolds: []

interface_contracts:
  - name: "CSS Animation Keyframes and Utility Classes"
    description: |
      Agent A defines new CSS keyframes and utility classes in index.css.
      Other agents reference these class names in their components.
      This is a convention contract, not a code interface.
    definition: |
      /* New keyframes added by Agent A to index.css */
      @keyframes fade-in-up { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:translateY(0) } }
      @keyframes fade-in-down { from { opacity:0; transform:translateY(-8px) } to { opacity:1; transform:translateY(0) } }
      @keyframes fade-in-scale { from { opacity:0; transform:scale(0.95) } to { opacity:1; transform:scale(1) } }
      @keyframes shimmer { from { background-position: -200% 0 } to { background-position: 200% 0 } }
      @keyframes slide-in-right { from { transform:translateX(100%); opacity:0 } to { transform:translateX(0); opacity:1 } }
      @keyframes slide-in-left { from { transform:translateX(-100%); opacity:0 } to { transform:translateX(0); opacity:1 } }
      @keyframes progress-stripe { from { background-position: 1rem 0 } to { background-position: 0 0 } }
      @keyframes count-pulse { 0%,100% { transform:scale(1) } 50% { transform:scale(1.15) } }

      /* Utility classes */
      .animate-fade-in-up { animation: fade-in-up 200ms ease-out both }
      .animate-fade-in-down { animation: fade-in-down 200ms ease-out both }
      .animate-fade-in-scale { animation: fade-in-scale 200ms ease-out both }
      .animate-shimmer { animation: shimmer 2s linear infinite; background-size: 200% 100% }
      .animate-slide-in-right { animation: slide-in-right 250ms ease-out both }
      .animate-slide-in-left { animation: slide-in-left 250ms ease-out both }
      .animate-progress-stripe { animation: progress-stripe 1s linear infinite }
      .animate-count-pulse { animation: count-pulse 300ms ease-out }

      /* Stagger delay utilities */
      .stagger-1 { animation-delay: 50ms }
      .stagger-2 { animation-delay: 100ms }
      .stagger-3 { animation-delay: 150ms }
      .stagger-4 { animation-delay: 200ms }
      .stagger-5 { animation-delay: 250ms }
    location: "web/src/index.css"

  - name: "Tailwind Animation Extensions"
    description: |
      Agent A adds animation and keyframes entries to the Tailwind config
      so animations are available as Tailwind classes throughout the app.
    definition: |
      // Added to theme.extend in tailwind.config.js:
      animation: {
        'fade-in-up': 'fade-in-up 200ms ease-out both',
        'fade-in-scale': 'fade-in-scale 200ms ease-out both',
        'shimmer': 'shimmer 2s linear infinite',
        'slide-in-right': 'slide-in-right 250ms ease-out both',
        'slide-in-left': 'slide-in-left 250ms ease-out both',
        'progress-stripe': 'progress-stripe 1s linear infinite',
      },
      keyframes: {
        'fade-in-up': { from: { opacity: '0', transform: 'translateY(8px)' }, to: { opacity: '1', transform: 'translateY(0)' } },
        'fade-in-scale': { from: { opacity: '0', transform: 'scale(0.95)' }, to: { opacity: '1', transform: 'scale(1)' } },
        'shimmer': { from: { 'background-position': '-200% 0' }, to: { 'background-position': '200% 0' } },
        'slide-in-right': { from: { transform: 'translateX(100%)', opacity: '0' }, to: { transform: 'translateX(0)', opacity: '1' } },
        'slide-in-left': { from: { transform: 'translateX(-100%)', opacity: '0' }, to: { transform: 'translateX(0)', opacity: '1' } },
        'progress-stripe': { from: { 'background-position': '1rem 0' }, to: { 'background-position': '0 0' } },
      }
    location: "web/tailwind.config.js"

