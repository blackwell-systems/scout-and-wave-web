      - id: "E"
        task: |
          ## What to Implement
          Enhance the WaveBoard live execution view and the WaveStructurePanel review diagram.
          These are the most visually rich components and benefit from animation polish.

          ## Specific Changes

          ### web/src/components/WaveBoard.tsx
          The board shows live execution. Enhance the visual experience:

          1. Improve the wave section cards:
             - Add a subtle left border accent that changes color as the wave progresses:
               blue when running, green when complete, red when failed
