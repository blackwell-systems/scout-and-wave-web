interface_contracts:
    - name: AmendImplOpts
      description: |-
        Options struct for the amend engine. Passed to AmendImpl in pkg/protocol/amend.go.
        Exactly one of AddWave, RedirectAgent, or ExtendScope must be true.
      definition: |-
        // AmendImplOpts controls which amend operation to perform.
        type AmendImplOpts struct {
            ManifestPath   string // absolute path to the IMPL YAML
            AddWave        bool   // append a new empty wave skeleton to the manifest
            RedirectAgent  bool   // re-queue an agent (update task + clear completion report)
            AgentID        string // required when RedirectAgent=true
            WaveNum        int    // required when RedirectAgent=true; wave the agent belongs to
            NewTask        string // required when RedirectAgent=true; replacement task text
            ExtendScope    bool   // re-engage Scout with current IMPL as context (handled by CLI layer)
        }
      location: pkg/protocol/amend.go
    - name: AmendImplResult
      description: |-
        Result returned by AmendImpl. Contains the updated manifest and any warnings
        emitted during the amend operation (e.g., "agent already has commits on worktree branch").
      definition: |-
        // AmendImplResult is the outcome of a successful AmendImpl call.
        type AmendImplResult struct {
            ManifestPath  string   // absolute path (same as input)
            Operation     string   // "add-wave" | "redirect-agent" | "extend-scope"
            NewWaveNumber int      // only set when Operation=="add-wave"
            AgentID       string   // only set when Operation=="redirect-agent"
            Warnings      []string // non-fatal issues detected during amend
        }
      location: pkg/protocol/amend.go
    - name: AmendImpl
      description: |-
        Core engine function for amend operations. Validates preconditions (no SAW:COMPLETE,
        target wave/agent exists, completed waves are frozen) then performs the requested
        mutation and saves the manifest. Does NOT re-run the full suitability gate.
        Returns ErrAmendBlocked if a hard precondition fails.
      definition: |-
        // AmendImpl performs the amend operation described by opts on the manifest at
        // opts.ManifestPath, saves the updated manifest, and returns the result.
        // Returns ErrAmendBlocked (sentinel) if a hard invariant would be violated.
        func AmendImpl(opts AmendImplOpts) (*AmendImplResult, error)
      location: pkg/protocol/amend.go
    - name: ErrAmendBlocked
      description: |-
        Sentinel error returned by AmendImpl when a hard precondition fails.
        Callers check errors.Is(err, ErrAmendBlocked) to distinguish protocol violations
        from system errors.
      definition: 'var ErrAmendBlocked = errors.New("amend blocked: protocol invariant violation")'
      location: pkg/protocol/amend.go
    - name: AmendImplRequest
      description: |-
        JSON request body for POST /api/impl/{slug}/amend in the web API.
        Mirrors AmendImplOpts but uses JSON-friendly field names.
      definition: |-
        // AmendImplRequest is the JSON body for POST /api/impl/{slug}/amend.
        type AmendImplRequest struct {
            Operation  string `json:"operation"`   // "add-wave" | "redirect-agent" | "extend-scope"
            AgentID    string `json:"agent_id,omitempty"`
            WaveNum    int    `json:"wave_num,omitempty"`
            NewTask    string `json:"new_task,omitempty"`
        }
      location: pkg/api/amend_handler.go
    - name: AmendImplResponse
      description: |-
        JSON response body for POST /api/impl/{slug}/amend.
        On success: HTTP 200 with result. On protocol violation: HTTP 409 with error.
      definition: |-
        // AmendImplResponse is returned by POST /api/impl/{slug}/amend.
        type AmendImplResponse struct {
            Success      bool     `json:"success"`
            Operation    string   `json:"operation"`
            NewWaveNumber int     `json:"new_wave_number,omitempty"`
            AgentID      string   `json:"agent_id,omitempty"`
            Warnings     []string `json:"warnings,omitempty"`
            Error        string   `json:"error,omitempty"` // present only on failure
        }
      location: pkg/api/amend_handler.go
