            ## Agent D — Web API: POST /api/impl/{slug}/amend handler

            ### What to implement

            Create `/Users/dayna.blackwell/code/scout-and-wave-web/pkg/api/amend_handler.go`
            with the HTTP handler for amend operations.

            ### Types to define (in amend_handler.go)

            ```go
            // AmendImplRequest is the JSON body for POST /api/impl/{slug}/amend.
            type AmendImplRequest struct {
                Operation string `json:"operation"`          // "add-wave" | "redirect-agent" | "extend-scope"
                AgentID   string `json:"agent_id,omitempty"`
                WaveNum   int    `json:"wave_num,omitempty"`
                NewTask   string `json:"new_task,omitempty"`
            }

            // AmendImplResponse is returned by POST /api/impl/{slug}/amend.
            type AmendImplResponse struct {
                Success       bool     `json:"success"`
                Operation     string   `json:"operation"`
                NewWaveNumber int      `json:"new_wave_number,omitempty"`
                AgentID       string   `json:"agent_id,omitempty"`
                Warnings      []string `json:"warnings,omitempty"`
                Error         string   `json:"error,omitempty"`
            }
            ```

            ### Handler function

            ```go
            // handleAmendImpl handles POST /api/impl/{slug}/amend.
            // Accepts AmendImplRequest JSON body. Returns AmendImplResponse.
            // HTTP 200 on success, HTTP 409 on ErrAmendBlocked, HTTP 400 on bad input,
            // HTTP 500 on system errors.
            func (s *Server) handleAmendImpl(w http.ResponseWriter, r *http.Request)
            ```

            **Handler logic:**
            1. Extract slug from `r.PathValue("slug")`
            2. Decode `AmendImplRequest` from body
            3. Validate operation is one of: "add-wave", "redirect-agent", "extend-scope"
            4. Find implPath using `s.findImplPath(slug)`
            5. Map request to `protocol.AmendImplOpts`:
               - operation "add-wave" → `opts.AddWave = true`
               - operation "redirect-agent" → `opts.RedirectAgent = true`, set AgentID, WaveNum, NewTask
               - operation "extend-scope" → respond immediately with HTTP 200 and JSON:
                 `{"success": true, "operation": "extend-scope", "warnings": ["extend-scope: re-launch Scout with IMPL as context (orchestrator-level operation)"]}`
                 (The web UI should show this message; actual Scout re-engagement is user-triggered)
            6. Call `protocol.AmendImpl(opts)` (import from scout-and-wave-go)
            7. On `errors.Is(err, protocol.ErrAmendBlocked)` → HTTP 409
            8. On other error → HTTP 500
            9. On success → HTTP 200 with AmendImplResponse
            10. Broadcast `s.globalBroker.broadcast("impl_list_updated")` on success

            ### Also register a route helper (do NOT edit server.go — that's wave 2)
            Add a package-level function:
            ```go
            // RegisterAmendRoutes registers amend-related HTTP routes on the given mux.
            // Called from server.go New() in wave 2.
            func (s *Server) RegisterAmendRoutes() {
                s.mux.HandleFunc("POST /api/impl/{slug}/amend", s.handleAmendImpl)
            }
            ```

