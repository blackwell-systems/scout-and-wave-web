            ## Agent C — SDK Protocol: AmendImpl engine function

            ### What to implement

            Create `/Users/dayna.blackwell/code/scout-and-wave-go/pkg/protocol/amend.go` with
            the `AmendImpl` function, `AmendImplOpts` struct, `AmendImplResult` struct, and
            `ErrAmendBlocked` sentinel error.

            ### Full implementation spec

            ```go
            package protocol

            import (
                "errors"
                "fmt"
                "os"
                "strings"
            )

            // ErrAmendBlocked is returned when a hard protocol invariant prevents the amend.
            var ErrAmendBlocked = errors.New("amend blocked: protocol invariant violation")

            type AmendImplOpts struct {
                ManifestPath  string
                AddWave       bool
                RedirectAgent bool
                AgentID       string
                WaveNum       int
                NewTask       string
                ExtendScope   bool
            }

            type AmendImplResult struct {
                ManifestPath  string
                Operation     string
                NewWaveNumber int
                AgentID       string
                Warnings      []string
            }

            func AmendImpl(opts AmendImplOpts) (*AmendImplResult, error)
            ```

            **Precondition checks (in order, fail fast):**
            1. Load manifest from opts.ManifestPath
            2. Check `m.CompletionDate != ""` → if set, return `fmt.Errorf("%w: IMPL is complete (completion_date=%s); cannot amend", ErrAmendBlocked, m.CompletionDate)`
            3. Check raw file for SAW:COMPLETE marker using `strings.Contains(rawBytes, "SAW:COMPLETE")` → same error

            **For AddWave:**
            1. Find the highest wave number in m.Waves (gaps are fine; new wave = maxWave+1)
            2. Construct the candidate new wave: `newWave := Wave{Number: maxWave+1, Agents: []Agent{}}`
            3. Validate BEFORE mutating: append newWave to a copy, run `protocol.Validate(mCopy)`.
               If validation fails, return error wrapping ErrAmendBlocked — do NOT save the manifest.
               This avoids needing rollback logic (validate-first pattern).
            4. If validation passes, append to the real manifest and save
            5. Return `&AmendImplResult{Operation: "add-wave", NewWaveNumber: maxWave+1}`

            **For RedirectAgent:**
            1. Find the agent by AgentID in wave WaveNum. If not found: `fmt.Errorf("%w: agent %s not found in wave %d", ErrAmendBlocked, AgentID, WaveNum)`
            2. Check if completion report exists AND status=="complete":
               `if cr, ok := m.CompletionReports[AgentID]; ok && cr.Status == "complete" { return ErrAmendBlocked }`
            3. Check worktree branch for commits (see below)
            4. Update agent task: find agent in m.Waves[waveIdx].Agents[agentIdx].Task = NewTask
            5. If partial completion report exists (status != "complete"), delete it from m.CompletionReports
            6. Save manifest
            7. Return `&AmendImplResult{Operation: "redirect-agent", AgentID: AgentID}`

            **Worktree commit check for RedirectAgent:**
            - Construct branch name: `saw/<slug>/wave<N>-agent-<ID>` (use m.FeatureSlug)
            - If m.Waves[waveIdx].BaseCommit is empty: skip git check, emit Warning "base_commit not set; skipping worktree commit check"
            - Otherwise: find repo root using `git -C <manifestDir> rev-parse --show-toplevel`
              (do NOT walk parent directories manually — this approach fails when manifest is
              in a subdirectory like docs/IMPL/ that is several levels from .git).
              If git rev-parse fails, emit Warning "could not find repo root; skipping worktree commit check" and skip.
            - Run `exec.Command("git", "-C", repoRoot, "log", baseCommit+".."+branchName, "--oneline")`
              (use exec.Command with separate args — not sh -c — to avoid any shell injection risk
              from baseCommit or branchName values containing special characters)
            - If git command fails (branch not found): no commits, proceed
            - If output is non-empty: return `fmt.Errorf("%w: agent %s has commits on branch %s; cannot redirect a committed agent", ErrAmendBlocked, AgentID, branchName)`

            ### Tests to write
            Create `amend_test.go` in the same package (or `amend_test.go` with `package protocol_test`).
            Test cases:
            - `TestAmendImpl_RejectsComplete`: manifest with completion_date set → ErrAmendBlocked
            - `TestAmendImpl_AddWave`: valid manifest → new wave appended, wave number correct
            - `TestAmendImpl_AddWave_EmptyWaves`: manifest with no waves → wave 1 added
            - `TestAmendImpl_RedirectAgent_RejectsComplete`: agent with status:complete report → ErrAmendBlocked
            - `TestAmendImpl_RedirectAgent_NotFound`: nonexistent agentID → ErrAmendBlocked
            - `TestAmendImpl_RedirectAgent_Success`: agent with no report → task updated, report cleared

            Use os.MkdirTemp + os.WriteFile for fixture manifests in tests (see existing tests in pkg/protocol/ for patterns).

