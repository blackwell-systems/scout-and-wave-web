pre_mortem:
    overall_risk: medium
    rows:
        - scenario: |-
            Agent C's AmendImpl worktree commit check fails to find .git directory when
            walking up from the manifest path (manifest is in docs/IMPL/ which is several
            levels from repo root). The fallback uses manifest directory, which doesn't
            have .git, so git commands fail silently.
          likelihood: medium
          impact: medium
          mitigation: |-
            The worktree commit check should use a robust git root finder: run
            `git -C <manifestDir> rev-parse --show-toplevel` to find repo root reliably,
            then use that for subsequent git log calls. If git rev-parse fails, emit a
            Warning and skip the commit check rather than hard-failing.
        - scenario: |-
            Agent F edits ReviewScreen.tsx and accidentally breaks the PanelKey type
            by missing existing entries in the union, causing TypeScript compile errors
            in the frontend build.
          likelihood: low
          impact: high
          mitigation: |-
            Agent F must read ReviewScreen.tsx in full before editing. The PanelKey
            type currently has 13 entries; adding 'amend' brings it to 14. TypeScript
            errors surface immediately in npm run build — gate 3 catches this.
        - scenario: |-
            The scout-and-wave-web repo depends on scout-and-wave-go via go.mod replace
            directive pointing to .engine (see CI workflow). Agent D's amend_handler.go
            imports protocol.AmendImpl which is new in wave 1. If the replace directive
            isn't updated or the .engine symlink is stale, Agent D's build will fail.
          likelihood: medium
          impact: medium
          mitigation: |-
            Agent D should verify `go build ./pkg/api/...` succeeds before completing.
            If it fails with "protocol.AmendImpl undefined", add a note in the completion
            report. The integration agent (F) should run go mod tidy in scout-and-wave-web
            after ensuring the engine dependency is up to date.
        - scenario: |-
            protocol.Load() in manifest.go rejects manifests with completion reports for
            agent IDs not found in waves. If AmendImpl adds a new wave with no agents
            (empty Agents slice), and a stale completion report somehow references a
            wave-2 agent from a prior amend, Load() will reject it.
          likelihood: low
          impact: low
          mitigation: |-
            AmendImpl adds only an empty Wave{} with no agents — no completion reports
            are written. The Load() guard only fires for completion_reports keys not
            found in any wave.Agents. Empty waves have no agents to conflict with.
        - scenario: |-
            The /saw amend saw-skill.md documentation in wave 2 conflicts with Agent A's
            E36 protocol rule updates if Agent F edits saw-skill.md based on a stale
            understanding of E36's finalized semantics.
          likelihood: low
          impact: low
          mitigation: |-
            Agent F should read the updated execution-rules.md E36 section (written by
            Agent A in wave 1, merged before wave 2 runs) and ensure saw-skill.md
            documentation is consistent. Wave sequencing (I3) guarantees Agent A's work
            is merged before Agent F runs.
