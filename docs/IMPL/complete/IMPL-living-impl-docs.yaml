suitability_assessment: |-
    All five suitability gate questions resolve cleanly.

    1. File decomposition: Work decomposes cleanly across three repositories with disjoint
       file ownership. Protocol spec, SDK protocol package, SDK CLI, web API handler, and web
       frontend are each independently owned. No single file is a bottleneck.

    2. Investigation-first: No unknowns. "Has an agent committed?" is definitively answerable
       by checking (a) presence of a completion report in the IMPL doc and (b) commits on the
       worktree branch beyond base_commit. Both checks are deterministic.

    3. Interface discoverability: AmendImplOpts, AmendImplResult, and AmendImplRequest can be
       fully specified before implementation starts. The CLI flags map directly to struct fields.
       The web endpoint shape is determined by the CLI contract.

    4. Pre-implementation status: All TODO. No amend-related logic exists anywhere in the
       codebase. The closest thing is `update-agent-prompt` (single-field update only).
       Agent prompts adjusted accordingly (implement from scratch).

    5. Parallelization value: HIGH. Three repos with Go build cycles (go build ./... takes
       ~5-10s each), ~3 files per agent avg, non-trivial logic in the amend engine.
       Sequential estimate ~60 min; parallel estimate ~20 min (wave 1 runs 4 agents in parallel
       across repos).

    Design decisions codified here:
    - Wave immutability detection: use existing completion_reports + base_commit fields (no
      new locked: field needed). A wave is "merged and immutable" if all its agents have
      status: complete completion reports. File ownership for those agents is frozen.
    - --extend-scope: re-launch Scout with current IMPL YAML as context injection. Leverages
      existing RunScout engine. A dedicated "append-only Scout mode" is deferred.
    - --redirect-agent validation: check BOTH (a) completion report absent AND (b) no commits
      on worktree branch beyond base_commit. Both together are authoritative (report could be
      absent but branch could have commits if agent crashed mid-write).
    - Amend does NOT re-run suitability gate. It runs only amend-specific invariant checks:
      no SAW:COMPLETE marker, completed waves are frozen, new file ownership passes I1, new
      contracts don't redefine frozen contracts.

    Estimated times:
    - Scout phase: ~15 min (3-repo analysis, interface contracts, IMPL doc)
    - Agent execution: ~20 min (4 parallel agents in wave 1, then 1 integration wave agent)
    - Merge and verification: ~5 min
    Total SAW time: ~40 min
    Sequential baseline: ~90 min
    Time savings: ~50 min (~55% faster)
