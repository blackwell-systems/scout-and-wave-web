suitability_assessment: |
    All five suitability questions resolve cleanly.

    1. File decomposition: Changes span 8+ distinct files across well-separated
       components. Each issue from the FTUE analysis maps to a different component
       with minimal overlap. Disjoint ownership is achievable with 7 agents.

    2. No investigation-first items: The FTUE analysis already identified root
       causes and specific file locations. No unknown crash or race condition.

    3. Interface discoverability: All cross-agent interfaces are simple prop
       additions to existing components. No novel shared types required — existing
       IMPLDocResponse, WaveBoardProps, and RepoEntry are sufficient.

    4. Pre-implementation status check: All 12 items are confirmed TODO. The
       empty-state in App.tsx shows a document icon with no onboarding copy
       (line 482-492). ScoutLauncher has no mode description (line 214-231).
       WaveBoard completion banner is missing "Scout Next Feature" in compact
       mode (line 370-384). ActionButtons has no confirmation step (line 22-33).
       RevisePanel has no instructions (line 143-152). Programs empty state uses
       CLI copy (App.tsx line 449-451). All confirmed unimplemented.

    5. Parallelization value: Frontend Vitest + Go test suite adds ~10-20s per
       cycle. 7 agents averaging 2-3 files each gives clear parallelization
       value. All agents are fully independent (single wave), maximizing speedup.

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: ~7 agents x ~8 min avg = ~56 min, running in parallel ~10 min
    - Merge & verification: ~5 min
    Total SAW time: ~25 min

    Sequential baseline: ~7 agents x 12 min = ~84 min
    Time savings: ~59 min (70% faster)

    Recommendation: Clear speedup. Single-wave fully parallel execution.
