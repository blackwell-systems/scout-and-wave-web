interface_contracts:
    - name: BuildRetryContextWithFailureType
      description: |-
        Enhanced BuildRetryContext that also reads the failure_type field from the
        completion report and includes it in the returned RetryContext. The PromptText
        field is enriched with failure_type-specific guidance. The FailureType field
        is exposed on RetryContext so callers can check it without re-reading the manifest.
      definition: |-
        // In pkg/retryctx/retryctx.go

        // RetryContext (existing struct) gains one new field:
        type RetryContext struct {
            AttemptNumber  int        `json:"attempt_number"`
            AgentID        string     `json:"agent_id"`
            ErrorClass     ErrorClass `json:"error_class"`
            ErrorExcerpt   string     `json:"error_excerpt"`
            GateResults    []string   `json:"gate_results"`
            SuggestedFixes []string   `json:"suggested_fixes"`
            PriorNotes     string     `json:"prior_notes"`
            PromptText     string     `json:"prompt_text"`
            FailureType    string     `json:"failure_type,omitempty"` // NEW: "transient"|"fixable"|"needs_replan"|"escalate"|"timeout"
        }

        // BuildRetryContext signature is unchanged; the new FailureType field is
        // populated from report.FailureType when present.
        func BuildRetryContext(manifestPath string, agentID string, attemptNum int) (*RetryContext, error)
      location: pkg/retryctx/retryctx.go
    - name: AgentRetryState
      description: |-
        Per-agent retry counter tracked in transient engine state (not written to IMPL doc).
        Used by the orchestrator wave runner to enforce the 2-retry limit for transient failures
        and 1-retry limit for fixable failures. Defined as a package-level map in orchestrator.go,
        keyed by "wave:agentLetter" and reset at RunWave entry.
      definition: |-
        // In pkg/orchestrator/orchestrator.go

        // retryCount tracks how many times each agent has been retried in this wave run.
        // Key format: "<slug>:<waveNum>:<agentLetter>" e.g. "my-feature:1:A"
        // Slug-scoped to prevent interference between concurrent IMPL executions in the same process.
        // This is transient state — not persisted to the IMPL doc.
        var retryCount sync.Map // map[string]int

        // MaxTransientRetries is the retry limit for transient failures (E19).
        const MaxTransientRetries = 2

        // MaxFixableRetries is the retry limit for fixable failures (E19).
        const MaxFixableRetries = 1
      location: pkg/orchestrator/orchestrator.go
    - name: executeRetryLoop
      description: |-
        New private function in orchestrator.go that implements the E19 retry loop.
        Called from launchAgent after detecting a partial/blocked completion report.
        Returns nil if the retry eventually succeeds or if the failure type should
        escalate (no retry). Returns error if retries are exhausted.
      definition: |-
        // In pkg/orchestrator/orchestrator.go (unexported)

        // executeRetryLoop implements E19 automatic retry for transient and fixable failures.
        // It calls launchAgent again with an enriched prompt prefix. On exhaustion or
        // non-retryable failure type, it publishes agent_blocked and returns a descriptive error.
        func (o *Orchestrator) executeRetryLoop(
            ctx context.Context,
            runner *agent.Runner,
            wm *worktree.Manager,
            waveNum int,
            agentSpec types.AgentSpec,
            report *protocol.CompletionReport,
        ) error
      location: pkg/orchestrator/orchestrator.go
    - name: SSE event auto_retry_started
      description: |-
        New SSE event published when the orchestrator automatically retries an agent
        due to transient or fixable failure_type. Consumed by the web UI to display
        retry status without human gate.
      definition: |-
        // Event name: "auto_retry_started"
        // Published by: orchestrator.go launchAgent (via publish)
        // Payload:
        {
          "agent":        string,  // agent letter e.g. "A"
          "wave":         int,     // wave number
          "failure_type": string,  // "transient" | "fixable"
          "attempt":      int,     // 1-based retry attempt number
          "max_attempts": int      // 2 for transient, 1 for fixable
        }
      location: pkg/orchestrator/orchestrator.go
    - name: SSE event auto_retry_exhausted
      description: |-
        New SSE event published when automatic retries are exhausted and the failure
        is escalated to the human. Signals the UI to surface the failure prominently.
      definition: |-
        // Event name: "auto_retry_exhausted"
        // Payload:
        {
          "agent":        string,
          "wave":         int,
          "failure_type": string,
          "attempts":     int
        }
      location: pkg/orchestrator/orchestrator.go
