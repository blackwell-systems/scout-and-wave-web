pre_mortem:
    overall_risk: medium
    rows:
        - scenario: |-
            executeRetryLoop causes infinite recursion if retry logic re-enters launchAgent
            and the retried agent also reports partial/transient.
          likelihood: medium
          impact: high
          mitigation: |-
            retryCountMap enforces the max retry limit before launchAgent is called.
            On each re-entry to launchAgent, the E19 block checks retryCountMap first;
            once count >= maxRetries the loop publishes auto_retry_exhausted and returns
            an error. Agent C must verify this with a test that asserts no stack overflow.
        - scenario: |-
            Agent C imports retryctx from orchestrator.go but retryctx already imports
            protocol (which orchestrator depends on indirectly). Creates a new import cycle.
          likelihood: low
          impact: high
          mitigation: |-
            retryctx only imports protocol (for Load). orchestrator already imports
            protocol directly. Adding retryctx to orchestrator adds a new transitive dep
            but not a cycle (retryctx does not import orchestrator). Agent C should run
            `go build ./...` immediately after adding the import to catch any cycle.
        - scenario: |-
            Agent B changes buildPromptText signature; existing callers in retryctx.go
            pass the wrong number of arguments.
          likelihood: low
          impact: medium
          mitigation: |-
            buildPromptText is unexported and has only one call site in BuildRetryContext.
            Agent B owns retryctx.go and retryctx_test.go. The test must compile and
            pass before the completion report is written. Low risk.
        - scenario: |-
            Auto-retry of a fixable failure makes the agent overwrite files that a parallel
            agent in the same wave has already committed.
          likelihood: low
          impact: high
          mitigation: |-
            Disjoint file ownership (I1) prevents two agents in the same wave from owning
            the same file. A retried agent owns the same files as its original run. The
            worktree is per-agent, so parallel worktrees are isolated. Only merge conflicts
            could arise, and these are caught by the existing VerifyCommits+MergeAgents
            pipeline post-wave. Not a new risk introduced by this feature.
        - scenario: |-
            The saw-skill.md change (Agent A) removes --auto gating for E19, but the
            protocol spec (execution-rules.md) still says E7a applies only in --auto mode.
            Inconsistency between skill and spec.
          likelihood: medium
          impact: low
          mitigation: |-
            The protocol spec (execution-rules.md line 567-570) already states E19 extends
            E7a to non-auto mode. The skill's E7a section is the one that needs updating.
            Agent A should confirm the execution-rules.md already supports the change and
            only update saw-skill.md. Post-merge, consider opening a follow-up to clarify
            E7a's own text in execution-rules.md for consistency.
        - scenario: |-
            retryCountMap is a package-level sync.Map and is never cleared between
            separate calls to StartWave/RunWave across different IMPL features.
          likelihood: low
          impact: low
          mitigation: |-
            Keys are "<waveNum>:<agentLetter>" scoped to the wave run. Different IMPL
            features use the same wave numbers (1, 2, ...) and the same agent letters
            (A, B, ...). In theory, a key from feature X wave 1 agent A could interfere
            with feature Y wave 1 agent A if run in the same process without clearing.
            Mitigation: clear keys at RunWave entry (already described in Agent C's task).
            If the web server runs multiple IMPL runs concurrently, add the slug to the key:
            "<slug>:<waveNum>:<agentLetter>". Agent C should consider this and use the slug
            if available via o.implSlug().
