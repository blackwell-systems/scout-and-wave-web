            ## File to Modify

            `/Users/dayna.blackwell/code/scout-and-wave/implementations/claude-code/prompts/saw-skill.md`

            This file is the Claude Code skill that acts as the CLI orchestrator.

            ## What to Change

            Find the E7a and E8 section in the wave execution step (step 7 in the skill).
            Currently saw-skill.md says:

            > **E7a: Automatic failure remediation in --auto mode.** When --auto is active
            > and an agent fails with a correctable issue...

            And at the end of the same paragraph describes the E19 failure_type routing.

            ### Required Changes

            1. **Remove the --auto restriction from E19 behavior.** The E19 decision tree
               (failure_type routing) must apply in ALL modes. Update the text so that
               `transient` and `fixable` failures are automatically retried regardless of
