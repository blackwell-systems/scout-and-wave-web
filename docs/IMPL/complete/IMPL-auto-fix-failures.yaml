            ### 2. Reset retry counts at wave start

            At the top of `RunWave`, after finding the wave, add:

            ```go
            // Reset per-agent retry counts for this wave run (transient state).
            // Use slug-scoped key to avoid interference between concurrent IMPL executions.
            // Obtain slug via o.implSlug() or derive from manifest path (filepath.Base strips ext).
            implSlug := o.implSlug() // or: strings.TrimSuffix(filepath.Base(o.manifestPath), ".yaml")
            for _, a := range wave.Agents {
                retryCountMap.Delete(fmt.Sprintf("%s:%d:%s", implSlug, waveNum, a.Letter))
            }
            ```

            ### 3. Add new SSE event payload types

            After `AgentBlockedPayload`, add:

            ```go
            // AutoRetryStartedPayload is published when the orchestrator auto-retries an agent (E19).
            type AutoRetryStartedPayload struct {
                Agent       string `json:"agent"`
                Wave        int    `json:"wave"`
                FailureType string `json:"failure_type"`
                Attempt     int    `json:"attempt"`
                MaxAttempts int    `json:"max_attempts"`
            }

            // AutoRetryExhaustedPayload is published when auto-retries are exhausted (E19).
            type AutoRetryExhaustedPayload struct {
                Agent       string `json:"agent"`
                Wave        int    `json:"wave"`
                FailureType string `json:"failure_type"`
                Attempts    int    `json:"attempts"`
            }
            ```

            ### 4. Implement `executeRetryLoop`

            Add a new unexported method after `launchAgent`:

            ```go
            // executeRetryLoop implements E19 automatic retry for transient and fixable failures.
            // It is called from launchAgent when a completion report has partial/blocked status
            // and a failure_type of "transient" or "fixable". Returns nil if retry eventually
            // succeeds (report.Status == "complete"), or an error if retries are exhausted
            // or if the failure_type does not warrant automatic retry.
            func (o *Orchestrator) executeRetryLoop(
                ctx context.Context,
                runner *agent.Runner,
                wm *worktree.Manager,
                waveNum int,
                agentSpec types.AgentSpec,
                report *protocol.CompletionReport,
            ) error {
                failureType := report.FailureType

                // Determine max retries per E19.
                // timeout uses MaxFixableRetries (1) not MaxTransientRetries (2):
                // failure.go maps timeout → ActionRetryWithScope (retry once with scope-reduction note).
                var maxRetries int
                switch failureType {
                case "transient":
                    maxRetries = MaxTransientRetries
                case "timeout":
                    maxRetries = MaxFixableRetries // E19: timeout retries once with scope-reduction note
                case "fixable":
                    maxRetries = MaxFixableRetries
                default:
                    // needs_replan or escalate: do not retry automatically.
                    return fmt.Errorf("orchestrator: agent %s: failure_type=%q requires human intervention", agentSpec.Letter, failureType)
                }

                // Check and increment retry count.
                // Use slug-scoped key to prevent cross-IMPL contamination in concurrent server runs.
                implSlug := o.implSlug()
                key := fmt.Sprintf("%s:%d:%s", implSlug, waveNum, agentSpec.Letter)
                count := 0
                if v, ok := retryCountMap.Load(key); ok {
                    if n, ok := v.(int); ok { // safe assertion; panics if wrong type otherwise
                        count = n
                    }
                }
                if count >= maxRetries {
                    o.publish(OrchestratorEvent{
                        Event: "auto_retry_exhausted",
                        Data: AutoRetryExhaustedPayload{
                            Agent:       agentSpec.Letter,
                            Wave:        waveNum,
                            FailureType: failureType,
                            Attempts:    count,
                        },
                    })
                    return fmt.Errorf("orchestrator: agent %s: auto-retry exhausted after %d attempts (failure_type=%s)", agentSpec.Letter, count, failureType)
                }
                count++
                retryCountMap.Store(key, count)

                // Build retry context using retryctx package (enriched prompt with fix guidance).
                var promptPrefix string
                if o.implDocPath != "" {
                    rc, rcErr := retryctx.BuildRetryContext(o.implDocPath, agentSpec.Letter, count)
                    if rcErr != nil {
                        fmt.Fprintf(os.Stderr, "orchestrator: retry context build (best-effort): %v\n", rcErr)
                    } else if rc != nil && rc.PromptText != "" {
                        promptPrefix = rc.PromptText
                    }
                }

                // Publish auto_retry_started event.
                o.publish(OrchestratorEvent{
                    Event: "auto_retry_started",
                    Data: AutoRetryStartedPayload{
                        Agent:       agentSpec.Letter,
                        Wave:        waveNum,
                        FailureType: failureType,
                        Attempt:     count,
                        MaxAttempts: maxRetries,
                    },
                })

                // Store retry prefix in retryPrefixMap BEFORE calling launchAgent.
                // DO NOT set retrySpec.Prompt here — E23 extraction in launchAgent will
                // overwrite it (GAP-4 fix). Instead, launchAgent reads from retryPrefixMap
                // after E23 extraction and injects the prefix there.
                if promptPrefix != "" {
                    retryPrefixMap.Store(key, promptPrefix)
                }
                retrySpec := agentSpec // Prompt NOT modified here

                // Re-launch agent (recursive call to launchAgent; retry count prevents infinite loop).
                return o.launchAgent(ctx, runner, wm, waveNum, retrySpec)
            }
            ```

            Note: `retryctx` package must be imported. Add to imports:
            `"github.com/blackwell-systems/scout-and-wave-go/pkg/retryctx"`

            ### 5. Wire `executeRetryLoop` into `launchAgent`

            In `launchAgent`, find the E19 block (around line 772):

            ```go
            // E19: If agent reported partial or blocked, route the failure and publish an event.
            if report != nil && (report.Status == "partial" || report.Status == "blocked") {
                // ... existing RouteFailure + agent_blocked publish ...
            }
            return nil
            ```

            Replace it with:

            ```go
            // E19: If agent reported partial or blocked, apply the decision tree.
            if report != nil && (report.Status == "partial" || report.Status == "blocked") {
                var failureType types.FailureType
                switch report.FailureType {
                case "transient":
                    failureType = types.FailureTypeTransient
                case "fixable":
                    failureType = types.FailureTypeFixable
                case "needs_replan":
                    failureType = types.FailureTypeNeedsReplan
                case "escalate":
                    failureType = types.FailureTypeEscalate
                case "timeout":
                    failureType = types.FailureTypeTimeout
                default:
                    failureType = types.FailureTypeEscalate
                }

                action := RouteFailure(failureType)
                o.publish(OrchestratorEvent{
                    Event: "agent_blocked",
                    Data: AgentBlockedPayload{
                        Agent:       agentSpec.Letter,
                        Wave:        waveNum,
                        Status:      report.Status,
                        FailureType: report.FailureType,
                        Action:      action,
                    },
                })

                switch action {
                case ActionRetry, ActionApplyAndRelaunch, ActionRetryWithScope:
                    // E19: transient/fixable/timeout — execute retry loop (no human gate).
                    if retryErr := o.executeRetryLoop(ctx, runner, wm, waveNum, agentSpec, report); retryErr != nil {
                        return retryErr
                    }
                case ActionReplan, ActionEscalate:
                    // E19: needs_replan/escalate — return error to surface to human.
                    return fmt.Errorf("orchestrator: agent %s: %s failure (failure_type=%s): requires human intervention",
                        agentSpec.Letter, report.Status, report.FailureType)
                }
            }
            return nil
            ```

            ### 6. Fix GAP-4: Preserve retry prefix through E23 extraction

            **Problem:** `executeRetryLoop` (section 4) stores the retry prefix in
            `retryPrefixMap` before calling `launchAgent`. But inside `launchAgent`, the E23
            extraction block (around line 641) unconditionally overwrites `agentSpec.Prompt`
            with the E23 JSON payload — discarding any retry prefix set before the call.

            **Fix:** In `launchAgent`, immediately AFTER the E23 extraction block, inject the
            retry prefix if one is stored in `retryPrefixMap` for this agent:

            ```go
            // Inject retry prefix after E23 extraction (GAP-4 fix).
            // retryPrefixMap is set by executeRetryLoop; read here after E23 so the prefix
            // is preserved even though E23 overwrites the base prompt.
            retryKey := fmt.Sprintf("%s:%d:%s", o.implSlug(), waveNum, agentSpec.Letter)
            if prefix, ok := retryPrefixMap.Load(retryKey); ok {
                if prefixStr, ok2 := prefix.(string); ok2 && prefixStr != "" {
                    agentSpec.Prompt = prefixStr + "\n\n" + agentSpec.Prompt
                    retryPrefixMap.Delete(retryKey) // consume once; recursive retries store fresh
                }
            }
            ```

            Place this block immediately after the closing `}` of the E23 extraction block
            (after the `else { fmt.Fprintf(os.Stderr, "orchestrator: failed to load manifest...") }`
            line), before the `// b. Execute the agent...` comment.

            ### 7. Fix BUG-5: Defer agent_complete publish past the retry decision

            **Problem:** `agent_complete` is published with `status: "partial"` BEFORE the E19
            retry block runs. Late SSE clients cache this partial status permanently, even if
            the retry eventually succeeds.

            **Fix:** Suppress the `agent_complete` publish when a retry is about to be
            triggered. Only publish after the outcome is settled.

            Replace the unconditional `agent_complete` publish + E19 block with:

            ```go
            // Determine whether E19 will trigger an automatic retry before publishing
            // agent_complete. If retry is coming, suppress the publish here — the recursive
            // launchAgent call (from executeRetryLoop) will publish agent_complete with the
            // final settled status.
            willAutoRetry := report != nil &&
                (report.Status == "partial" || report.Status == "blocked") &&
                (report.FailureType == "transient" || report.FailureType == "fixable" || report.FailureType == "timeout")

            if !willAutoRetry {
                status := "complete"
                if report != nil {
                    status = string(report.Status)
                }
                o.publish(OrchestratorEvent{
                    Event: "agent_complete",
                    Data: AgentCompletePayload{
                        Agent:  agentSpec.Letter,
                        Wave:   waveNum,
                        Status: status,
                        Branch: branch,
                    },
                })
            }

            // E19: If agent reported partial or blocked, apply the decision tree.
            if report != nil && (report.Status == "partial" || report.Status == "blocked") {
                // ... (same switch + action routing + executeRetryLoop call as section 5)
                // The inner launchAgent call from executeRetryLoop will publish agent_complete
                // with the final status. No additional publish needed here.
            }
            return nil
            ```

            ### 8. Fix BUG-4: Preserve existing partial report when auto-synthesize runs on retry

            **Problem:** When a retried agent (API/vanilla Claude) fails to write a completion
            report, `report == nil` → auto-synthesize creates `{status: "complete"}` and
            persists it to the main IMPL doc — overwriting the `partial` report that the
            FIRST run wrote. The retry is then indistinguishable from success.

            **Fix:** In section (d), before auto-synthesizing, check if the main IMPL doc
            already has a `partial` or `blocked` report for this agent. If it does, preserve
            it rather than overwriting with `complete`.

            Change the section (d) block from:
            ```go
            if report == nil {
                commitSHA, filesChanged, autoErr := autoCommitWorktree(...)
                // ...
                report = &protocol.CompletionReport{Status: "complete", ...}
            }
            ```

            To:
            ```go
            if report == nil {
                // BUG-4 fix: Before synthesizing "complete", check if a previous retry wrote
                // a partial/blocked report to the main IMPL doc. If so, reuse it rather than
                // masking the failure with a spurious "complete".
                // Use direct map lookup — IMPLManifest.CompletionReports is keyed by agent letter.
                // NOTE: FindWave() does NOT exist on protocol.IMPLManifest. Do NOT use it.
                if manifest, checkErr := protocol.Load(o.implDocPath); checkErr == nil {
                    if cr, ok := manifest.CompletionReports[agentSpec.Letter]; ok &&
                        (cr.Status == "partial" || cr.Status == "blocked") {
                        report = cr
                    }
                }
            }
            if report == nil {
                // Only auto-synthesize complete if no existing partial/blocked report was found.
                commitSHA, filesChanged, autoErr := autoCommitWorktree(wtPath, waveNum, agentSpec.Letter, baseSHA)
                if autoErr != nil {
                    fmt.Fprintf(os.Stderr, "orchestrator: auto-commit failed for agent %s: %v\n", agentSpec.Letter, autoErr)
                }
                notes := "auto-committed by orchestrator (API agent)"
                if commitSHA == "" {
                    commitSHA, _ = git.RevParse(wtPath, "HEAD")
                    notes = "no changes produced (API agent)"
                }
                report = &protocol.CompletionReport{
                    Status:       "complete",
                    Worktree:     wtPath,
                    Branch:       branch,
                    Commit:       commitSHA,
                    FilesChanged: filesChanged,
                    Notes:        notes,
                }
            }
            ```

            Note: Check whether `manifest.FindWave` or direct iteration `manifest.Waves[waveNum-1].Agents`
            is the correct access pattern for the loaded manifest — use whichever matches the
            `protocol.IMPLManifest` structure. The completion report field on an agent may be
            `CompletionReport` or accessed via a helper; check the protocol package API.

