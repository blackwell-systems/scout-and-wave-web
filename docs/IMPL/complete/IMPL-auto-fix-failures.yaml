title: Auto-fix Transient/Fixable Agent Failures
feature_slug: auto-fix-failures
verdict: SUITABLE
suitability_assessment: |-
    File decomposition: Changes span 4 distinct files across 2 repos with no conflicting
    ownership. Protocol doc (saw-skill.md), Go engine retryctx (retryctx.go), Go
    orchestrator wave runner (orchestrator.go), and web app wave runner
    (wave_runner.go). Each file is independently ownable.

    Investigation-first: Not required. The failure classification system already exists
    (RouteFailure, FailureType constants, build-retry-context). The gap is purely
    mechanical: the routed action is published as an SSE event but never executed.
    No root-cause investigation needed.

    Interface discoverability: All cross-agent interfaces can be defined upfront.
    Agent A delivers a new retryctx function signature that Agent B calls; Agent C
    delivers engine changes that Agent D references. No circular dependencies.

    Pre-implementation status check (findings against codebase):
    - E19 protocol rule (execution-rules.md): EXISTS but enforcement is incomplete.
      RouteFailure() maps failure_type to OrchestratorAction; agent_blocked event is
      published but no retry loop executes. The CLI skill (saw-skill.md) restricts
      E7a auto-remediation to --auto mode. Protocol says E19 applies regardless of
      --auto mode — this is the gap to close.
    - RetryContext building (retryctx.go): EXISTS. BuildRetryContext classifies errors
      from notes/verification text. Does not read failure_type field — it performs
      independent classification. Used in web rerun handler and RunSingleAgent but not
      in the automatic post-wave failure path.
    - AutoRemediate (auto_remediate.go): EXISTS but addresses build-fix loop after
      merge, not pre-merge agent failure retry. Unrelated to this feature.
    - Wave runner retry loop: DOES NOT EXIST. RunWave in orchestrator.go publishes
      agent_blocked but immediately returns nil (success). No retry loop. The web
      wave_runner.go calls RunSingleWave and treats any agent completion as done.
    - saw-skill.md E7a: EXISTS but explicitly scoped to --auto mode. E19 in
      execution-rules.md says it applies in all modes.

    Parallelization value: HIGH. Wave 1 has 2 agents across different repos (go vs
    web) with fully independent file ownership. Build cycles for Go are >30s.
    Agent A touches 1 file in scout-and-wave, Agent B touches 1 file in
    scout-and-wave-go (retryctx), Agent C touches 1 file in scout-and-wave-go
    (orchestrator), Agent D touches 1 file in scout-and-wave-web. All 4 agents are
    independent and can run in parallel.

    Estimated times:
    - Scout phase: ~15 min (deep cross-repo dependency analysis)
    - Agent execution: ~4 agents x ~12 min avg = ~12 min (parallel Wave 1)
    - Merge and verification: ~8 min
    Total SAW time: ~35 min
    Sequential baseline: ~4 x 15 min = ~60 min
    Time savings: ~25 min (~40% faster)
    Recommendation: Clear speedup with cross-repo parallel agents.
