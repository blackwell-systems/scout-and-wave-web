interface_contracts:
    - name: ParseGoModReplace
      description: |
        Parses the replace directives from a go.mod file and returns a set of
        module paths that are satisfied by local replacements. Used by CheckDeps
        to skip false-positive "missing dependency" reports for locally-replaced
        modules. Lives in the new pkg/deps/gomod.go file.
      definition: |
        // ParseGoModReplace reads goModPath and returns the set of module paths
        // declared in replace directives that point to a local directory
        // (i.e. the replacement is a relative or absolute filesystem path, not
        // a versioned module). Returns an empty map (not nil) on any error.
        //
        // Example go.mod fragment handled:
        //   replace github.com/blackwell-systems/scout-and-wave-go => ../scout-and-wave-go
        //
        // The returned map key is the original module path (before "=>").
        func ParseGoModReplace(goModPath string) map[string]struct{}
      location: pkg/deps/gomod.go
    - name: PrepareWaveResult (extended)
      description: |
        The existing PrepareWaveResult struct in cmd/saw/prepare_wave.go gains a
        new Repos field listing the distinct repos touched in the wave. AgentBriefInfo
        gains a Repo field. These changes are backward-compatible (omitempty on new
        fields).
      definition: |
        // PrepareWaveResult is the JSON output of prepare-wave.
        type PrepareWaveResult struct {
            Wave        int                    `json:"wave"`
            Worktrees   []protocol.WorktreeInfo `json:"worktrees"`
            AgentBriefs []AgentBriefInfo        `json:"agent_briefs"`
            Repos       []string               `json:"repos,omitempty"` // distinct repo names used this wave
        }

        // AgentBriefInfo gains a Repo field.
        type AgentBriefInfo struct {
            Agent       string `json:"agent"`
            BriefPath   string `json:"brief_path"`
            BriefLength int    `json:"brief_length"`
            JournalDir  string `json:"journal_dir"`
            FilesOwned  int    `json:"files_owned"`
            Repo        string `json:"repo,omitempty"` // repo name from file_ownership; empty = primary repo
        }
      location: cmd/saw/prepare_wave.go
    - name: LoadSAWConfigRepos
      description: |
        Reads saw.config.json from configPath and returns the repos[] array.
        Returns an empty slice (not nil) if the file does not exist or has no repos.
        Used by prepare_wave.go to resolve repo name -> absolute path.
        Lives in cmd/saw/prepare_wave.go (package main) as a private helper.
      definition: |
        // loadSAWConfigRepos reads saw.config.json at configPath and returns
        // the repos array. Returns nil slice if file absent or parse fails.
        type sawRepoEntry struct {
            Name string `json:"name"`
            Path string `json:"path"`
        }
        func loadSAWConfigRepos(configPath string) []sawRepoEntry
      location: cmd/saw/prepare_wave.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Agent A — deps package: go.mod replace-directive fix

            ### Context
            `pkg/deps/checker.go` contains `CheckDeps`, which calls
            `extractExternalImports` and then cross-references imports against
            go.sum/go.mod lock files. When a Go project uses `replace` directives
            pointing to a local path (e.g. `replace github.com/foo/bar => ../bar`),
            the replaced module does NOT appear in go.sum. As a result, `CheckDeps`
            reports it as a `MissingDep` — a false positive that blocks wave setup.

            ### What to implement

            **1. Create `pkg/deps/gomod.go`** with:
            ```go
            package deps

            // ParseGoModReplace reads goModPath and returns the set of module paths
            // declared in replace directives that point to a local directory
            // (i.e. the replacement is a relative or absolute filesystem path, not
            // a versioned module). Returns an empty map (not nil) on any error.
            func ParseGoModReplace(goModPath string) map[string]struct{}
            ```
            Implementation notes:
            - Read the file line by line (same approach as existing `getModulePath`).
            - Detect the `replace` block: single-line form
              `replace A => B` and block form `replace ( ... )`.
            - For each replace directive: split on `=>`, trim whitespace from both
              sides. The replacement side is "local" if it does NOT contain `@`
              (versioned modules always have `@vX.Y.Z`; local dirs do not).
            - Return the set of original module paths (left side of `=>`).
            - On any parse error, return the empty map (do not return error; callers
              are defensive).

            **2. Modify `pkg/deps/checker.go`** — update `CheckDeps` to:
            - Call `ParseGoModReplace(filepath.Join(repoRoot, "go.mod"))` at the
              start of the cross-reference phase (step 6).
            - When classifying an import as `!inLockFile`, also check whether the
              import path has a prefix matching any key in the replace map. If it
              does, skip it (not a missing dep — satisfied by local replace).
            - Use the same prefix-match logic already in `findLockPackage`: longest
              module prefix wins.

            **3. Update `pkg/deps/checker_test.go`** — add a test:
            - `TestCheckDeps_ReplaceDirective`: construct a minimal go.mod with a
              `replace` block pointing to a local dir, a go.sum that does NOT include
              that module, and a .go file that imports it. Assert that `CheckDeps`
              returns zero `MissingDeps` (the replace satisfies it).

            ### Interface contracts
            `ParseGoModReplace` signature is defined above — implement exactly that.

            ### Verification gate
            ```
            go build ./pkg/deps/...
            go vet ./pkg/deps/...
            go test ./pkg/deps/...
            ```

            ### Constraints
            - Do NOT modify any file outside `pkg/deps/`.
            - Do NOT change the `LockFileParser` interface or `CheckDeps` signature.
            - Return `map[string]struct{}` (not `map[string]bool`) to match Go idiom
              for sets.
          files:
            - pkg/deps/gomod.go
            - pkg/deps/checker.go
            - pkg/deps/checker_test.go
        - id: B
          task: |
            ## Agent B — cmd/saw/prepare_wave.go: multi-repo aware orchestration

            ### Context
            `prepare_wave.go` currently calls `protocol.CreateWorktrees` (which
            already handles cross-repo worktree placement via `file_ownership[].repo`)
            but then iterates `worktreeResult.Worktrees` and initialises journals and
            writes briefs using a single `projectRoot` for ALL agents — regardless of
            which repo each agent belongs to.

            Additionally, `checkDependencies` derives `repoDir` from the manifest
            path using a fixed 3-level parent assumption
            (`filepath.Dir(filepath.Dir(filepath.Dir(manifestPath)))`), which is
            wrong for multi-repo IMPLs where agents live in sibling repos.

            `saw.config.json` already has a `repos[]` array with `name` + `path`
            fields. The fix is to read that config and route each agent's journal
            and brief to the correct repo root.

            ### What to implement

            **1. Add `loadSAWConfigRepos` helper** (private, package main):
            ```go
            type sawRepoEntry struct {
                Name string `json:"name"`
                Path string `json:"path"`
            }

            // loadSAWConfigRepos reads saw.config.json from configPath and returns
            // the repos array. Returns nil if file absent or parse fails.
            func loadSAWConfigRepos(configPath string) []sawRepoEntry
            ```
            - `configPath` is the full path to saw.config.json (e.g.
              `filepath.Join(projectRoot, "saw.config.json")`).
            - Unmarshal only the `repos` top-level key (use a minimal struct with
              `Repos []sawRepoEntry \`json:"repos"\``).
            - Return nil on any error; callers fall back to projectRoot.

            **2. Add `resolveAgentRepoRoot` helper**:
            ```go
            // resolveAgentRepoRoot returns the absolute repo root for agentID.
            // It looks up the agent's repo name from fileOwnership, then resolves
            // the path from the repos registry. Falls back to projectRoot if the
            // agent has no repo field or the repo is not found in the registry.
            func resolveAgentRepoRoot(
                fileOwnership []protocol.FileOwnership,
                agentID string,
                projectRoot string,
                repos []sawRepoEntry,
            ) string
            ```

            **3. Update `PrepareWaveResult` and `AgentBriefInfo`** per the interface
            contract above (add `Repos []string` and `Repo string` fields).

            **4. Update `newPrepareWaveCmd` RunE** to:
            a. After resolving `projectRoot`, load repos config:
               ```go
               repos := loadSAWConfigRepos(filepath.Join(projectRoot, "saw.config.json"))
               ```
            b. For each agent in the worktree loop, call `resolveAgentRepoRoot` to
               get `agentRoot` (the repo root for that specific agent).
            c. Write the brief to `filepath.Join(wtInfo.Path, ".saw-agent-brief.md")`
               — this already uses `wtInfo.Path` which CreateWorktrees sets correctly,
               so brief writing is already correct. No change needed here.
            d. Pass `agentRoot` (not `projectRoot`) to `journal.NewObserver`:
               ```go
               observer, err := journal.NewObserver(agentRoot, fullAgentID)
               ```
            e. Populate `AgentBriefInfo.Repo` from `determineAgentRepo` equivalent
               (look up the agent's repo name from `doc.FileOwnership`).
            f. Collect distinct repo names touched this wave into `result.Repos`.

            **5. Update `checkDependencies` call** in RunE:
            - The existing call passes `projectRoot` as the `repoDir` argument, but
              `checkDependencies` currently ignores `repoDir` entirely (the function
              signature accepts it but `CheckDeps` re-derives the root from implPath).
              This is pre-existing behaviour — do NOT change `CheckDeps` signature.
              Leave the call site unchanged.

            ### Interface contracts
            See `PrepareWaveResult`, `AgentBriefInfo`, and `loadSAWConfigRepos`
            definitions in the interface_contracts section above.

            ### Verification gate
            ```
            go build ./cmd/saw/...
            go vet ./cmd/saw/...
            go test ./cmd/saw/... -run TestPrepareWave
            ```
            If no existing TestPrepareWave exists, add a minimal test that calls
            `loadSAWConfigRepos` with a temp file containing a valid repos JSON.

            ### Constraints
            - Do NOT modify any file outside `cmd/saw/`.
            - Do NOT change `protocol.CreateWorktrees` — it already handles cross-repo
              worktree paths correctly.
            - `sawRepoEntry` must be a private type (lowercase package prefix).
              Do NOT reuse `api.RepoEntry` from scout-and-wave-web — that is a
              different module.
            - The `resolveAgentRepoRoot` function MUST fall back to `projectRoot`
              gracefully when saw.config.json is absent or the repo name is not found.
          files:
            - cmd/saw/prepare_wave.go
      base_commit: b6dfa32c223df457198fe4ba14f913b9fbf8d81c
