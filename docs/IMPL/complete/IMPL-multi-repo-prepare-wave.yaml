completion_date: "2026-03-19"
title: Multi-Repo Aware prepare-wave
feature_slug: multi-repo-prepare-wave
verdict: SUITABLE
suitability_assessment: |
    The work decomposes cleanly across 3 independent files with disjoint ownership:
    1. pkg/deps/checker.go — replace-directive fix (self-contained parser logic)
    2. pkg/deps/gomod.go (new) — shared go.mod parsing helpers extracted from checker.go
    3. cmd/saw/prepare_wave.go — multi-repo orchestration (config loading + per-repo
       worktree/brief/journal dispatch)

    All 5 suitability questions resolve cleanly:
    1. File decomposition: 3 files, no shared writes in the same wave.
    2. No investigation-first items: root cause of both bugs is clear from the code.
       CreateWorktrees already handles cross-repo via sibling-dir resolution; the gap
       is that prepare_wave.go passes a single projectRoot to CreateWorktrees, then
       iterates wtInfo.Path (which IS correct per-repo) but initialises journals and
       writes briefs using projectRoot for every agent regardless of repo.
    3. Interface contracts are fully discoverable from existing code.
    4. Pre-implementation status:
       - Multi-repo worktree creation: PARTIAL (CreateWorktrees already resolves
         per-repo dirs; the gap is in prepare_wave.go journal/brief paths and the
         dep-checker projectRoot derivation).
       - replace-directive false positives: TODO.
       - Unified JSON with per-agent repo field: TODO.
    5. Parallelization value: moderate. Two independent tasks (dep-checker fix vs
       prepare-wave multi-repo orchestration), each touching different packages.
       go test ./... takes ~5-10s. Clear speedup over sequential.

    Estimated times:
    - Scout phase: ~15 min
    - Agent execution: ~2 agents x 15 min avg, running in parallel = ~15 min
    - Merge and verification: ~5 min
    Total SAW time: ~35 min
    Sequential baseline: ~40 min
    Recommendation: Marginal speed gain but strong coordination value — interface
    contract between the two packages is non-trivial to get right without upfront spec.
