pre_mortem:
    overall_risk: low
    rows:
        - scenario: |
            Agent A parses replace blocks incorrectly for the multi-line `replace ( ... )`
            form and misses some directives.
          likelihood: medium
          impact: low
          mitigation: |
            The test `TestCheckDeps_ReplaceDirective` must cover both single-line
            and block-form replace directives. Agent A must test both forms.
        - scenario: |
            Agent B's `resolveAgentRepoRoot` falls back to `projectRoot` when
            saw.config.json exists but uses a different key name, silently giving
            wrong journal paths for multi-repo waves.
          likelihood: low
          impact: medium
          mitigation: |
            The fallback behaviour is safe (single-repo waves are unaffected).
            Document that the `repos[].name` value in saw.config.json must match
            the `repo:` field in file_ownership exactly. Add a log warning (not
            error) when a repo name is not found in the registry.
        - scenario: |
            prepare_wave.go writes .saw-ownership.json to `filepath.Dir(briefPath)`
            which for cross-repo agents points into a different repo's worktree.
            This is correct — it should be in the worktree where the agent runs.
            No change needed but reviewers may flag it.
          likelihood: low
          impact: low
          mitigation: |
            No code change required. The ownership file path follows briefPath
            by design. Document in the PR that this is intentional.
        - scenario: |
            The go.mod `getModulePath` function in checker.go and the new
            `ParseGoModReplace` in gomod.go duplicate file-parsing logic.
          likelihood: high
          impact: low
          mitigation: |
            Agent A should move `getModulePath` into gomod.go alongside
            `ParseGoModReplace` to keep go.mod parsing co-located. Checker.go
            then calls both from gomod.go. This is a refactor within Agent A's
            owned files — no cross-agent conflict.
