pre_mortem:
    overall_risk: low
    rows:
        - scenario: |-
            CSS specificity conflict — .high-contrast overrides are outcompeted by
            Base16 theme vars injected at runtime via injectThemeStyles(), since those
            use .dark.theme-X and .theme-X selectors which may have higher specificity
            than .high-contrast in some combinations.
          likelihood: medium
          impact: medium
          mitigation: |-
            Agent A should verify selector specificity. If Base16 theme selectors win,
            add .high-contrast overrides inside a higher-specificity wrapper or use
            :is(.high-contrast, .dark.high-contrast) with !important as a last resort.
            Alternatively, the useContrast hook can inject a <style> tag with even higher
            specificity overrides after injectThemeStyles() runs, similar to how
            injectThemeStyles itself works.
        - scenario: |-
            Go backend config_service.go change is isolated but the saw binary must
            be rebuilt for the contrast field to round-trip through the API. If the
            agent only tests the TypeScript side, the contrast value will silently
            be dropped on save.
          likelihood: low
          impact: medium
          mitigation: |-
            Agent B's verification gate includes `go build ./...` to catch compile errors.
            End-to-end test (save contrast=high, reload page, verify class is re-applied)
            should be done manually after merge or noted in post-merge checklist.
        - scenario: |-
            lucide-react version in web/package.json may not export a `Contrast` icon.
            Agent C would need to fall back to an inline SVG or pick an alternative icon.
          likelihood: medium
          impact: low
          mitigation: |-
            Agent C task already includes an inline SVG fallback and instructs the agent
            to check at runtime. The feature is not blocked — any accessible icon works.
        - scenario: |-
            Dot-grid background-image defined in index.css uses .dark body selector.
            If Agent A adds .high-contrast body { background-image: none } but the
            selector order in the file puts it before .dark body, specificity may not
            override correctly in dark high-contrast mode.
          likelihood: low
          impact: low
          mitigation: |-
            Agent A should place the .high-contrast body rule after both body and
            .dark body rules so cascade order ensures it wins. Both have the same
            specificity (one class + element), so source order is the tiebreaker.
