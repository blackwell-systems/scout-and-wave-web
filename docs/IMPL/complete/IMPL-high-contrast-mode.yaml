                  {/* Use lucide Contrast icon or a simple SVG */}
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    className={`w-5 h-5 ${isHighContrast ? 'text-primary' : ''}`}
                    fill="none"
                    viewBox="0 0 24 24"
