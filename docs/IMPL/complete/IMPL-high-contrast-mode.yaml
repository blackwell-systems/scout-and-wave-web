waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Agent A — CSS Variables for High-Contrast Mode

            ### What to implement
            Add a `.high-contrast` CSS selector block to
            `web/src/index.css` that overrides the semantic CSS variables
            to meet WCAG AA contrast ratios. This block must work on top of
            both light and dark base themes (i.e., it is additive, not
            replacing the existing `:root` or `.dark` blocks).

            ### CSS variable overrides required
            Add the following block after the existing `.dark { ... }` block
            inside `@layer base`:

            ```css
            .high-contrast {
              --background: 0 0% 100%;
              --foreground: 0 0% 0%;
              --muted: 0 0% 85%;
              --muted-foreground: 0 0% 15%;
              --border: 0 0% 0%;
              --input: 0 0% 85%;
              --ring: 240 100% 40%;
              --primary: 240 100% 35%;
              --primary-foreground: 0 0% 100%;
              --secondary: 0 0% 0%;
              --secondary-foreground: 0 0% 100%;
              --accent: 240 100% 35%;
              --accent-foreground: 0 0% 100%;
              --destructive: 0 100% 30%;
              --destructive-foreground: 0 0% 100%;
              --card: 0 0% 95%;
              --card-foreground: 0 0% 0%;
              --popover: 0 0% 95%;
              --popover-foreground: 0 0% 0%;
            }

            .dark.high-contrast {
              --background: 0 0% 0%;
              --foreground: 0 0% 100%;
              --muted: 0 0% 15%;
              --muted-foreground: 0 0% 90%;
              --border: 0 0% 100%;
              --input: 0 0% 15%;
              --ring: 60 100% 60%;
              --primary: 60 100% 60%;
              --primary-foreground: 0 0% 0%;
              --secondary: 0 0% 100%;
              --secondary-foreground: 0 0% 0%;
              --accent: 60 100% 60%;
              --accent-foreground: 0 0% 0%;
              --destructive: 0 100% 60%;
              --destructive-foreground: 0 0% 0%;
              --card: 0 0% 10%;
              --card-foreground: 0 0% 100%;
              --popover: 0 0% 10%;
              --popover-foreground: 0 0% 100%;
            }
            ```

            The rationale: `.high-contrast` (without `.dark`) targets light-mode
            high-contrast. `.dark.high-contrast` targets dark-mode high-contrast.
            Both selectors have higher specificity than `:root` and `.dark`
            respectively, so they win when both classes are present.

            Also add a body background-image override so the dot-grid texture
            is disabled in high-contrast mode (noise reduces readability):

            ```css
            .high-contrast body {
              background-image: none;
            }
            ```

            ### Constraints
            - Do NOT touch the `:root` or `.dark` blocks.
            - Do NOT modify `base16-themes.ts` (auto-generated, off-limits).
            - These CSS vars must use the same HSL channel format ("H S% L%")
              as all existing vars in this file.

            ### Verification gate
            ```
            cd /Users/dayna.blackwell/code/scout-and-wave-web/web && tsc --noEmit
            ```
            (TypeScript compile verifies no import errors from index.css changes.)
