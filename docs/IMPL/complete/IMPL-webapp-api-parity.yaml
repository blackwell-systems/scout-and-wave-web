        - id: G
          task: |
            ## Agent G — ImportPanel Component

            **What to implement:**
            Create a new React component `web/src/components/ImportPanel.tsx` that
            provides a UI for importing existing IMPL docs into a PROGRAM manifest.
            This component consumes the API endpoint created by Agent C.

            **Implementation requirements:**
            1. Component structure:
               - Form inputs:
                 - Program slug (text input)
                 - Discover mode toggle (checkbox: "Auto-discover IMPLs from docs/IMPL/")
                 - Manual IMPL paths (textarea, one per line, disabled if discover=true)
                 - Tier assignment table (if discover=true, show list of discovered IMPLs with tier number dropdowns)
               - "Import IMPLs" button (POST /api/impl/import)
               - Results panel (appears after import):
                 - Count of imported IMPLs
                 - Count of skipped IMPLs (already present)
                 - List of imported slugs

            2. State management:
               - `programSlug: string`
               - `discoverMode: boolean`
               - `manualPaths: string` — textarea value
               - `tierMap: Record<string, number>` — slug -> tier assignments
               - `result: ImportIMPLsResponse | null`
               - `isImporting: boolean`

            3. API integration:
               - Call `sawClient.impl.importImpls(req)` on form submit
               - Build request from form state:
                 - `program_slug`: from programSlug
                 - `discover`: from discoverMode
                 - `impl_paths`: split manualPaths by newline if not discover mode
                 - `tier_map`: from tierMap
               - Display result with counts and lists

            4. UI design:
               - Place in SettingsScreen as a new "Import IMPLs" section (or Programs page)
               - Use Card component for form and results
               - Show tier dropdowns (1-5) for each discovered IMPL
               - Display success message with link to PROGRAM manifest

            **Testing requirements:**
            - Unit test: form inputs render correctly
            - Unit test: discover mode disables manual paths textarea
            - Unit test: import button calls sawClient.impl.importImpls with correct payload
            - Unit test: result panel displays imported/skipped counts

            **Verification gate:**
            ```bash
            cd web && npm run build && npm test -- ImportPanel.test.tsx
            ```

            **Constraints:**
            - Import sawClient from '../lib/apiClient'
            - Use existing UI components from './ui/' directory
            - Add to SettingsScreen.tsx as a new tab or to ProgramList.tsx as a button
            - Default tier to 1 in tier dropdowns
          files:
