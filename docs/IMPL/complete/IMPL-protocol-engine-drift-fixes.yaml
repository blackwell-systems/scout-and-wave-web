            ## Context
            You are Agent B in Wave 1 of the protocol-engine-drift-fixes IMPL. Your task is
            implementing two missing sawtools commands that are referenced in saw-skill.md but
            do not yet exist as Go code: `update-program-state` and `update-program-impl`.

            ## What to Implement

            ### File 1: cmd/saw/update_program_state_cmd.go

            Create this file in /Users/dayna.blackwell/code/scout-and-wave-go/cmd/saw/.
            Pattern: follow the structure of existing program_status_cmd.go or update_status.go.

            Command spec:
            - Use: "update-program-state <program-manifest>"
            - Short: "Update the state field of a PROGRAM manifest"
            - Args: cobra.ExactArgs(1) — absolute path to the PROGRAM manifest YAML
            - Required flag: --state <string> (the new state value, e.g. "REVIEWED")
            - Logic:
              1. Parse the PROGRAM manifest via protocol.ParseProgramManifest(manifestPath)
              2. Record previousState = manifest.State
              3. Update manifest.State to the new value
              4. Write the manifest back to disk (marshal YAML and write file)
              5. Output JSON:
                 {"updated":true,"manifest_path":"...","previous_state":"...","new_state":"..."}
            - Exit codes: 0 success, 1 update/write error, 2 parse error

            ### File 2: cmd/saw/update_program_impl_cmd.go

            Create this file in /Users/dayna.blackwell/code/scout-and-wave-go/cmd/saw/.

            Command spec:
            - Use: "update-program-impl <program-manifest>"
            - Short: "Update the status of a specific IMPL entry in a PROGRAM manifest"
            - Args: cobra.ExactArgs(1) — absolute path to the PROGRAM manifest YAML
            - Required flags:
              - --impl <string>  (the IMPL slug to update, e.g. "my-feature")
              - --status <string> (the new status, e.g. "complete", "in_progress", "blocked")
            - Logic:
              1. Parse the PROGRAM manifest via protocol.ParseProgramManifest(manifestPath)
              2. Find the impl entry in manifest.Impls where impl.Slug == implSlug
              3. If not found, exit 1 with error "impl <slug> not found in manifest"
              4. Record previousStatus = impl.Status
              5. Update impl.Status to the new value
              6. Write the manifest back to disk
              7. Output JSON:
                 {"updated":true,"manifest_path":"...","impl_slug":"...","previous_status":"...","new_status":"..."}
            - Exit codes: 0 success, 1 impl not found or write error, 2 parse error

            ## Important notes
            - Look at /Users/dayna.blackwell/code/scout-and-wave-go/pkg/protocol/ to understand
              PROGRAMManifest struct fields (ProgramSlug, State, Tiers, Impls, etc.)
            - Look at existing command files for import patterns (cobra, encoding/json, os, fmt)
            - The manifest write-back should use gopkg.in/yaml.v3 marshaling followed by os.WriteFile
            - DO NOT add these commands to main.go — Agent A owns main.go

