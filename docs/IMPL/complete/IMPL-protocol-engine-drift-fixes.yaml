pre_mortem:
    overall_risk: low
    rows:
        - scenario: |
            ScaffoldFile YAML tag change (file_path -> file) breaks existing IMPL docs that already have scaffolds written using the old file_path: tag.
          likelihood: low
          impact: medium
          mitigation: |
            Existing scaffold files with file_path: will have FilePath silently empty after the tag rename. Agent C should check whether any active IMPL docs in docs/IMPL/ use file_path: in their scaffolds section and note them. The fix only affects new scaffolds written after this change; existing committed scaffolds are already materialized as Go files and their IMPL YAML entries are informational-only. Add a ValidateBytes compatibility shim that accepts both file: and file_path: if backward compat is needed.
        - scenario: |
            update-program-state and update-program-impl commands (Agent B) have a write-back pattern that corrupts YAML if the PROGRAM manifest uses complex YAML (anchors, multi-line strings, comments).
          likelihood: low
          impact: medium
          mitigation: |
            Use gopkg.in/yaml.v3 round-trip (unmarshal to struct, mutate, marshal back). YAML comments and anchors are lost in this round-trip — acceptable for PROGRAM manifests which are machine-generated. Agent B should explicitly use yaml.Marshal not string-replacement approaches.
        - scenario: |
            Agent F's impls_total exact-equality check breaks existing PROGRAM manifests where impls_total was intentionally set to a planning value before all impls were added.
          likelihood: low
          impact: low
          mitigation: |
            This is the correct fix per the audit. Any PROGRAM manifest with mismatched impls_total needs to be corrected. The validator should emit a warning-level error (not fatal) if strict validation is not desired; Agent F should check the existing code's error severity before deciding.
        - scenario: |
            Agent A's main.go registration causes a compile error if any of the 5 command constructor functions have a different name than expected.
          likelihood: low
          impact: high
          mitigation: |
            Agent A must grep for the exact function names in the respective files before editing main.go. The names are: newTierGateCmd, newFreezeContractsCmd, newProgramStatusCmd, newProgramReplanCmd, newMarkProgramCompleteCmd. All confirmed present in the codebase as of scout analysis.
