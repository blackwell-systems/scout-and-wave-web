        - id: C
          task: |
            ## Context
            You are Agent C in Wave 1 of the protocol-engine-drift-fixes IMPL. Your task
            covers three related Go engine fixes in pkg/protocol/:
            1. Add 4 missing IMPLManifest fields (feature, repository, repositories, plan_reference)
            2. Fix ScaffoldFile YAML tag mismatch (file_path → file)
            3. Wire DetectUnknownKeys + DetectDuplicateKeys into the protocol.Validate() API

            ## What to Implement

            ### Fix 1: pkg/protocol/types.go — Add 4 missing fields to IMPLManifest

            These four fields are written by Scouts (per message-formats.md) but are not in
            the struct, so Go silently drops them on unmarshal:

            Add to the IMPLManifest struct (after the existing Title/FeatureSlug fields is a
            natural location, but any location before the wave fields is acceptable):

            ```go
            // Feature is a short one-line description of what this IMPL implements.
            // Written by Scouts in the manifest header; informational only.
            Feature          string   `yaml:"feature,omitempty" json:"feature,omitempty"`
            // Repository is the absolute path to the repository root (single-repo waves).
            Repository        string   `yaml:"repository,omitempty" json:"repository,omitempty"`
            // Repositories lists absolute paths for multi-repo waves (omit if single-repo).
            Repositories      []string `yaml:"repositories,omitempty" json:"repositories,omitempty"`
            // PlanReference is an optional path to the original plan document.
            PlanReference     string   `yaml:"plan_reference,omitempty" json:"plan_reference,omitempty"`
            ```

            ### Fix 2: pkg/protocol/types.go — Fix ScaffoldFile YAML tag

            The current ScaffoldFile struct has:
            ```go
            FilePath   string `yaml:"file_path" json:"file_path"`
            ```

            message-formats.md documents this field as `file:` (not `file_path:`). Scouts
            writing `file:` get the field silently ignored.

            Change the YAML tag to `file` while keeping the JSON tag as `file_path` for
            backward compat with web app JSON consumers:
            ```go
            FilePath   string `yaml:"file" json:"file_path"`
            ```

            IMPORTANT: After this change, also update schema_unknown_keys.go (Fix 3 below)
            to reflect the renamed key in the scaffold context.

            ### Fix 3: pkg/protocol/schema_unknown_keys.go — Two updates

            **3a: Add the 4 new IMPLManifest fields to knownKeys["top"]:**
            ```go
            "feature":         true,
            "repository":      true,
            "repositories":    true,
            "plan_reference":  true,
            ```

            **3b: Add quality_gate fix field to knownKeys["quality_gate"]:**
            ```go
            "fix": true,
            ```
            (QualityGate.Fix already exists in types.go but is missing from the known keys map,
            causing false-positive SV01_UNKNOWN_KEY warnings.)

            **3c: Update the scaffold context key for ScaffoldFile:**
            The "scaffold" context in knownKeys currently has "file_path": true. After Fix 2
            renames the YAML tag to "file", update knownKeys["scaffold"] accordingly:
            ```go
            "file":        true,  // was "file_path"
            ```

            ### Fix 4: pkg/protocol/validation.go — Wire unknown/duplicate key validators

            The Validate() function currently calls ValidateSchema() but does NOT call
            DetectUnknownKeys() or DetectDuplicateKeys() (if the latter exists).

            Look at the current Validate() function in validation.go. Add a call to
            DetectUnknownKeys after ValidateSchema:

            ```go
            // DetectUnknownKeys uses raw YAML — but Validate() receives a parsed struct.
            // For wiring, Validate() cannot call DetectUnknownKeys directly (it needs raw bytes).
            // Instead, add a new exported function:
            ```

            Actually, look at how DetectUnknownKeys works — it takes []byte. The Validate()
            function takes *IMPLManifest. To wire them together, add a new function
            ValidateBytes(yamlData []byte) []ValidationError that:
            1. Unmarshals into IMPLManifest
            2. Calls Validate(manifest)
            3. Also calls DetectUnknownKeys(yamlData)
            4. Returns combined errors

            Then update the existing Validate() docstring to note that unknown-key detection
            requires ValidateBytes() (since Validate() receives an already-unmarshaled struct
            and cannot re-detect dropped keys).

            If ValidateBytes already exists, just ensure it calls both Validate() and
            DetectUnknownKeys(). If not, create it.

            Check whether a DetectDuplicateKeys function exists in the protocol package; if it
            does, wire it into ValidateBytes as well.

            ## Tests
            No new test files are required — the existing schema validation tests in
            pkg/protocol/ should cover these. If there are tests that specifically check
            scaffold YAML serialization, update them to use "file:" instead of "file_path:".

            Run: go test ./pkg/protocol/...

            ## Verification Gate
            1. go build ./pkg/protocol/...
            2. go vet ./pkg/protocol/...
            3. go test ./pkg/protocol/...

            ## Constraints
            - Only modify types.go, schema_unknown_keys.go, and validation.go
            - Do not modify validation.go's Validate() signature — add ValidateBytes() separately
            - Do not change any QualityGate.Fix field in types.go (it already exists there)
