title: 'Gate Timing Fix: Pre-Merge vs Post-Merge Gate Classification'
feature_slug: gate-timing-fix
verdict: SUITABLE
suitability_assessment: |
    The work decomposes cleanly across three files with disjoint ownership:

    1. `pkg/protocol/types.go` — add `Timing` field to `QualityGate` struct
    2. `pkg/protocol/gates.go` — classify gates by timing, split RunGates into pre/post variants
    3. `pkg/protocol/schema_unknown_keys.go` — register `timing` as a known key for `quality_gate`
    4. `cmd/saw/finalize_wave.go` — call pre-merge gates at step 3, post-merge gates at step 5
    5. `pkg/protocol/gates_test.go` — tests for new timing-aware behavior

    File decomposition: 5 files, 2 agents with disjoint ownership (Agent A owns types +
    schema + gates + tests; Agent B owns finalize_wave). Agents have a dependency edge
    (B depends on A's new function signatures) so a 2-wave structure is correct.

    No investigation-first items — the bug is fully understood: RunGates runs at step 3
    (pre-merge) in finalize_wave.go, but custom content-check gates only pass after merge.

    Interface discoverability: Agent A's new function signatures (RunPreMergeGates,
    RunPostMergeGates or equivalent) can be defined before implementation.

    Pre-implementation status check: Bug is confirmed TODO — no timing field exists on
    QualityGate, and finalize_wave.go calls RunGatesWithCache only at step 3 (line 114).

    Approach decision: The explicit `timing` field approach (not type-based defaulting) is
    cleaner. Type-based defaulting (custom=post-merge) would be a silent semantic break for
    existing custom gates that ARE valid pre-merge checks (e.g., `go vet` run as custom).
    The `timing` field is opt-in, backward compatible (absent = pre-merge), and explicit.

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: ~2 agents x ~15 min avg = ~30 min wall clock (parallel wave 1)
    - Merge and verification: ~5 min
    Total SAW time: ~50 min

    Sequential baseline: ~35 min
    Time savings: marginal on raw speed, but the IMPL doc provides interface contract
    clarity for the RunGates split — coordination value is the primary benefit here.

    Recommendation: SUITABLE. Two agents, clear interface boundary, Go build cycle is fast.
