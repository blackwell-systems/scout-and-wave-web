pre_mortem:
    overall_risk: low
    rows:
        - scenario: |
            filterGatesByTiming copies gate structs into a temporary manifest. If QualityGates
            is nil (no gates defined), RunPreMergeGates/RunPostMergeGates could panic.
          likelihood: low
          impact: high
          mitigation: |
            filterGatesByTiming returns nil when manifest.QualityGates is nil.
            Both RunPreMergeGates and RunPostMergeGates check len(filtered)==0 before
            building the tmp manifest. Agent A's task explicitly calls out this nil guard.
        - scenario: |
            result.GateResults map is keyed by repo. If pre-merge and post-merge loops
            run for the same repo key, the append logic must not overwrite pre-merge results.
          likelihood: low
          impact: medium
          mitigation: |
            Agent B's task specifies `append(result.GateResults[repoKey], postGateResults...)`
            not assignment. The interface contract section calls this out explicitly.
        - scenario: |
            Existing IMPL docs with custom gates that are legitimately pre-merge (e.g., a
            custom linter run as type=custom) would silently shift to post-merge if we had
            chosen type-based defaulting instead of the explicit timing field.
          likelihood: low
          impact: medium
          mitigation: |
            The explicit `timing` field approach was chosen. Gates without timing run pre-merge
            (backward compatible). No existing behavior changes unless timing is explicitly set.
        - scenario: |
            The `timing` field is a free-form string. A typo ("post_merge" instead of
            "post-merge") would silently classify the gate as pre-merge.
          likelihood: low
          impact: low
          mitigation: |
            Acceptable tradeoff for now. A future enum validation rule could be added to
            enumvalidation.go if this becomes a pain point. Document valid values in the
            struct comment (Agent A's task includes this).
