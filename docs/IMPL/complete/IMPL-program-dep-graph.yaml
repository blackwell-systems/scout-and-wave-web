pre_mortem:
    overall_risk: low
    rows:
        - scenario: ResizeObserver not available in test environment (jsdom)
          likelihood: medium
          impact: low
          mitigation: |
            Agent B should mock ResizeObserver in test setup or use a polyfill.
            The component should have a fallback for when ResizeObserver is unavailable.
        - scenario: SVG click events not firing correctly in testing-library
          likelihood: medium
          impact: low
          mitigation: |
            Use fireEvent.click on the SVG group element. If needed, add data-testid
            to clickable node groups for reliable selection.
        - scenario: Graph layout breaks with many IMPLs (>10 per tier)
          likelihood: low
          impact: medium
          mitigation: |
            The responsive width calculation should handle overflow gracefully.
            Add horizontal scrolling on the container div (already has overflow-auto).
