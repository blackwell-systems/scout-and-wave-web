    - number: 1
      agents:
        - id: A
          task: |
            ## Enhance ProgramDependencyGraph.tsx

            **Context:** web/src/components/ProgramDependencyGraph.tsx exists with basic
            SVG-based tier graph rendering. It has tier column backgrounds, bezier edge
            paths with transitive reduction, hover tooltips, and abbreviated slug labels.

            **What to implement:**

            1. Add `onSelectImpl?: (implSlug: string) => void` and
               `waveProgress?: Record<string, string>` to ProgramDependencyGraphProps.

            2. Enhance node rendering (currently just abbreviated initials):
               - Show full slug text (truncated to fit NODE_W, which should increase
                 to ~140px to accommodate slug text)
               - Add a small status badge below the slug text using getNodeFill colors
                 (a colored dot or small rect with status text like "complete", "pending")
               - For executing/in-progress nodes, show wave progress from waveProgress
                 prop (e.g., "W2/3") below the status badge
               - Add reviewed status (yellow: bg=#eab30840, border=#eab30880, text=#eab308)
                 to getNodeFill

            3. Make nodes clickable:
               - When onSelectImpl is provided, add cursor-pointer and hover effect
                 (slight scale or brightness change via SVG transform)
               - On click, call onSelectImpl(node.impl.slug)
               - Keep existing hover tooltip behavior

            4. Responsive width:
               - Use a useRef + ResizeObserver on the container div to get available width
               - Scale TIER_GAP and IMPL_GAP dynamically based on container width
               - Set SVG width to 100% of container, adjust viewBox accordingly
               - Minimum width: current hardcoded values as floor

            5. Keep existing features intact: tier column backgrounds, tier labels,
               bezier edge paths, transitive reduction, tooltip with portal, theme
               reactivity via MutationObserver.

            **Interface contract:**
            ```typescript
            interface ProgramDependencyGraphProps {
              programSlug: string
              status?: ProgramStatus
              onSelectImpl?: (implSlug: string) => void
              waveProgress?: Record<string, string>
            }
            ```

            **Verification gate:**
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-web/web && npx tsc --noEmit
            ```

            **Constraints:**
            - No external graph libraries (keep SVG-based like wave orbs)
            - Keep the existing Card wrapper with "Program Dependency Graph" title
            - Preserve all existing functionality (loading states, error states, empty states)
            - Follow existing codebase patterns: lucide-react for icons, Tailwind for styling
              where possible (but SVG attributes for SVG-specific styling)
          files:
            - web/src/components/ProgramDependencyGraph.tsx
