verdict: SUITABLE
suitability_assessment: |
    The Program Layer Web App Integration (Phase 3 from the roadmap) adds program-level
    views, API endpoints, SSE events, and a background runner to the scout-and-wave-web
    application. The Go SDK (scout-and-wave-go) already has all required types, parsing,
    validation, status computation, discovery, tier gates, and contract freezing — these
    are prerequisites from Phases 1-2.

    This IMPL creates 6 deliverables: (1) Program API handlers (6 endpoints), (2) Program
    SSE events (7 event types), (3) TypeScript types and API client functions, (4) Program
    runner background loop, (5) Program Board React component, (6) Cross-IMPL dependency
    graph and contracts panel components.

    All work is in the scout-and-wave-web repo. No changes needed in scout-and-wave-go
    since the SDK types are already complete.

    ## Scout Verification Summary

    **Prerequisites verified:**
    - ✓ All Go SDK types exist in scout-and-wave-go/pkg/protocol/program_types.go
    - ✓ All Go SDK functions exist: ParseProgramManifest, ValidateProgram, GetProgramStatus,
      ListPrograms, RunTierGate, FreezeContracts
    - ✓ Supporting types exist: ProgramStatusResult, TierStatusDetail, ContractStatus,
      ProgramDiscovery, ImplTierStatus, TierGateResult, FreezeContractsResult
    - ✓ Existing infrastructure: globalBroker.broadcastJSON, runWaveLoopFunc seam,
      DependencyGraphPanel pattern reference

    **File ownership verification:**
    - ✓ All 11 target files are new (none exist yet)
    - ✓ Wave 1 agents (A, B, C, D) have disjoint file ownership
    - ✓ Wave 2 agents (E, F) have disjoint file ownership
    - ✓ No cross-wave file conflicts

    **Dependency structure:**
    - ✓ Wave 1: 4 independent agents (parallel execution)
    - ✓ Wave 2: 2 agents depending ONLY on Agent C outputs (parallel after Wave 1)
    - ✓ No same-wave dependencies (I2 compliance)
    - ✓ Integration connectors identified for post-Wave-2 wiring
