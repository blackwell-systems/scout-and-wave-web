pre_mortem:
    overall_risk: medium
    rows:
        - scenario: Claude returns markdown-fenced response instead of raw file content
          likelihood: medium
          impact: high
          mitigation: Agent A's system prompt must explicitly say 'no markdown fences, no explanation'. Add post-processing to strip ``` fences if present.
        - scenario: Large conflicted files exceed Claude's output token limit
          likelihood: low
          impact: high
          mitigation: Set MaxTokens to 16384. For files >500 lines, consider chunking (future enhancement, not in v1).
        - scenario: Resolution produces syntactically invalid code
          likelihood: medium
          impact: medium
          mitigation: After resolution and before git commit, run go vet or tsc --noEmit. If it fails, abort and report to user. This is a v2 enhancement — v1 commits and lets the test step catch issues.
        - scenario: Cross-repo IMPL doc cannot resolve agent briefs for conflict context
          likelihood: low
          impact: low
          mitigation: Fall back to resolving without agent context — just use the conflicted file content. Less intelligent but still useful.
        - scenario: Agent C and Agent D both need to reference the new engine types
          likelihood: high
          impact: low
          mitigation: Agent A delivers in Wave 1. Agent C imports from scout-and-wave-go. The go.mod replace directive already points to local checkout.
