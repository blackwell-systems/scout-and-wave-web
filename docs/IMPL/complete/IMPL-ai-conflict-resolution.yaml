suitability_assessment: |
    SUITABLE. 8 files across Go backend and TypeScript frontend with clean
    agent boundaries. The existing merge failure infrastructure (SSE events,
    conflicting_files array, merge-abort endpoint) provides a solid foundation.
    The backend.Backend interface in scout-and-wave-go is established and the
