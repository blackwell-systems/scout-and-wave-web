        - id: D
          task: |
            ## What to Implement

            Wire the conflict resolution feature into the frontend at
            `/Users/dayna.blackwell/code/scout-and-wave-web`.

            **File: web/src/api.ts** (modify)

            Add the `resolveConflicts` API function:
            ```typescript
            export async function resolveConflicts(slug: string, wave: number): Promise<void> {
              const r = await fetch(`/api/wave/${encodeURIComponent(slug)}/resolve-conflicts`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ wave }),
              })
              if (!r.ok) throw new Error(`HTTP ${r.status}: ${await r.text()}`)
            }
            ```

            **File: web/src/types.ts** (modify)

