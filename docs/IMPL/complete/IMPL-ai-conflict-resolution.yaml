            ## Verification Gate
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-web && go build ./... && go vet ./... && go test ./pkg/api/ -run TestHandleResolveConflicts -count=1
            ```

            ## Constraints
            - Reuse MergeWaveRequest type for the request body (same shape: {wave: int}).
            - Reuse mergingRuns for concurrency guard — merge and resolve are
              mutually exclusive operations on the same repo.
            - The SSE event names MUST be exactly: conflict_resolving,
              conflict_resolved, conflict_resolution_failed.
            - Do NOT modify server.go — provide RegisterConflictRoutes() instead.
          files:
