            Initialize `resolvedFiles: []` in the default WaveMergeState.

            Add event listeners:
            - `conflict_resolving`: set status='resolving', update resolvingFile
            - `conflict_resolved`: add file to resolvedFiles array
            - `conflict_resolution_failed`: set resolutionError and failedFile,
