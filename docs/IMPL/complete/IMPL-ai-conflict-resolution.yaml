            **File: web/src/hooks/useWaveEvents.ts** (modify)

            Add SSE event listeners for the three new conflict resolution events.
            Extend the `WaveMergeState` interface to track resolution progress:

            ```typescript
            export interface WaveMergeState {
              status: 'idle' | 'merging' | 'success' | 'failed' | 'resolving'  // ADD 'resolving'
              output: string
              conflictingFiles: string[]
              error?: string
              resolvingFile?: string      // NEW: currently resolving file
              resolvedFiles: string[]     // NEW: files resolved so far
              failedFile?: string         // NEW: file that failed resolution
