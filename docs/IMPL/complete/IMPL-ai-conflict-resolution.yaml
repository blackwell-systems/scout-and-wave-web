interface_contracts:
    - name: ResolveConflictsOpts
      description: |
        Options struct for the engine-level conflict resolution function.
        Lives in scout-and-wave-go engine package alongside RunMergeOpts.
      definition: |
        type ResolveConflictsOpts struct {
            IMPLPath    string // path to IMPL YAML manifest
            RepoPath    string // repo root (where git merge is in progress)
            WaveNum     int    // which wave's merge is conflicted
            OnProgress  func(file string, status string) // per-file progress callback
        }
      location: pkg/engine/engine.go
    - name: ResolveConflicts
      description: |
        Engine function that resolves all conflicted files using Claude API.
        Reads conflicted files from git, loads IMPL doc for agent context,
        calls Claude per file, writes resolved content, git-adds, and commits.
        Returns error on first file that cannot be resolved (partial failure aborts).
      definition: |
        func ResolveConflicts(ctx context.Context, opts ResolveConflictsOpts) error
      location: pkg/engine/resolve_conflicts.go
    - name: resolveConflicts API endpoint
      description: |
        POST /api/wave/{slug}/resolve-conflicts
        Request body: {"wave": <int>}
        Returns 202 immediately, runs resolution in background goroutine.
        Publishes SSE events: conflict_resolving, conflict_resolved,
        conflict_resolution_failed, merge_complete (on success).
      definition: |
        // No new Go types needed — reuses MergeWaveRequest for the body.
        // SSE event payloads:
        // conflict_resolving:        {"slug": str, "wave": int, "file": str}
        // conflict_resolved:         {"slug": str, "wave": int, "file": str}
        // conflict_resolution_failed: {"slug": str, "wave": int, "file": str, "error": str}
      location: pkg/api/merge_test_handlers.go
    - name: resolveConflicts frontend API
      description: |
        TypeScript function to call the resolve-conflicts endpoint.
      definition: |
        export async function resolveConflicts(slug: string, wave: number): Promise<void>
      location: web/src/api.ts
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## What to Implement

            Create the engine-level conflict resolution function in scout-and-wave-go
            at `/Users/dayna.blackwell/code/scout-and-wave-go`. This function is the
            core AI logic: it reads conflicted files from git, builds a prompt with
            IMPL context, calls Claude, and writes resolved content back.

            **File: pkg/engine/resolve_conflicts.go** (new)

            Implement `ResolveConflicts(ctx context.Context, opts ResolveConflictsOpts) error`:

            1. Load the IMPL manifest via `protocol.Load(opts.IMPLPath)`.
            2. Get list of conflicted files: run `git diff --name-only --diff-filter=U`
               in opts.RepoPath.
            3. For each conflicted file:
               a. Call `opts.OnProgress(file, "resolving")` if non-nil.
               b. Read the file content (it contains <<<<<<< ======= >>>>>>> markers).
               c. Look up which agents own this file from manifest.FileOwnership.
               d. Find those agents' task descriptions from manifest.Waves[].Agents[].
               e. Find relevant interface contracts from manifest.InterfaceContracts.
               f. Build a system prompt:
                  - "You are resolving a git merge conflict. Output ONLY the resolved
                    file content with no conflict markers, no explanation, no markdown
                    fences."
               g. Build a user message with:
                  - The full conflicted file content
                  - Which agents wrote each side (from file ownership)
                  - Each agent's task description (what they were implementing)
                  - Relevant interface contracts
               h. Select backend using the same pattern as chat.go:
                  - Read model from opts or fall back to environment
                  - Use chatParseProviderPrefix for routing
                  - Default model: "claude-sonnet-4-5" (not opus — cost matters here)
               i. Call `backend.Run(ctx, systemPrompt, userMessage, opts.RepoPath)`
                  with MaxTurns=1 (single-shot, no tool use needed).
               j. Write the response to the file (os.WriteFile).
               k. Run `git add <file>` in opts.RepoPath.
               l. Call `opts.OnProgress(file, "resolved")` if non-nil.
               m. On ANY error: return immediately with the error and the file name.
                  Do NOT continue to other files. The caller will abort the merge.
            4. After all files resolved: run `git commit --no-edit` to complete merge.
            5. Return nil on success.

            **File: pkg/engine/engine.go** (modify)

            Add the `ResolveConflictsOpts` struct next to `RunMergeOpts`:

            ```go
            type ResolveConflictsOpts struct {
                IMPLPath    string
                RepoPath    string
                WaveNum     int
                ChatModel   string // optional model override
                OnProgress  func(file string, status string)
            }
            ```

            **Backend selection**: Reuse the pattern from `chat.go` lines 53-85.
            Import the same backend packages. For the backend config, set:
            - MaxTurns: 1 (no tool loop — single-shot text generation)
            - MaxTokens: 16384 (conflict files can be large)
            - ReadOnly: true (no file writes via tools)

            **Prompt design**: The prompt must instruct Claude to output ONLY the
            resolved file content. No markdown fences, no explanations. The response
            is written directly to disk. Include clear instructions about preferring
            the "intent" of both sides when possible (combine features, don't drop
            either agent's work).

            ## Tests to Write

            **File: pkg/engine/resolve_conflicts_test.go** (new)

            1. TestResolveConflicts_ParsesConflictMarkers - verify the function
               can identify conflict regions in a file
            2. TestResolveConflicts_BuildsPromptWithAgentContext - verify the prompt
               includes agent briefs and file ownership information
            3. TestResolveConflicts_OptsValidation - verify error on empty IMPLPath,
               empty RepoPath

            Use a mock backend (implement backend.Backend interface with canned
            responses) rather than calling a real LLM.

            ## Verification Gate
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-go && go build ./... && go vet ./... && go test ./pkg/engine/ -run TestResolveConflict -count=1
            ```

            ## Constraints
            - Do NOT use the CLI backend for conflict resolution — API backends only
              (Anthropic or Bedrock) since we need single-shot text, not a tool loop.
            - The function must be synchronous (blocking). The web handler will call
              it from a goroutine.
            - If git commands fail, wrap errors with context (which file, which step).
            - Import cycle warning: do NOT import pkg/api or any web-specific package.
          files:
            - pkg/engine/resolve_conflicts.go
            - pkg/engine/resolve_conflicts_test.go
            - pkg/engine/engine.go
        - id: B
          task: |
            ## What to Implement

            Create a React component for the conflict resolution UI panel in
            scout-and-wave-web at `/Users/dayna.blackwell/code/scout-and-wave-web`.
            This is a self-contained presentational component that will be integrated
            into WaveBoard by Agent D in Wave 2.

            **File: web/src/components/ConflictResolutionPanel.tsx** (new)

            Create a component with this interface:

            ```tsx
            interface ConflictResolutionPanelProps {
              slug: string
              wave: number
              conflictingFiles: string[]
              onResolveStart: () => void    // called when user clicks "Resolve with AI"
              resolvingFile?: string        // currently resolving file (from SSE)
              resolvedFiles: string[]       // files resolved so far (from SSE)
              resolutionError?: string      // error message if resolution failed
              failedFile?: string           // which file failed
              isResolving: boolean          // true while resolution is in progress
            }
            ```

            The component renders:

            1. **File list with status indicators** — each conflicting file shows:
               - Pending icon (gray circle) if not yet processed
               - Spinning/pulse animation if currently being resolved
               - Green checkmark if resolved
               - Red X if failed
            2. **"Resolve with AI" button** — primary action, calls onResolveStart.
               Disabled while isResolving is true. Styled consistently with the
               existing "Merge Wave" button (violet-600 bg, white text).
            3. **Progress text** — "Resolving file 2 of 5..." style counter.
            4. **Error display** — if resolutionError is set, show which file failed
               and the error message in a red alert box matching the existing merge
               failure styling (bg-red-50 border-red-200 etc).

            Follow the existing component patterns in WaveBoard.tsx:
            - Use Tailwind CSS classes (bg-card, text-foreground, etc.)
            - Support dark mode via dark: prefixes
            - Use the same color scheme as merge UI (violet for actions, green for
              success, red for failure)
            - Export as default function component

            ## Tests to Write
            No unit tests required for this presentational component — it will be
            tested through integration in WaveBoard.

            ## Verification Gate
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-web/web && npx tsc --noEmit
            ```

            ## Constraints
            - Do NOT import from api.ts — this component receives all data via props.
            - Do NOT add any new npm dependencies.
            - Keep the file under 150 lines — it is purely presentational.
            - Use the same Tailwind patterns as WaveBoard.tsx (border-border,
              bg-card, text-foreground, rounded-lg, etc).
          files:
            - web/src/components/ConflictResolutionPanel.tsx
    - number: 2
      agents:
        - id: C
          task: |
            ## What to Implement

            Add the `POST /api/wave/{slug}/resolve-conflicts` endpoint to the web
            server at `/Users/dayna.blackwell/code/scout-and-wave-web`.

            **File: pkg/api/merge_test_handlers.go** (modify)

            Add a new handler method `handleResolveConflicts` following the exact
            pattern of `handleWaveMerge` (lines 37-101 of the existing file):

            1. Parse slug from path, decode `MergeWaveRequest` body (reuse existing type).
            2. Guard against concurrent resolution using a new `sync.Map` field on
               Server. Add `resolvingRuns sync.Map` to the Server struct in server.go.
               Actually — do NOT modify server.go (Agent D owns no server files, and
               adding a field there would conflict). Instead, reuse `mergingRuns` —
               conflict resolution IS a merge operation and they should be mutually
               exclusive.
            3. Resolve IMPL path via `s.resolveIMPLPath(slug)`.
            4. Return 202 Accepted immediately.
            5. In a background goroutine:
               a. Read `saw.config.json` for model selection (same pattern as
                  chat_handler.go lines 119-125).
               b. Call `engine.ResolveConflicts(ctx, engine.ResolveConflictsOpts{...})`
                  with an OnProgress callback that publishes SSE events:
                  - "resolving" status -> publish `conflict_resolving` event
                  - "resolved" status -> publish `conflict_resolved` event
               c. On success: publish `merge_complete` event (same as handleWaveMerge).
               d. On error: publish `conflict_resolution_failed` event with file + error.
               e. Defer `s.mergingRuns.Delete(slug)`.

            **Route registration**: The route must be registered in server.go. Since
            you cannot modify server.go, add a comment at the top of your handler
            noting the route. The integration step will wire it in. For now, also
            add a func that registers the route:

            ```go
            func (s *Server) RegisterConflictRoutes() {
                s.mux.HandleFunc("POST /api/wave/{slug}/resolve-conflicts", s.handleResolveConflicts)
            }
            ```

            The integration agent will call this from server.go's New() function.

            **File: pkg/api/merge_test_handlers_test.go** (modify or create)

            Add a test for the handler:
            1. TestHandleResolveConflicts_Returns202 - verify async dispatch
            2. TestHandleResolveConflicts_409OnConcurrent - verify mutual exclusion
