pre_mortem:
    overall_risk: low
    rows:
        - scenario: Multiple EventSource connections to /api/events cause browser connection limit issues
          likelihood: low
          impact: low
          mitigation: Server already uses h2c (HTTP/2 cleartext) which multiplexes connections. If issues arise, share a single EventSource via a store pattern similar to waveEventStore.ts.
        - scenario: Browser Notification permission denied by user
          likelihood: medium
          impact: low
          mitigation: Hook gracefully degrades to toast-only mode. NotificationSettings shows permission status and re-request button.
        - scenario: Toast z-index conflicts with existing modals (settings drawer, command palette)
          likelihood: low
          impact: low
          mitigation: ToastContainer uses z-50 which matches existing overlay conventions. Integration agent can adjust if needed.
