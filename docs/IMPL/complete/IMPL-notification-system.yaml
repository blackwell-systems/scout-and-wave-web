interface_contracts:
    - name: NotificationBus
      description: |
        Central notification hub. Handlers call Notify() to emit events.
        The bus formats the event and broadcasts it to all SSE clients via
        globalBroker. Frontend reads these events and decides whether to show
        a toast, browser notification, or both based on user preferences.
      definition: |
        type NotificationBus struct {
          broker *globalBroker
        }

        func NewNotificationBus(broker *globalBroker) *NotificationBus
        func (nb *NotificationBus) Notify(event NotificationEvent)
      location: pkg/api/notification_bus.go
    - name: handleGetNotificationPrefs
      description: |
        GET /api/notifications/preferences - Returns the current notification
        preferences from saw.config.json. Returns default preferences if none
        are configured.
      definition: |
        func (s *Server) handleGetNotificationPrefs(w http.ResponseWriter, r *http.Request)
      location: pkg/api/notification_prefs_handler.go
    - name: handleSaveNotificationPrefs
      description: |
        POST /api/notifications/preferences - Saves notification preferences
        to saw.config.json under the "notifications" key.
      definition: |
        func (s *Server) handleSaveNotificationPrefs(w http.ResponseWriter, r *http.Request)
      location: pkg/api/notification_prefs_handler.go
    - name: useNotifications
      description: |
        React hook that listens for "notification" events on the global SSE
        stream (/api/events), checks user preferences, and dispatches to
        either toast display or Browser Notification API (or both).
      definition: |
        function useNotifications(): {
          toasts: Toast[];
          dismissToast: (id: string) => void;
          preferences: NotificationPreferences;
          updatePreferences: (prefs: NotificationPreferences) => Promise<void>;
        }
      location: web/src/hooks/useNotifications.ts
    - name: ToastContainer
      description: |
        Renders a stack of toast/snackbar notifications. Positioned fixed
        bottom-right. Each toast auto-dismisses after 5 seconds. Supports
        severity-based coloring (success=green, error=red, warning=amber, info=blue).
      definition: |
        interface Toast {
          id: string;
          type: NotificationEventType;
          title: string;
          message: string;
          severity: 'info' | 'success' | 'warning' | 'error';
          timestamp: number;
        }

        interface NotificationPreferences {
          enabled: boolean;
          muted_types: string[];
          browser_notify: boolean;
          toast_notify: boolean;
        }

        function ToastContainer({ toasts, onDismiss }: {
          toasts: Toast[];
          onDismiss: (id: string) => void;
        }): JSX.Element
      location: web/src/components/ToastContainer.tsx
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## What to Implement
            Create the NotificationBus - a central hub that handlers call to emit
            user-facing notifications. The bus broadcasts events to all SSE clients
            via the existing globalBroker.

            ## Interfaces to Implement
            - `NewNotificationBus(broker *globalBroker) *NotificationBus`
            - `func (nb *NotificationBus) Notify(event NotificationEvent)`

            The Notify method should:
            1. Marshal the NotificationEvent to JSON
            2. Broadcast it via globalBroker as a "notification" SSE event with the
               JSON data payload (not just the event name like impl_list_updated)

            Modify the globalBroker.broadcast method or add a new broadcastWithData
            method that sends both `event:` and `data:` fields in the SSE stream.
            Currently broadcast() only sends `event: <name>\ndata: {}\n\n`. The
            notification events need `event: notification\ndata: <json>\n\n`.

            Add a `broadcastJSON(eventType string, data interface{})` method to
            globalBroker that marshals data to JSON and writes it as the SSE data field.

            ## Interfaces to Call
            - `NotificationEvent` and `NotificationEventType` from notification_types.go (scaffold)
            - `globalBroker` from global_events.go

            ## Tests to Write
            1. TestNotificationBus_Notify - verify that calling Notify broadcasts to subscribed clients
            2. TestNotificationBus_NotifyJSON - verify the SSE data payload is valid JSON
            3. TestGlobalBroker_BroadcastJSON - verify broadcastJSON sends event+data fields

            ## Verification Gate
            ```bash
            go build ./pkg/api/...
            go vet ./pkg/api/...
            go test ./pkg/api/ -run TestNotification -v
            ```

            ## Constraints
            - Do NOT modify wave_runner.go or server.go - integration wiring happens post-merge
            - The NotificationBus must be safe for concurrent use (Notify called from goroutines)
            - Keep the bus simple - no filtering/preferences logic on the backend; the frontend
              decides what to show based on user preferences
          files:
            - pkg/api/notification_bus.go
            - pkg/api/notification_bus_test.go
        - id: B
          task: |
            ## What to Implement
            Create HTTP handlers for notification preferences CRUD:
            - GET /api/notifications/preferences - read preferences from saw.config.json
            - POST /api/notifications/preferences - save preferences to saw.config.json

            Preferences are stored in saw.config.json under a "notifications" key.
            The handler reads/writes the full SAWConfig and updates only the notifications
            field, preserving all other config.

            ## Interfaces to Implement
            - `func (s *Server) handleGetNotificationPrefs(w http.ResponseWriter, r *http.Request)`
            - `func (s *Server) handleSaveNotificationPrefs(w http.ResponseWriter, r *http.Request)`

            Default preferences (when none configured):
            ```go
            NotificationPreferences{
              Enabled:       true,
              MutedTypes:    nil,
              BrowserNotify: true,
              ToastNotify:   true,
            }
            ```

            ## Interfaces to Call
            - `NotificationPreferences` from notification_types.go (scaffold)
            - `SAWConfig` from types.go (add a Notifications field)
            - File I/O pattern from config_handler.go (atomic write via temp file + rename)

            ## Tests to Write
            1. TestHandleGetNotificationPrefs_Default - returns defaults when no config exists
            2. TestHandleGetNotificationPrefs_Configured - returns saved preferences
            3. TestHandleSaveNotificationPrefs_Valid - saves and persists preferences
            4. TestHandleSaveNotificationPrefs_Invalid - rejects malformed JSON

            ## Verification Gate
            ```bash
            go build ./pkg/api/...
            go vet ./pkg/api/...
            go test ./pkg/api/ -run TestHandleNotification -v
            ```

            ## Constraints
            - Do NOT modify server.go to register routes - integration wiring happens post-merge
            - Follow the atomic write pattern from config_handler.go (temp file + os.Rename)
            - The handler must read the existing saw.config.json fully, update only the
              notifications field, and write back - do not clobber other config fields
            - Add `Notifications NotificationPreferences` field to a local config struct
              in this file (the integration agent will add it to SAWConfig in types.go)
          files:
            - pkg/api/notification_prefs_handler.go
            - pkg/api/notification_prefs_handler_test.go
