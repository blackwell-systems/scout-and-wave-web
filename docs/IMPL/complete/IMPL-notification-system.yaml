    - number: 2
      agents:
        - id: D
          task: |
            ## What to Implement
            Create the useNotifications React hook and NotificationSettings component.

            ### useNotifications hook
            Listens for "notification" events on the global SSE stream (/api/events).
            When a notification event arrives:
            1. Check if notifications are enabled (preferences.enabled)
            2. Check if this event type is muted (preferences.muted_types)
            3. If tab is focused AND toast_notify is true: add to toasts array
            4. If tab is NOT focused AND browser_notify is true: show Browser Notification
            5. If both are true: show both (browser notification brings attention, toast
               shows when they switch back)

            The hook manages:
            - Toast state (array of Toast objects with auto-generated IDs)
            - Preferences state (loaded from /api/notifications/preferences on mount)
            - Browser Notification permission state
            - document.visibilityState tracking for focus detection

            ### NotificationSettings component
            A settings panel (to be embedded in SettingsScreen by integration agent) with:
            - Master enable/disable toggle
            - Per-event-type checkboxes (wave_complete, agent_failed, merge_complete, etc.)
            - Browser notifications toggle (with permission request button if not granted)
            - Toast notifications toggle
            - "Test notification" button that dispatches a test toast

            ### API functions
            Add to api.ts (or create a local fetch wrapper):
            - getNotificationPrefs(): Promise<NotificationPreferences>
            - saveNotificationPrefs(prefs: NotificationPreferences): Promise<void>

            ## Interfaces to Implement
            ```tsx
            function useNotifications(): {
              toasts: Toast[];
              dismissToast: (id: string) => void;
              preferences: NotificationPreferences;
              updatePreferences: (prefs: NotificationPreferences) => Promise<void>;
            }

            function NotificationSettings({ preferences, onUpdate }: {
              preferences: NotificationPreferences;
              onUpdate: (prefs: NotificationPreferences) => Promise<void>;
            }): JSX.Element
            ```

            ## Interfaces to Call
            - Toast type from ToastContainer.tsx (Wave 1, Agent C)
            - ToastContainer component from ToastContainer.tsx (for re-export/reference)
            - /api/notifications/preferences endpoints (Wave 1, Agent B)
            - /api/events SSE stream (existing global_events.go)
            - Browser Notification API (window.Notification)

            ## Tests to Write
            1. useNotifications adds toast when notification event received and tab focused
            2. useNotifications shows browser notification when tab hidden
            3. useNotifications respects muted_types
            4. useNotifications dismissToast removes toast by id
            5. NotificationSettings toggles emit onUpdate calls

            ## Verification Gate
            ```bash
            cd web && npx tsc --noEmit && npx vitest run --reporter=verbose src/hooks/__tests__/useNotifications.test.ts
            ```

            ## Constraints
            - Import Toast type from '../components/ToastContainer' (Agent C, Wave 1)
            - The hook subscribes to the EXISTING /api/events EventSource, not a new one.
              It should accept an optional EventSource parameter or listen on a shared one.
              The simplest approach: create a new EventSource('/api/events') in the hook
              and close it on unmount. App.tsx already has one, but having two is fine
              since SSE connections are lightweight and the server handles multiple clients.
            - Do NOT modify App.tsx or SettingsScreen.tsx - integration agent wires those
            - Store notification preferences API calls in the hook file itself (not api.ts)
              to keep the agent's file ownership disjoint. Integration agent can move them
              to api.ts later if desired.
            - Use crypto.randomUUID() for toast IDs (available in all modern browsers)
          files:
