          task: |
            ## What to Implement

            Create the `useExecutionSync` hook in `web/src/hooks/useExecutionSync.ts`.
            This hook wraps the existing `useWaveEvents(slug)` hook and transforms its
            `AppWaveState` output into an `ExecutionSyncState` shape optimized for
            panel consumption with O(1) lookups.

            ## Interfaces to Implement

            Export these types and the hook function from the new file:

            ```typescript
            export interface AgentExecStatus {
              status: 'pending' | 'running' | 'complete' | 'failed'
              agent: string
              wave: number
              failureType?: string
            }

            export interface WaveProgress {
              complete: number
              total: number
              mergeStatus?: 'idle' | 'merging' | 'success' | 'failed'
            }

            export interface ExecutionSyncState {
              agents: Map<string, AgentExecStatus>
              waveProgress: Map<number, WaveProgress>
              scaffoldStatus: 'idle' | 'running' | 'complete'
              isLive: boolean
            }

            export function useExecutionSync(slug: string | undefined): ExecutionSyncState
            ```

            ## Interfaces to Call

            - `useWaveEvents(slug: string)` from `../hooks/useWaveEvents` — returns `AppWaveState`
            - `AgentStatus` type from `../types` — the per-agent status in `AppWaveState.agents[]`

            ## Implementation Details

            1. Call `useWaveEvents(slug ?? '')` to get the raw SSE state.
            2. Use `useMemo` to derive `agents` Map from `AppWaveState.agents[]`:
               - Key: `"${agent.wave}:${agent.agent}"` (e.g. `"1:A"`)
               - Value: `AgentExecStatus` mapped from `AgentStatus`
            3. Use `useMemo` to derive `waveProgress` Map from `AppWaveState.waves[]`:
               - Key: wave number
               - Value: `{ complete: count of complete agents, total: agents.length, mergeStatus }`
               - Map merge status from `AppWaveState.wavesMergeState`
            4. Pass through `scaffoldStatus` directly.
            5. `isLive` = `state.connected && !state.runComplete`
            6. When `slug` is undefined or empty, return a static idle state with empty maps.

            ## Tests to Write

            Create `web/src/hooks/useExecutionSync.test.ts`:

            1. TestIdleState — when slug is empty, returns empty maps and isLive=false
            2. TestAgentMapping — given mock AppWaveState with 2 agents across 2 waves,
               verify Map keys are "1:A", "2:B" with correct statuses
            3. TestWaveProgress — given 3 agents in wave 1 (1 complete, 2 running),
               verify waveProgress.get(1) returns {complete: 1, total: 3}
            4. TestScaffoldPassthrough — scaffoldStatus from useWaveEvents flows through
            5. TestIsLive — connected + not runComplete = true; runComplete = false

            Note: You will need to mock useWaveEvents. Use vitest `vi.mock` to mock
            the module and return controlled AppWaveState values.

            ## Verification Gate

            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-web/web
            npx tsc --noEmit
            npx vitest run hooks/useExecutionSync
            ```

            ## Constraints

            - Do NOT modify useWaveEvents.ts — it is not in your file ownership.
            - Return stable Map references via useMemo to prevent unnecessary re-renders.
            - The hook must work when slug is undefined (ReviewScreen may render without
              an active execution). Return idle defaults in that case.
            - Import types from useWaveEvents.ts (AppWaveState) but do not re-export them.
          files:
            - web/src/hooks/useExecutionSync.ts
