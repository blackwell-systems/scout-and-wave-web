interface_contracts:
    - name: ExecutionSyncState
      description: |
        Return type of useExecutionSync hook. Provides O(1) lookup of agent
        execution status by "wave:agent" key, wave-level progress summaries,
        and scaffold status. Both DependencyGraphPanel and WaveStructurePanel
        consume this type independently.
      definition: |
        export interface AgentExecStatus {
          status: 'pending' | 'running' | 'complete' | 'failed'
          agent: string
          wave: number
          failureType?: string
        }

        export interface WaveProgress {
          complete: number
          total: number
          mergeStatus?: 'idle' | 'merging' | 'success' | 'failed'
        }

        export interface ExecutionSyncState {
          /** O(1) lookup by "wave:agent" key, e.g. "1:A" */
          agents: Map<string, AgentExecStatus>
          /** Per-wave progress: complete/total counts */
          waveProgress: Map<number, WaveProgress>
          /** Scaffold lifecycle status */
          scaffoldStatus: 'idle' | 'running' | 'complete'
          /** Whether any execution is active (SSE connected + not run_complete) */
          isLive: boolean
        }
      location: web/src/hooks/useExecutionSync.ts
    - name: useExecutionSync
      description: |
        Hook that wraps useWaveEvents and transforms AppWaveState into the
        ExecutionSyncState shape optimized for panel consumption. Returns
        stable references (useMemo) so panels don't re-render on unrelated
        SSE events. When slug is empty string or undefined, returns idle state
        with empty maps.
      definition: |
        export function useExecutionSync(slug: string | undefined): ExecutionSyncState
      location: web/src/hooks/useExecutionSync.ts
    - name: CSS animation classes
      description: |
        CSS keyframe animations and utility classes applied by panels to
        SVG/HTML elements based on agent execution status. These are pure
        CSS — no JS runtime dependency.
      definition: |
        /* Node pulse for running agents */
        @keyframes exec-node-pulse {
          0%, 100% { filter: drop-shadow(0 0 4px var(--pulse-color)); }
          50% { filter: drop-shadow(0 0 12px var(--pulse-color)); }
        }
        .exec-node-running { animation: exec-node-pulse 2s ease-in-out infinite; }

        /* Shake for failed agents */
        @keyframes exec-node-shake {
          0%, 100% { transform: translateX(0); }
          20%, 60% { transform: translateX(-2px); }
          40%, 80% { transform: translateX(2px); }
        }
        .exec-node-failed { animation: exec-node-shake 0.4s ease-in-out; }

        /* Scale flourish for completion */
        @keyframes exec-node-complete {
          0% { transform: scale(1); }
          50% { transform: scale(1.15); }
          100% { transform: scale(1); }
        }
        .exec-node-complete { animation: exec-node-complete 0.3s ease-out; }

        /* Edge brightening for completed upstream */
        .exec-edge-active { opacity: 0.9; transition: opacity 0.3s ease; }
        .exec-edge-inactive { opacity: 0.25; transition: opacity 0.3s ease; }

        /* Jewel progressive fill */
        @keyframes exec-jewel-fill {
          from { opacity: 0.3; }
          to { opacity: 1; }
        }
        .exec-jewel-filling { animation: exec-jewel-fill 0.5s ease-out forwards; }
      location: web/src/index.css
    - name: DependencyGraphPanel extended props
      description: |
        New optional prop on DependencyGraphPanel to receive execution state.
        When executionState is provided and isLive is true, nodes and edges
        render with status-based CSS classes. When absent, panel renders
        statically as before (backward compatible).
      definition: |
        interface DependencyGraphPanelProps {
          dependencyGraphText?: string
          executionState?: ExecutionSyncState  // NEW optional prop
        }
      location: web/src/components/review/DependencyGraphPanel.tsx
    - name: WaveStructurePanel extended props
      description: |
        New optional prop on WaveStructurePanel to receive execution state.
        When present and isLive, jewels fill progressively and agent boxes
        show status-based styling. When absent, renders statically as before.
      definition: |
        interface WaveStructurePanelProps {
          impl: IMPLDocResponse
          executionState?: ExecutionSyncState  // NEW optional prop
        }
      location: web/src/components/review/WaveStructurePanel.tsx
