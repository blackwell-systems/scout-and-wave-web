            3. TestCompleteNodeShowsCheck — when agent "1:B" is complete, a check
               path element exists within B's node group
            4. TestFailedNodeHasClass — when agent "1:C" is failed, node has
               "exec-node-failed" class
            5. TestEdgeBrightensOnComplete — when source agent is complete, edge
               element has "exec-edge-active" class

            Use React Testing Library with a mock executionState containing a Map
