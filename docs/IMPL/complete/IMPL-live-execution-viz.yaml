          task: |
            ## What to Implement

            Modify `WaveStructurePanel.tsx` to animate jewels and agent boxes
            during live wave execution. When `executionState` prop is provided
            and `isLive` is true, jewels fill progressively as agents complete,
            and agent boxes show status-based glow styling matching AgentCard.

            ## Interfaces to Implement

            Extend the existing `WaveStructurePanelProps` interface:

            ```typescript
            import { ExecutionSyncState } from '../../hooks/useExecutionSync'

            interface WaveStructurePanelProps {
              impl: IMPLDocResponse
              executionState?: ExecutionSyncState  // NEW
            }
            ```

            ## Interfaces to Call

            - `ExecutionSyncState`, `AgentExecStatus` from `../../hooks/useExecutionSync`
            - `getAgentColor(letter)` from `../../lib/agentColors` (already imported)
            - `getAgentColorWithOpacity(letter, opacity)` from `../../lib/agentColors`
            - CSS classes: `exec-jewel-filling`, `exec-node-running`, `exec-node-failed`,
              `exec-node-complete` (defined by Agent B in index.css)

            ## Implementation Details

            1. Accept the new `executionState` prop in the component signature.

            2. **Jewel filled state** — currently `filled` is a boolean based on
               `doc_status === 'COMPLETE'`. Change to determine filled state per-node:

               - Scout jewel: always filled (it ran before execution started)
               - Scaffold jewel: filled when `executionState.scaffoldStatus === 'complete'`
                 OR when `!isLive` and `isComplete`
               - Wave jewel: filled when ALL agents in that wave are complete
                 (`waveProgress.get(waveNum).complete === waveProgress.get(waveNum).total`)
                 OR when `!isLive` and `isComplete`
               - Merge jewel after wave N: filled when wave N merge status is 'success'
                 OR when `!isLive` and `isComplete`
               - Complete jewel: filled when `executionState` shows `runComplete`...
                 actually, check `!executionState?.isLive && isComplete` (run finished)

               When transitioning from unfilled to filled, add class `exec-jewel-filling`
               for the animation.

            3. **Agent box status styling** — the agent letter boxes inside wave nodes
               currently have static styling. When live, apply status-based styles
               matching AgentCard's `getStatusStyle`:

               ```typescript
               function getAgentBoxStyle(letter: string, waveNum: number) {
                 if (!executionState?.isLive) return {} // static mode
                 const exec = executionState.agents.get(`${waveNum}:${letter}`)
                 if (!exec) return {}
                 switch (exec.status) {
                   case 'running':
                     return {
                       borderColor: 'rgb(88, 166, 255)',
                       boxShadow: '0 0 12px rgba(88, 166, 255, 0.4)',
                     }
                   case 'complete':
                     return {
                       borderColor: 'rgb(63, 185, 80)',
                       boxShadow: '0 0 10px rgba(63, 185, 80, 0.3)',
                     }
                   case 'failed':
                     return {
                       borderColor: 'rgb(248, 81, 73)',
                       boxShadow: '0 0 12px rgba(248, 81, 73, 0.5)',
                     }
                   default:
                     return {}
                 }
               }
               ```

               Merge the returned style with the existing inline style on agent boxes.
               Also add the corresponding CSS class (`exec-node-running`, etc.) for
               the animation.

            4. **Wave progress indicator** — next to the "{N} parallel" text, when live,
               show progress: "{complete}/{total} complete" instead.

            5. **Backward compatibility**: When `executionState` is undefined or
               `isLive` is false, render exactly as before. The `isComplete` flag
               from `doc_status` drives the static filled state as it does now.

            ## Tests to Write

            Create `web/src/components/review/WaveStructurePanel.test.tsx`:

            1. TestStaticRendering — renders with impl data, no executionState (existing behavior)
            2. TestAgentBoxRunningGlow — when executionState has "1:A" running, agent A's
               box has running border/shadow styles
            3. TestJewelFillsOnWaveComplete — when all agents in wave 1 are complete,
               the wave 1 jewel is filled
            4. TestProgressText — when live with 1/3 complete, shows "1/3 complete"
            5. TestScaffoldJewelFills — when scaffoldStatus is 'complete', scaffold jewel filled

            Mock `IMPLDocResponse` with 2 waves, 3 agents in wave 1.

            ## Verification Gate

            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-web/web
            npx tsc --noEmit
            npx vitest run WaveStructurePanel
            ```

            ## Constraints

            - Do NOT change the Jewel SVG component's internal rendering for static mode.
            - Pass `filled` as a computed value per-node, not globally.
            - Reuse the same status colors as AgentCard (rgb values above) for visual
              consistency across the app.
            - The "N parallel" vs "M/N complete" text switch must be based on `isLive`,
              not on whether any agent has a non-pending status.
            - Do NOT import from AgentCard.tsx directly — copy the style values.
              AgentCard is in a different component tree and its getStatusStyle is
              not exported.
          files:
            - web/src/components/review/WaveStructurePanel.tsx
          dependencies:
            - A
            - B
            - C
