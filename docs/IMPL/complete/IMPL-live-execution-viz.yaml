            - `AgentExecStatus` from `../../hooks/useExecutionSync`
            - `getAgentColor(letter)` from `../../lib/agentColors` (already imported)
            - CSS classes: `exec-node-running`, `exec-node-failed`, `exec-node-complete`,
              `exec-edge-active`, `exec-edge-inactive`, `exec-check-overlay`
              (defined by Agent B in index.css)

            ## Implementation Details

            1. Accept the new `executionState` prop in the component signature.

            2. Create a helper function to look up agent status:
               ```typescript
               function getExecStatus(letter: string, wave: number): AgentExecStatus | undefined {
                 if (!executionState?.isLive) return undefined
                 return executionState.agents.get(`${wave}:${letter}`)
               }
               ```

            3. **Node rendering** (in the `{nodes.map(node => ...)}` block):
               - Look up exec status: `const exec = getExecStatus(node.agent.letter, node.agent.wave)`
               - If `exec` exists, wrap the `<g>` element with a CSS class:
                 - `exec?.status === 'running'` -> add class `exec-node-running` and
                   set `--exec-pulse-color` CSS var to the agent's color
                 - `exec?.status === 'failed'` -> add class `exec-node-failed`, change
                   stroke to red (`#f85149`)
                 - `exec?.status === 'complete'` -> add class `exec-node-complete`, add
                   a small SVG check mark overlay (path inside a `<g>` with class
                   `exec-check-overlay`):
                   ```svg
                   <path d="M-4,0 L-1,3 L4,-3" stroke="currentColor" strokeWidth="2"
                         fill="none" transform="translate(cx, cy)" />
                   ```
                   where cx/cy is the node center
               - For running: increase fill opacity from `20` to `40` (e.g. `${color}40`)
               - For complete: solid fill at `60` opacity

            4. **Edge rendering** (in the `{edges.map(...)}` block):
               - Look up the source node's exec status
               - If source is `complete`, add class `exec-edge-active`
               - Otherwise when live, add class `exec-edge-inactive`
               - Remove the static `opacity={0.6}` when live (let CSS handle it)

            5. **Backward compatibility**: When `executionState` is undefined or
               `isLive` is false, render exactly as before — no CSS classes, static
               opacity values. This is the default path.

            ## Tests to Write

