            ## What to Implement

            Modify `DependencyGraphPanel.tsx` to animate nodes and edges during
            live wave execution. When `executionState` prop is provided and
            `isLive` is true, apply status-based CSS classes and visual overlays
            to agent nodes and dependency edges.

            ## Interfaces to Implement

            Extend the existing `DependencyGraphPanelProps` interface:

            ```typescript
            import { ExecutionSyncState } from '../../hooks/useExecutionSync'

            interface DependencyGraphPanelProps {
              dependencyGraphText?: string
              executionState?: ExecutionSyncState  // NEW
            }
            ```

            ## Interfaces to Call

