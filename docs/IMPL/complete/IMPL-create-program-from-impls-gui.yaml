interface_contracts:
    - name: POST /api/programs/analyze-impls
      description: |
        Accepts a list of IMPL slugs, runs CheckIMPLConflicts, returns the
        conflict report with disjoint sets and tier suggestions.
      definition: |
        // Request
        type AnalyzeImplsRequest struct {
          Slugs    []string `json:"slugs"`
          RepoPath string   `json:"repo_path,omitempty"` // optional, defaults to first configured repo
        }
        // Response: protocol.ConflictReport JSON
        // { conflicts: [], disjoint_sets: [][], tier_suggestion: {} }
      location: pkg/api/program_handler.go
    - name: POST /api/programs/create-from-impls
      description: |
        Accepts IMPL slugs and optional name/slug, calls GenerateProgramFromIMPLs,
        writes the PROGRAM manifest to disk, returns the result.
      definition: |
        // Request
        type CreateFromImplsRequest struct {
          Slugs       []string `json:"slugs"`
          Name        string   `json:"name,omitempty"`
          ProgramSlug string   `json:"program_slug,omitempty"`
          RepoPath    string   `json:"repo_path,omitempty"`
        }
        // Response: protocol.GenerateProgramResult JSON
        // { manifest_path, conflict_report, tier_assignments, manifest, validation_errors }
      location: pkg/api/program_handler.go
    - name: AnalyzeImplConflicts service function
      description: |
        Service layer function that wraps protocol.CheckIMPLConflicts with
        multi-repo resolution logic.
      definition: |
        func AnalyzeImplConflicts(deps Deps, slugs []string, repoPath string) (*protocol.ConflictReport, error)
      location: pkg/service/program_service.go
    - name: CreateProgramFromIMPLs service function
      description: |
        Service layer function that wraps protocol.GenerateProgramFromIMPLs with
        multi-repo resolution and config reading.
      definition: |
        func CreateProgramFromIMPLs(deps Deps, slugs []string, name string, programSlug string, repoPath string) (*protocol.GenerateProgramResult, error)
      location: pkg/service/program_service.go
    - name: analyzeImpls and createProgramFromImpls API functions
      description: |
        Frontend API functions added to the program namespace of SawClient
        and exported from programApi.ts.
      definition: |
        // In SawClient.program:
        analyzeImpls(slugs: string[], repo?: string): Promise<ConflictReport>
        createFromImpls(slugs: string[], name?: string, programSlug?: string, repo?: string): Promise<GenerateProgramResult>
      location: web/src/lib/apiClient.ts
    - name: ConflictReport and GenerateProgramResult TypeScript types
      description: |
        TypeScript interfaces mirroring Go SDK types for the frontend.
      definition: |
        export interface IMPLFileConflict {
          file: string
          impls: string[]
          repos?: string[]
        }
        export interface ConflictReport {
          conflicts: IMPLFileConflict[]
          disjoint_sets: string[][]
          tier_suggestion: Record<string, number>
        }
        export interface GenerateProgramResult {
          manifest_path: string
          conflict_report: ConflictReport
          tier_assignments: Record<string, number>
          manifest: any
          validation_errors?: any[]
        }
      location: web/src/types/program.ts
