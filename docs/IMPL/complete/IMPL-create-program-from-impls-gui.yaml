suitability_assessment: |
    1. File decomposition: 8 files across backend (Go handlers, service layer) and
       frontend (React components, API client, types). Clear separation between
       backend handlers, service logic, frontend components, and API wiring.
       Minimum 3 agents with disjoint ownership.

    2. Investigation-first items: None. The Go engine functions (CheckIMPLConflicts,
       GenerateProgramFromIMPLs) already exist in scout-and-wave-go pkg/protocol/.
       The web app imports this module. This is pure integration + UI work.

    3. Interface discoverability: Yes. The Go SDK types (ConflictReport,
       GenerateProgramResult, GenerateProgramOpts) are already defined.
       HTTP request/response shapes can be fully specified before implementation.

    4. Pre-implementation status: All TODO. No existing code for the analyze-impls
       or create-from-impls endpoints. The "New Program" button currently only
       launches the Planner - no dropdown exists yet.

    5. Parallelization value: Build/test cycle is ~30s (Go build + Go test + npm
       build + vitest). 3 agents across 2 waves, each touching 2-3 files.
       Backend and frontend are fully independent in Wave 1.

    Estimated times:
    - Scout phase: ~8 min
    - Agent execution: ~12 min (3 agents, 2 waves, ~5 min avg per agent)
    - Merge and verification: ~4 min
    Total SAW time: ~24 min

    Sequential baseline: ~30 min (3 agents x 10 min avg sequential)
    Time savings: ~6 min (20% faster)

    Recommendation: Clear speedup. Backend and frontend are fully parallel in
    Wave 1, with a small integration wave to wire the new components into
    App.tsx and AppHeader.tsx.
