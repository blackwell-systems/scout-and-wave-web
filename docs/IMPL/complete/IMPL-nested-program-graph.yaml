            ## Agent D — Nested Program Dependency Graph Component

            **What to implement:**
            Major rewrite of `ProgramDependencyGraph.tsx` to render three-level nested
            visualization: Tier containers > IMPL containers > Agent/Wave nodes.

            **Dependencies from Wave 1:**
            - Agent A: `ImplWaveInfo` and `ImplAgentInfo` types in `web/src/types/program.ts`
            - Agent B: Backend API now returns `waves` field on each `ImplTierStatus`
            - Agent C: `layoutAgentWaves()` from `web/src/lib/graphLayout.ts`

            **Changes to web/src/components/ProgramDependencyGraph.tsx:**

            1. **Import the shared layout utility:**
            ```typescript
            import { layoutAgentWaves, type AgentNode } from '../lib/graphLayout'
            ```

            2. **Update ImplNode interface** to include wave data:
            ```typescript
            interface ImplNode {
              slug: string
              tier: number
              dependencies: string[]
              status: string
              waves?: ImplWaveInfo[]  // from types/program.ts
            }
            ```

            3. **Update buildImplGraph()** to pass through wave data from the API response.
               The `ImplTierStatus` now has an optional `waves` field.

            4. **New IMPL container sizing logic:**
            ```typescript
            // Constants for nested layout
            const AGENT_NODE_SIZE = 28    // small circles for agents
            const AGENT_GAP = 40          // horizontal gap between agent nodes
            const WAVE_ROW_HEIGHT = 50    // vertical gap between wave rows inside IMPL
            const IMPL_PAD_X = 16         // padding inside IMPL container
            const IMPL_PAD_Y = 24         // padding (top includes slug label)
            const IMPL_MIN_W = 120        // minimum IMPL width
            const IMPL_MIN_H = 60         // minimum IMPL height (no waves)

            function computeImplSize(waves: ImplWaveInfo[]): { w: number; h: number } {
              if (!waves || waves.length === 0) return { w: IMPL_MIN_W, h: IMPL_MIN_H }
              const maxAgentsPerWave = Math.max(...waves.map(w => w.agents.length))
              const w = Math.max(IMPL_MIN_W, IMPL_PAD_X * 2 + maxAgentsPerWave * AGENT_GAP)
              const h = IMPL_PAD_Y + waves.length * WAVE_ROW_HEIGHT + 16
              return { w, h }
            }
            ```

            5. **Rewrite layoutNodes()** to handle variable-size IMPL containers:
            - Each IMPL node now has a computed width/height based on its wave/agent count
            - Tier row height = max IMPL height in that tier + padding
            - Horizontal spacing must account for variable IMPL widths
            - Center IMPLs within their tier row

            6. **Render nested agent nodes inside each IMPL container:**
            For each IMPL node that has `waves` data:
            - Use `layoutAgentWaves()` with small node size (28px) to get positioned agents
            - Render agent circles inside the IMPL container's SVG group
            - Color agents by status using `getAgentColor()` from entityColors
            - Add agent letter labels (fontSize 10)
            - Render intra-IMPL dependency edges as thin bezier curves

            7. **Agent status indicators (carry over from DependencyGraphPanel):**
            - Running agents: pulsing animation (reuse exec-node-running CSS class)
            - Complete agents: green fill + small checkmark overlay
            - Failed agents: red border
            - Pending agents: muted fill

            8. **Flowing particle animations on intra-IMPL edges:**
            - Active edges (source complete, target running): 3 flowing circles, 2s duration
            - Failed edges: red particles, 3s duration
            - Use smaller particle radius (1.5px) than DependencyGraphPanel (2.5px)
            - Create a `particle-glow` SVG filter def (this component only has `impl-glow` at line 366 — copy the particle-glow pattern from DependencyGraphPanel.tsx)

            9. **Wave row labels inside IMPL containers:**
            - Small "W1", "W2" labels on the left side of each wave row
            - fontSize 7, muted color, monospace

            10. **Inter-tier edges** remain as before (cubic bezier between IMPL containers),
                but connect from bottom-center of source IMPL to top-center of target IMPL.
                Adjust connection points for variable-height containers.

            11. **Tooltip enhancement:**
            When hovering an IMPL container, show:
            - IMPL slug, tier, status (existing)
            - Agent count and wave count (new)
            - Per-wave agent summary (new): "W1: A, B, C | W2: D, E"

            12. **Degenerate cases:**
            - IMPL with no wave data: render as current fixed-size rectangle (fallback)
            - Single-tier single-IMPL: render correctly without tier backgrounds
            - IMPL with 1 wave, 1 agent: small container, no intra-edges

            **Changes to web/src/components/__tests__/ProgramDependencyGraph.test.tsx:**

            Update the mock `ProgramStatus` data to include `waves` on ImplTierStatus entries:
            ```typescript
            impl_statuses: [
              {
                slug: 'impl-alpha',
                title: 'Alpha',
                status: 'complete',
                waves: [
                  { number: 1, agents: [
                    { id: 'A', status: 'complete' },
                    { id: 'B', status: 'complete' },
                  ]},
                  { number: 2, agents: [
                    { id: 'C', status: 'complete', dependencies: ['A', 'B'] },
                  ]},
                ],
              },
            ]
            ```

            Add tests for:
            - Nested agent nodes render inside IMPL containers
            - IMPL containers have variable sizes based on agent/wave count
            - Fallback rendering when waves data is missing
            - Tooltip shows agent summary

            **Verification gate:**
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-web/web && npx tsc --noEmit && node_modules/.bin/vitest run src/components/__tests__/ProgramDependencyGraph.test.tsx
            ```

            **Constraints:**
            - Keep pure SVG approach — no new libraries (no D3, no react-flow)
            - Maintain existing onSelectImpl click handler on IMPL containers
            - Support SSE-driven updates — component re-renders when programStatus prop changes
            - Responsive to container width (existing ResizeObserver pattern)
            - Must maintain backward compatibility: if API returns no waves, render old-style nodes
          files:
