            **Implementation approach:**

            1. Add new Go types to program_handler.go (or a new file in pkg/api/):

            ```go
            type ImplWaveDetail struct {
              Number int               `json:"number"`
              Agents []ImplAgentDetail `json:"agents"`
            }

            type ImplAgentDetail struct {
              ID           string   `json:"id"`
