pre_mortem:
    overall_risk: medium
    rows:
        - scenario: IMPL container sizing causes overlapping nodes when many agents per wave
          likelihood: medium
          impact: medium
          mitigation: computeImplSize uses Math.max with minimum dimensions; layout function centers within available space. Agent D should test with 6+ agents in a single wave.
        - scenario: Backend IMPL doc loading adds latency to program status endpoint
          likelihood: low
          impact: medium
          mitigation: Agent B only loads IMPL docs for IMPLs already in the response (bounded by tier size, typically 2-5 IMPLs). protocol.Load is fast for YAML parsing.
        - scenario: Particle animations on many intra-IMPL edges cause performance issues
          likelihood: medium
          impact: low
          mitigation: Only animate edges for active/failed states (not all edges). Programs typically have 2-5 IMPLs visible, each with 2-4 waves — bounded particle count.
        - scenario: Go SDK ImplTierStatus type change needed but owned by different repo
          likelihood: high
          impact: medium
          mitigation: Agent B creates web-specific response types in pkg/api/ instead of modifying the Go SDK. The web handler already wraps SDK types (ProgramStatusResponse pattern).
