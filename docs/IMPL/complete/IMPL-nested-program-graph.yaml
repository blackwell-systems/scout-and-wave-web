suitability_assessment: |
    1. File decomposition: 6 files across 3 repos (Go backend, TS types, React components,
       tests, shared layout utility). Clean decomposition into 4 agents across 2 waves.
       No file conflicts — each agent owns disjoint files.

    2. Investigation-first: No unknowns. Both graph renderers exist and are well-understood.
       The composition pattern (embedding agent layout inside IMPL containers) is a pure
       rendering concern with no runtime mysteries.

    3. Interface discoverability: Yes. The API response shape (ImplTierStatus extended with
       waves/agents) can be fully specified. The shared layout utility signature is deterministic
       from the existing DependencyGraphPanel code.

    4. Pre-implementation status: All files are TODO — this is a new feature composing two
       existing renderers.

    5. Parallelization value: High. Build/test cycle is >30s (Go build + vitest). Wave 1 has
       3 parallel agents (backend API, types, shared layout util). Wave 2 has 1 agent doing
       the main component rewrite consuming all Wave 1 outputs.

    Estimated times:
    - Scout phase: ~8 min
    - Agent execution: ~15 min (3 parallel W1 agents x 10 min + 1 W2 agent x 12 min)
    - Merge & verification: ~5 min
    Total SAW time: ~28 min
    Sequential baseline: ~45 min (4 agents x ~11 min avg)
    Time savings: ~17 min (38% faster)
    Recommendation: Clear speedup. Proceed.
