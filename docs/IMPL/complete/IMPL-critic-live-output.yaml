interface_contracts:
    - name: 'critic SSE event: critic_review_started'
      description: Emitted immediately when critic execution begins
      definition: |
        SSE event name: critic_review_started
        Payload: {"slug": string}
        Emitted by: runCriticAsync in critic_handler.go
        Consumed by: useCriticState.ts via global SSE events
      location: pkg/api/critic_handler.go
    - name: 'critic SSE event: critic_output'
      description: Streamed line-by-line critic agent stdout
      definition: |
        SSE event name: critic_output
        Payload: {"slug": string, "chunk": string}
        Emitted by: runCriticAsync in critic_handler.go (line-by-line from subprocess)
        Consumed by: useCriticState.ts, displayed in CriticOutputPanel.tsx
      location: pkg/api/critic_handler.go
    - name: 'critic SSE event: critic_review_failed'
      description: Emitted when critic execution fails or times out
      definition: |
        SSE event name: critic_review_failed
        Payload: {"slug": string, "error": string}
        Emitted by: runCriticAsync in critic_handler.go
        Consumed by: useCriticState.ts to stop spinner and show error
      location: pkg/api/critic_handler.go
    - name: useCriticState extended interface
      description: Hook returns additional fields for live output and error state
      definition: |
        interface CriticState {
          needsCritic: boolean
          criticReport: CriticResult | null
          criticRunning: boolean
          criticOutput: string          // NEW: accumulated live output
          criticError: string | null    // NEW: error message if failed
          runCritic: () => void
        }
      location: web/src/hooks/useCriticState.ts
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Backend: Streaming critic output via SSE

            **What to implement:**

            Modify `runCriticAsync` in `pkg/api/critic_handler.go` to:

            1. Emit `critic_review_started` SSE event immediately when the goroutine starts:
               ```go
               s.globalBroker.broadcastJSON("critic_review_started", map[string]string{"slug": slug})
               ```

            2. Replace `cmd.Run()` with line-by-line stdout/stderr streaming. Use `cmd.StdoutPipe()`
               and `cmd.StderrPipe()` with `bufio.Scanner` to read output line-by-line, emitting
               each line as a `critic_output` SSE event:
               ```go
               s.globalBroker.broadcastJSON("critic_output", map[string]interface{}{
                 "slug": slug, "chunk": line + "\n",
               })
               ```

            3. Add a 5-minute timeout using `context.WithTimeout`. If the context expires,
               emit `critic_review_failed` with error "critic timed out after 5 minutes".

            4. On any error (subprocess exit code != 0, pipe failure), emit `critic_review_failed`:
               ```go
               s.globalBroker.broadcastJSON("critic_review_failed", map[string]interface{}{
                 "slug": slug, "error": err.Error(),
               })
               ```

            5. On success, continue to emit `critic_review_complete` as before.

            **Reference pattern:** See `runScoutAgent` in `pkg/service/scout_service.go` lines 76-150
            for the exact stdout streaming pattern (onChunk callback). The critic uses globalBroker
            directly since it doesn't have a per-run SSE channel.

            **Tests:** Create `pkg/api/critic_handler_test.go` with:
            - Test that `critic_review_started` event is emitted before subprocess runs
            - Test that `critic_review_failed` event is emitted on error
            - Test the timeout behavior (use a short timeout for testing)
            - Mock the subprocess execution

            **Verification gate:**
            ```
            cd /Users/dayna.blackwell/code/scout-and-wave-web && go build ./... && go vet ./... && go test ./pkg/api/... -run TestCritic
            ```

            **Constraints:**
            - Do NOT modify any frontend files
            - Keep the existing `handleGetCriticReview`, `handleRunCriticReview`, and `handleFixCritic` handler signatures unchanged
            - The POST /api/impl/{slug}/run-critic endpoint must still return 202 immediately
            - Use `globalBroker.broadcastJSON` for all SSE events (same pattern as `EmitCriticReviewComplete`)
          files:
            - pkg/api/critic_handler.go
            - pkg/api/critic_handler_test.go
        - id: B
          task: |
            ## Frontend: useCriticState hook + CriticOutputPanel

            **What to implement:**

            1. **Extend `useCriticState.ts`** to handle three new SSE events via `useGlobalEvents`:

               - `critic_review_started`: set `criticRunning = true`, clear `criticOutput` and `criticError`
               - `critic_output`: append `data.chunk` to `criticOutput` accumulator
               - `critic_review_failed`: set `criticRunning = false`, set `criticError = data.error`

               Add two new state fields:
               ```typescript
               const [criticOutput, setCriticOutput] = useState('')
               const [criticError, setCriticError] = useState<string | null>(null)
               ```

               Return them from the hook: `{ needsCritic, criticReport, criticRunning, criticOutput, criticError, runCritic }`

               Wire the SSE event handlers via `useGlobalEvents`:
               ```typescript
               useGlobalEvents({
                 critic_review_complete: handleCriticComplete,
                 critic_review_started: handleCriticStarted,
                 critic_output: handleCriticOutput,
                 critic_review_failed: handleCriticFailed,
               })
               ```

               Each handler should check `data?.slug === slug` before updating state (same pattern as existing `handleCriticComplete`).

            2. **Create `CriticOutputPanel.tsx`** — a collapsible panel that shows live critic output:

               ```typescript
               interface CriticOutputPanelProps {
                 output: string
                 running: boolean
                 error: string | null
               }
               ```

               - When `running && !output`: show "Starting critic review..." with a spinner
               - When `running && output`: show output in a `<pre>` with auto-scroll (same pattern as ScoutLauncher output area)
               - When `error`: show error in a red banner
               - When `!running && !error && output`: show output collapsed by default with a toggle
               - Use the typewriter effect pattern from ScoutLauncher (requestAnimationFrame-based catch-up)
               - Style: dark code block background, monospace font, max-height with scroll

            **Reference:** See `ScoutLauncher.tsx` lines 44-61 for the typewriter effect and lines 125-132 for SSE event handling pattern.

            **Verification gate:**
            ```
            cd /Users/dayna.blackwell/code/scout-and-wave-web/web && npx tsc --noEmit
            ```

            **Constraints:**
            - Do NOT modify WaveBoard.tsx or ReviewScreen.tsx (those are Wave 2 Agent C's files)
            - Do NOT modify any Go files
            - Export `CriticOutputPanel` as a named export
            - The hook must remain backward-compatible: existing consumers that don't use the new fields should still work
          files:
            - web/src/hooks/useCriticState.ts
            - web/src/components/CriticOutputPanel.tsx
