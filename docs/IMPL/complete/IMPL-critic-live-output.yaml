title: Critic Live Output Streaming
feature_slug: critic-live-output
verdict: SUITABLE
suitability_assessment: |
    All five suitability checks pass:

    1. File decomposition: 6 files across backend and frontend, cleanly split
       into 3 agents with disjoint ownership. Backend streaming (Go) is independent
       of frontend display (React).

    2. Investigation-first items: None. The pattern is well-established — Scout and
       Wave agents already stream output via SSE. This is replication of a known pattern.

    3. Interface discoverability: Yes. The SSE event names and payload shapes can be
       fully specified upfront, matching existing scout_output/scout_complete patterns.

    4. Pre-implementation status: All work is TODO. No existing streaming for critic.
       Current implementation is fire-and-forget with silent failure (critic_handler.go:78-90).

    5. Parallelization value: Build+test cycle is ~30s (Go build + npm build + embedded
       assets). 3 agents across 2 waves with 2 files each is good parallelization.

    Estimated times:
    - Scout phase: ~8 min
    - Agent execution: ~12 min (3 agents, waves 1+2)
    - Merge and verification: ~5 min
    Total SAW time: ~25 min
    Sequential baseline: ~35 min
    Time savings: ~10 min (29% faster)
    Recommendation: Clear speedup with coordination value.
