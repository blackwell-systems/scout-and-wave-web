pre_mortem:
    overall_risk: low
    rows:
        - scenario: globalBroker SSE events dropped under high load
          likelihood: low
          impact: low
          mitigation: globalBroker has buffered channels (size 16). Critic output is line-by-line, not high-frequency. Dropped lines are cosmetic only.
        - scenario: Subprocess pipe reading blocks indefinitely
          likelihood: low
          impact: medium
          mitigation: 5-minute context timeout ensures cleanup. Use cmd.Process.Kill() in defer after context cancellation.
        - scenario: TypeScript compilation errors from new hook fields
          likelihood: low
          impact: low
          mitigation: New fields are additive to existing interface. Existing destructuring patterns are unaffected.
