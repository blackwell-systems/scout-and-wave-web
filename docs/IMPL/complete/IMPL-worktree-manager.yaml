interface_contracts:
    - definition: |
        Request body (JSON):
          { "branches": ["wave1-agent-A", "wave1-agent-B"], "force": false }

        Response 200 (JSON):
          {
            "results": [
              { "branch": "wave1-agent-A", "deleted": true, "error": "" },
              { "branch": "wave1-agent-B", "deleted": false, "error": "branch is unmerged" }
            ],
            "deleted_count": 1,
            "failed_count": 1
          }

        Response 409 (JSON) — when force=false and any branch is unmerged:
          {
            "error": "unmerged branches exist",
            "unmerged": ["wave1-agent-B"]
          }
      description: Batch-delete multiple worktree branches. Returns results per branch.
      location: pkg/api/worktree_handler.go
      name: POST /api/impl/{slug}/worktrees/cleanup
    - definition: |
        // Already defined in types.go — no type change needed.
        // Agent A must populate HasUnsaved by running:
        //   git -C <worktree-path> status --porcelain
        // If output is non-empty, HasUnsaved = true.

        // Also add a LastCommitAge field to WorktreeEntry:
        type WorktreeEntry struct {
            Branch        string `json:"branch"`
            Path          string `json:"path"`
            Status        string `json:"status"`       // "merged", "unmerged", "stale"
            HasUnsaved    bool   `json:"has_unsaved"`
            LastCommitAge string `json:"last_commit_age,omitempty"` // e.g. "3 hours ago", "2 days ago"
        }

        // A branch is "stale" when: status == "unmerged" AND last commit is > 24 hours old.
      description: Populate the existing has_unsaved field by checking git status in worktree path
      location: pkg/api/types.go
      name: WorktreeEntry.HasUnsaved enhancement
    - definition: |
        export interface WorktreeEntry {
          branch: string
