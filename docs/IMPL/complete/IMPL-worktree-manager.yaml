          status: 'merged' | 'unmerged' | 'stale'
          has_unsaved: boolean
          last_commit_age?: string  // NEW — e.g. "3 hours ago"
        }
      description: Mirror the Go type addition in TypeScript
      location: web/src/types.ts
      name: WorktreeEntry TypeScript update
    - definition: |
        export interface WorktreeBatchDeleteRequest {
