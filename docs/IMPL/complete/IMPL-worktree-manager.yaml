pre_mortem:
    overall_risk: low
    rows:
        - impact: low
          likelihood: low
          mitigation: |
            This is safe because Wave 1 is fully merged before Wave 2 starts. Agent C adds a new function (detectStaleBranches) to the file — no conflict with Agent A's changes. The function is additive and does not modify existing code.
          scenario: Agent C modifies worktree_handler.go which Agent A also owns in Wave 1
        - impact: medium
          likelihood: medium
          mitigation: |
            The list endpoint already runs git worktree list and git branch --merged. Adding git status per worktree is O(N) where N is typically 2-10 SAW branches. For large repos, each git status takes ~100ms. Total overhead: <1s for typical usage. If needed, the HasUnsaved check can be made optional via a query param.
          scenario: git status --porcelain is slow in large worktrees, blocking list endpoint
        - impact: low
          likelihood: medium
          mitigation: |
            The batch-delete response returns per-branch results with success/failure status. The frontend displays which deletions succeeded and which failed, then auto-refreshes the list. No rollback needed — branch deletion is idempotent (deleting an already-deleted branch is a no-op error).
          scenario: Batch delete partially succeeds — some branches deleted, some fail
        - impact: low
          likelihood: low
          mitigation: |
            Standard React cleanup pattern — the useWaveEvents hook already handles EventSource cleanup on unmount. If the event arrives after unmount, it is silently dropped. No state leak.
          scenario: stale_branches_detected SSE event fires but WaveBoard component unmounted
        - impact: low
          likelihood: low
          mitigation: |
            SAW branches always have at least one commit (the branch creation commit). If git log fails for any reason, LastCommitAge is set to empty string (omitempty ensures it is omitted from JSON). No crash path.
          scenario: WorktreeEntry.LastCommitAge relies on git log which fails on empty branches
