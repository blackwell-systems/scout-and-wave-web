          id: A
          task: |
            ## What to Implement

            Enhance the existing worktree backend in `pkg/api/worktree_handler.go` with:

            1. **Populate HasUnsaved field** in `parseWorktreePorcelain`: After parsing each
               worktree entry, run `git -C <path> status --porcelain` and set `HasUnsaved = true`
               if the output is non-empty. Refactor so the function receives `repoPath` or runs
               git externally (the current signature only takes `data []byte` — you will need to
               either add a second pass or restructure the list handler).

            2. **Add LastCommitAge field**: After parsing each worktree entry, run
               `git -C <path> log -1 --format=%cr` to get the relative date of the last commit.
               Store it in a new `LastCommitAge` field on `WorktreeEntry`.

            3. **Stale detection**: Mark a branch as `"stale"` when it is unmerged AND its last
               commit is older than 24 hours. Use `git -C <path> log -1 --format=%ct` to get the
               Unix timestamp and compare to `time.Now().Unix()`.

            4. **Batch-delete endpoint**: Add `handleBatchDeleteWorktrees` for
               `POST /api/impl/{slug}/worktrees/cleanup`. It accepts:
               ```json
               { "branches": ["wave1-agent-A", ...], "force": false }
               ```
               When `force=false` and any branch is unmerged, return 409 with the list of
               unmerged branches. When `force=true` (or all are merged), delete each
               worktree + branch (reuse existing `findWorktreePath` and delete logic from
               `handleDeleteWorktree`). Return a per-branch result summary.

            5. **Add types** to `pkg/api/types.go`:
               - Add `LastCommitAge string` field to `WorktreeEntry`
               - Add `WorktreeBatchDeleteRequest`, `WorktreeBatchDeleteResult`,
                 `WorktreeBatchDeleteResponse` types

            6. **Write tests** in `pkg/api/worktree_handler_test.go`:
               - Test `parseWorktreePorcelain` with merged/unmerged branches
               - Test batch-delete request validation (empty branches, missing force)

