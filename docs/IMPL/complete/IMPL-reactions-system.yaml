interface_contracts:
    - name: ReactionsConfig
      description: |
        Top-level reactions block in an IMPL manifest. Maps each failure type to a
        ReactionEntry that overrides the E19 global default. All fields optional;
        absent entries fall back to E19 defaults. Added to IMPLManifest in types.go.
      definition: |
        // ReactionsConfig holds per-failure-type routing overrides for an IMPL manifest.
        // When present, the orchestrator reads this before falling back to E19 defaults.
        type ReactionsConfig struct {
            Transient   *ReactionEntry `yaml:"transient,omitempty"   json:"transient,omitempty"`
            Timeout     *ReactionEntry `yaml:"timeout,omitempty"     json:"timeout,omitempty"`
            Fixable     *ReactionEntry `yaml:"fixable,omitempty"     json:"fixable,omitempty"`
            NeedsReplan *ReactionEntry `yaml:"needs_replan,omitempty" json:"needs_replan,omitempty"`
            Escalate    *ReactionEntry `yaml:"escalate,omitempty"    json:"escalate,omitempty"`
        }

        // ReactionEntry defines the action and retry cap for one failure type.
        type ReactionEntry struct {
            // Action: "retry" | "send-fix-prompt" | "pause" | "auto-scout"
            Action      string `yaml:"action"                  json:"action"`
            // MaxAttempts is the maximum number of attempts (including the first).
            // Only meaningful when Action is "retry" or "send-fix-prompt".
            MaxAttempts int    `yaml:"max_attempts,omitempty"  json:"max_attempts,omitempty"`
        }
      location: pkg/protocol/types.go
    - name: RouteFailureWithReactions
      description: |
        Variant of RouteFailure that consults the manifest's ReactionsConfig before
        falling back to the E19 hardcoded switch. Lives in pkg/orchestrator/failure.go.
        Returns the same OrchestratorAction enum as RouteFailure; caller is unchanged
        except it now passes the (possibly nil) *protocol.ReactionsConfig.
        MaxAttemptsFor returns the per-IMPL max attempts, falling back to protocol.MaxRetries.
      definition: |
        // RouteFailureWithReactions maps a FailureType to an OrchestratorAction,
        // consulting reactions first, then falling back to E19 defaults.
        // reactions may be nil (absent block) — in that case behavior is identical to RouteFailure.
        func RouteFailureWithReactions(failureType types.FailureType, reactions *protocol.ReactionsConfig) OrchestratorAction

        // MaxAttemptsFor returns the max retry attempts for a failure type,
        // consulting reactions first, then falling back to protocol.MaxRetries(failureType).
        func MaxAttemptsFor(failureType types.FailureType, reactions *protocol.ReactionsConfig) int
      location: pkg/orchestrator/failure.go
    - name: ValidateReactions
      description: |
        Validates the reactions block in an IMPL manifest. Checks that each present
        ReactionEntry has a valid Action value and that MaxAttempts is non-negative.
        Called by Validate() in validation.go. Returns ValidationErrors with code SV01.
      definition: |
        func ValidateReactions(m *IMPLManifest) []ValidationError
      location: pkg/protocol/reactions_validation.go
    - name: ReactionsConfig (TypeScript)
      description: |
        TypeScript mirror of the Go ReactionsConfig for the web UI. Added to types.ts.
        Used by the read-only ReactionsPanel component.
      definition: |
        export interface ReactionEntry {
          action: 'retry' | 'send-fix-prompt' | 'pause' | 'auto-scout'
          max_attempts?: number
        }

        export interface ReactionsConfig {
          transient?:    ReactionEntry
          timeout?:      ReactionEntry
          fixable?:      ReactionEntry
          needs_replan?: ReactionEntry
          escalate?:     ReactionEntry
        }
      location: web/src/types.ts
    - name: ReactionsPanel
      description: |
        Read-only React component that renders the reactions block from an IMPL manifest.
        Shown in ReviewScreen alongside PreMortemPanel. If reactions is undefined the
        component renders nothing (returns null). No edit controls — users edit YAML directly.
      definition: |
        interface ReactionsPanelProps {
          reactions: ReactionsConfig | undefined
        }
        export default function ReactionsPanel(props: ReactionsPanelProps): JSX.Element | null
      location: web/src/components/review/ReactionsPanel.tsx
