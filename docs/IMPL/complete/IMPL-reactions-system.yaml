suitability_assessment: |
    SUITABLE. The feature decomposes cleanly into four disjoint ownership zones:
    (A) protocol spec + Scout prompt guidance in scout-and-wave repo,
    (B) Go SDK types + schema validation in scout-and-wave-go,
    (C) orchestrator failure routing override in scout-and-wave-go,
    (D) web UI read-only reactions panel in scout-and-wave-web.

    Agents B and C both touch scout-and-wave-go but own completely different files:
    B owns pkg/protocol/types.go + schema_unknown_keys.go + failure.go (protocol layer),
    C owns pkg/orchestrator/failure.go (orchestrator layer). No file conflicts.

    All cross-agent interfaces are definable before implementation starts:
    - ReactionsConfig and ReactionEntry Go types (B defines, C consumes)
    - RouteFailureWithReactions function signature (B defines in protocol, C calls)
    - TypeScript ReactionsConfig interface (B defines in types.ts, D consumes)

    Backward compatibility is the central design constraint: absent reactions block
    falls through to existing E19 defaults unchanged. No existing tests break.

    No investigation-first work needed. The failure routing code is well-understood
    (pkg/orchestrator/failure.go, pkg/protocol/failure.go).

    Three of the four agents can run in Wave 1 in parallel (A, B, D are independent).
    C depends on B for the ReactionsConfig type. Two-wave structure.

    Estimated times:
    - Scout phase: ~15 min (multi-repo, interface contracts, 4 agents)
    - Agent execution: ~35 min (Wave 1: 3 agents x 15 min, Wave 2: 1 agent x 10 min)
    - Merge and verification: ~5 min
    Total SAW time: ~55 min
    Sequential baseline: ~80 min
    Time savings: ~25 min (31% faster)
