suitability_assessment: |
    All five suitability questions resolve cleanly.

    1. File decomposition: Changes span 10+ distinct files across Go backend and
       TypeScript frontend. The work breaks cleanly into: (A) backend keepalive
       additions (wave.go, scout.go, planner.go, impl_edit.go, chat_handler.go),
       (B) a new shared TypeScript utility (waveEventListeners.ts) that both
       useWaveEvents.ts and waveEventStore.ts will call, (C) ReviewScreen.tsx
       deduplication, and (D) the useGlobalEvents singleton hook with its
       consumers (App.tsx, useNotifications.ts, usePipeline.ts). File ownership
       is fully disjoint across all wave-1 agents.

    2. No investigation-first items. All problems are diagnosed and have
       specific file:line references in the audit. No crashes to reproduce.

    3. Interface contracts are fully definable up front. The shared
       attachWaveEventListeners function signature and the useGlobalEvents
       singleton API can be specified before any agent begins.

    4. Pre-implementation status check: All items (R1-R5) are TODO.
       R6 (Last-Event-ID) is deferred as a follow-on IMPL because it requires
       server-side ring buffer state and atomic counter management that would
       conflict with R1 changes to the same handler functions. Scoping R6 out
       keeps all wave-1 agents fully independent with no shared file ownership.

    5. Parallelization value: Go and TypeScript builds both take >10 seconds.
       The 5 wave-1 agents are completely independent (no shared files). This
       is a clear parallelization win — estimated 3-4x speedup vs sequential.

    R6 (Last-Event-ID replay) is explicitly out of scope. The audit's F11
    (ProgramBoard+ProgramContractsPanel duplicate /api/program/events) is
    included as Agent E (wave 1, fully disjoint). The audit's R3 (per-slug
    server-side filtering) maps to the high-effort F12/F13 findings and is
    out of scope; it would require touching all globalBroker broadcast call
    sites across the entire API package and is better suited to a dedicated
    refactor IMPL.

    Out-of-scope items: R3 (server-side slug filtering, high effort, low
    priority for single-user tool), R6 (Last-Event-ID, complex, deferred).

    Estimated times:
    - Scout phase: ~15 min (audit read, file analysis, interface contracts)
    - Agent execution: ~5 agents x ~10 min avg = ~50 min, but parallel = ~10 min
    - Merge and verification: ~5 min
    Total SAW time: ~30 min
    Sequential baseline: ~55 min
    Time savings: ~25 min (~45% faster)
    Recommendation: Clear speedup. Proceed.
