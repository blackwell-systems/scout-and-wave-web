            ## Agent E — ProgramContractsPanel Standalone EventSource Removal (F11 rescoped)

            ### Context (read before implementing)

            `ProgramContractsPanel.tsx` opens its own `new EventSource('/api/program/events')`
            to listen for `program_contract_frozen`. However, `ProgramContractsPanel` is
            **currently an orphaned component** — it is not imported or rendered anywhere in
            the codebase. The two-simultaneous-connections problem does not occur at runtime.

            The original brief assumed ProgramBoard and ProgramContractsPanel were always
            co-rendered. That is incorrect. **Do NOT modify ProgramBoard.tsx.**

            ### What to implement

            Fix `ProgramContractsPanel.tsx` only:

            1. Remove the standalone `new EventSource('/api/program/events')` useEffect
               (currently around lines 49-65):
               ```typescript
               useEffect(() => {
                 const eventSource = new EventSource('/api/program/events')
                 eventSource.addEventListener('program_contract_frozen', handleContractFrozen)
                 return () => { eventSource.close() }
               }, [programSlug])
               ```

            2. Replace with an optional `onContractFrozen?: () => void` prop on the component:
               ```typescript
               interface ProgramContractsPanelProps {
                 programSlug: string
                 onContractFrozen?: () => void  // add this
                 // ... existing props ...
               }
               ```

            3. Call `void loadContracts()` (or equivalent) when the prop fires:
               ```typescript
               useEffect(() => {
                 if (onContractFrozen) {
                   // caller will invoke this when a contract freezes
                 }
               }, [onContractFrozen])
               ```
               Actually: the prop is a callback the parent calls, not an event the component
               listens to. Wire it so that when `onContractFrozen` is called by the parent,
               the component re-fetches contracts. A simple pattern:
               ```typescript
               const [contractRefreshTick, setContractRefreshTick] = useState(0)
               // expose to parent:
               // onContractFrozen = () => setContractRefreshTick(t => t + 1)
               // internal useEffect depends on contractRefreshTick
               ```
               But since the parent calls the prop, just have the parent pass:
               `onContractFrozen={() => triggerRefetch()}` when it wires this in future.
               For now the component just accepts the prop and is ready.

            ### Outcome

            `ProgramContractsPanel` no longer contains a standalone EventSource. When a future
            wave wires it into ProgramBoard (which already has the reconnecting EventSource),
            the parent can pass `onContractFrozen` to trigger refreshes. No runtime behavior
            changes today since the component is not rendered anywhere.

