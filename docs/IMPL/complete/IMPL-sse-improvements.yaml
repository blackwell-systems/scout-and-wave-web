        - id: D
          task: |
            ## Agent D — Centralize /api/events into useGlobalEvents Singleton (R2)

            ### What to implement

            Three separate components each open `new EventSource('/api/events')`:
            - `App.tsx:108` — listens for `impl_list_updated`
            - `hooks/useNotifications.ts:112` — listens for `notification`
            - `hooks/usePipeline.ts:54` — listens for `pipeline_updated`, `impl_list_updated`

            This results in 3 simultaneous persistent connections to the same endpoint.
            Create a shared singleton hook at `web/src/hooks/useGlobalEvents.ts` and
            migrate all three consumers to use it.

            ### Step 1: Create `web/src/hooks/useGlobalEvents.ts`

            A scaffold stub may already exist at this path. Implement (or overwrite) it
            with a module-level singleton using reference counting:

            ```typescript
            import { useEffect } from 'react'

            let singletonEs: EventSource | null = null
            let refCount = 0
            const handlerMap = new Map<string, Set<(event: MessageEvent) => void>>()

            type GlobalEventHandlers = Partial<Record<string, (event: MessageEvent) => void>>

            export function useGlobalEvents(handlers: GlobalEventHandlers): void {
              useEffect(() => {
                refCount++
                if (!singletonEs) {
                  singletonEs = new EventSource('/api/events')
                  singletonEs.onerror = () => { /* optional log */ }
                }

                const entries = Object.entries(handlers).filter(([, h]) => h != null) as [string, (e: MessageEvent) => void][]

                for (const [eventType, handler] of entries) {
                  if (!handlerMap.has(eventType)) {
                    handlerMap.set(eventType, new Set())
                    const es = singletonEs!
                    es.addEventListener(eventType, (e) => {
                      handlerMap.get(eventType)?.forEach(h => h(e as MessageEvent))
                    })
                  }
                  handlerMap.get(eventType)!.add(handler)
                }

                return () => {
                  for (const [eventType, handler] of entries) {
                    handlerMap.get(eventType)?.delete(handler)
                  }
                  refCount--
                  if (refCount === 0 && singletonEs) {
                    singletonEs.close()
                    singletonEs = null
                    handlerMap.clear()
                  }
                }
              }, []) // mount-only; handlers registered by stable identity
            }
            ```

            Callers MUST pass stable handler references (via useCallback) to avoid
            re-registration issues. Document this in a comment.

            ### Step 2: Refactor `web/src/App.tsx`

            Replace the useEffect block at lines 107-118 that creates `new EventSource('/api/events')`.

            ```typescript
            import { useGlobalEvents } from './hooks/useGlobalEvents'
            import { useCallback } from 'react'

            // In the component body:
            useGlobalEvents({
              impl_list_updated: useCallback(() => {
                setSseConnected(true)
                listImpls().then(setEntries).catch(() => {})
                fetchInterruptedSessions().then(setInterruptedSessions).catch(() => {})
                setSseRefreshTick(t => t + 1)
              }, []),
            })
            ```

            The `es.onopen = () => setSseConnected(true)` and `es.onerror = () => setSseConnected(false)`
            lines from the old code won't map directly. Keep `sseConnected` behavior by setting it true
            on the first `impl_list_updated` event (already done above). Remove the old useEffect entirely.

            **Known behavioral tradeoff:** After this change, `sseConnected` will become `true` on
            the first `impl_list_updated` event but will NEVER become `false` on disconnect (the
            singleton has no per-consumer error callback). This is acceptable for a local single-user
            tool — the reconnect indicator is a nice-to-have, not safety-critical. Add a TODO comment
            in useGlobalEvents.ts noting that per-consumer error callbacks could be added later if needed.

            ### Step 3: Refactor `web/src/hooks/useNotifications.ts`

            Fix the stale-closure issue (F7): the current useEffect re-creates the EventSource
            whenever `preferences`, `isPageVisible`, or `browserPermission` change.

            Use refs to capture current values so a stable handler doesn't need re-registration.

            **IMPORTANT: Import changes are ADDITIVE.** The existing file already imports
            `useState`, `useEffect`, and other React hooks. Do NOT replace the existing import
            line — MERGE `useCallback` and `useRef` into it:
            ```typescript
            // WRONG — deletes existing imports:
            import { useCallback, useRef } from 'react'
            // CORRECT — merge into existing:
            import { useState, useEffect, useCallback, useRef } from 'react'
            ```
            Read the file first and add only what is missing.

            ```typescript
            import { useGlobalEvents } from './useGlobalEvents'

            // In the hook body, add refs:
            const preferencesRef = useRef(preferences)
            const isPageVisibleRef = useRef(isPageVisible)
            const browserPermissionRef = useRef(browserPermission)

            useEffect(() => { preferencesRef.current = preferences }, [preferences])
            useEffect(() => { isPageVisibleRef.current = isPageVisible }, [isPageVisible])
            useEffect(() => { browserPermissionRef.current = browserPermission }, [browserPermission])

            const handleNotification = useCallback((event: MessageEvent) => {
              const prefs = preferencesRef.current
              const visible = isPageVisibleRef.current
              const permission = browserPermissionRef.current
              // ... notification logic using refs instead of direct state variables ...
            }, []) // stable — no deps, reads via refs

            useGlobalEvents({ notification: handleNotification })
            ```

            Remove the old `useEffect([preferences, isPageVisible, browserPermission])` block entirely.
            Keep all other logic (dismissToast, updatePreferences, etc.) unchanged.

            ### Step 4: Refactor `web/src/hooks/usePipeline.ts`

            Replace the useEffect at lines 49-74 that creates `new EventSource('/api/events')`:

