          - daemon_handler.go (2 encode)

          ### Verification gate

          ```bash
          cd /Users/dayna.blackwell/code/scout-and-wave-web && go vet ./pkg/api/... && go test ./pkg/api/... -short
          ```

          ### Constraints

          - Do NOT change any handler logic, only the encode/decode/error
            boilerplate.
          - Do NOT change function signatures or route registration.
          - All existing tests must pass without modification. If a test
            checks for plain-text error responses (http.Error output),
            note that respondError sends JSON — but existing tests use
            httptest which should handle both. If any test breaks due to
            the text-to-JSON change, update ONLY the assertion, not the
            handler logic.
          - Remove unused `encoding/json` imports ONLY if the file has no
            remaining direct json usage.
          - Do NOT modify helpers.go or helpers_test.go (owned by Agent B).
        files:
