interface_contracts:
  - name: "statusColors module exports"
    description: |
      Central status color definitions for all UI status domains.
      Replaces inline color maps in AgentCard, PipelineRow, ProgramBoard,
      ProgramDependencyGraph, and SuitabilityBadge.
    definition: |
      // web/src/lib/statusColors.ts

      // Raw RGB color values for status-based border/glow effects (AgentCard style)
      export function getStatusBorderColor(domain: StatusDomain, status: string): string
      export function getStatusGlowStyle(domain: StatusDomain, status: string): { borderColor: string; boxShadow: string }

      // Tailwind class strings for badge/hover styling
      export function getStatusBadgeClasses(domain: StatusDomain, status: string): string
      export function getStatusHoverClass(domain: StatusDomain, status: string): string
      export function getStatusLabel(domain: StatusDomain, status: string): string

      // SVG node fill colors (for ProgramDependencyGraph)
      export function getNodeFillColors(status: string): { bg: string; border: string; text: string }

      // Program state dot colors (Tailwind classes)
      export function getProgramStateDotClass(state: string): string

      // Suitability verdict colors (Tailwind classes)
      export function getSuitabilityBadgeClasses(verdict: string): string

      export type StatusDomain = 'agent' | 'wave' | 'impl' | 'pipeline' | 'program'
    location: "web/src/lib/statusColors.ts"

  - name: "Go HTTP helpers"
    description: |
      Shared HTTP handler helpers to eliminate repeated JSON encode/decode
      and error response boilerplate across ~30 handler files.
    definition: |
      // pkg/api/helpers.go
      package api

      // respondJSON encodes data as JSON and writes to w with the given status code.
      // Sets Content-Type: application/json. Logs encoding errors.
      func respondJSON(w http.ResponseWriter, code int, data interface{})

      // respondError writes a JSON error response: {"error": msg}
      // Sets Content-Type: application/json.
      func respondError(w http.ResponseWriter, msg string, code int)

      // decodeJSON reads the request body (max 1MB), decodes into v.
      // Returns a user-friendly error string on failure (bad JSON, too large, wrong content-type).
      func decodeJSON(r *http.Request, v interface{}) error
    location: "pkg/api/helpers.go"

