      - id: D
        task: |
          ## What to implement

          Update Go HTTP handlers across pkg/api/ to use the new helper
          functions from helpers.go. Target the most repetitive files first.
          Focus on mechanical replacement — do NOT change any logic.

          ### Replacement patterns

          **Pattern 1: JSON response (most common, ~88 occurrences)**
          Before:
          ```go
          w.Header().Set("Content-Type", "application/json")
          json.NewEncoder(w).Encode(data)
          ```
          After:
          ```go
          respondJSON(w, http.StatusOK, data)
          ```
          Note: Some handlers use w.WriteHeader(201) before encoding —
          use respondJSON(w, http.StatusCreated, data) for those.

          **Pattern 2: Error response**
          Before:
          ```go
          http.Error(w, "some message", http.StatusBadRequest)
          ```
          After:
          ```go
          respondError(w, "some message", http.StatusBadRequest)
          ```
          IMPORTANT: This changes error format from plain text to JSON.
          Only convert handlers where the caller is our own frontend
          (all pkg/api/ handlers qualify since they serve our React app).

          **Pattern 3: JSON decode**
          Before:
          ```go
          if err := json.NewDecoder(r.Body).Decode(&req); err != nil {
              http.Error(w, "bad request", http.StatusBadRequest)
              return
          }
          ```
          After:
          ```go
          if err := decodeJSON(r, &req); err != nil {
              respondError(w, err.Error(), http.StatusBadRequest)
              return
          }
          ```

          ### Files to modify (prioritized by repetition count)

          Update ALL handlers in these files. Each file has 3+ instances of
          the boilerplate patterns:

          - critic_handler.go (24 encode, 2 decode)
          - journal_handler.go (5 encode, 1 decode)
          - program_handler.go (6 encode, 4 decode)
