    agents:
      - id: A
        task: |
          ## What to implement

          Create `web/src/lib/statusColors.ts` — the single source of truth for
          all status-to-color mappings in the frontend. Also create a test file
          `web/src/lib/statusColors.test.ts`.

          ### Status domains to cover

          **Agent status** (pending, running, complete, failed):
          - Tailwind badge classes (from StatusBadges.tsx agentStatusConfig)
          - Raw RGB border/glow styles (from AgentCard.tsx getStatusStyle)
          - Status labels

          **Wave status** (pending, running, complete, partial, merged, failed):
          - Tailwind badge classes (from StatusBadges.tsx waveStatusConfig)
          - Status labels

          **IMPL status** (complete, executing, in-progress, reviewed, scouting,
          blocked, not-suitable, pending):
          - Tailwind badge classes (from StatusBadges.tsx implStatusConfig)
          - Raw RGB colors (from ProgramBoard.tsx getImplStatusColor)
          - SVG node fill colors (from ProgramDependencyGraph.tsx getNodeFill)
          - Status labels

          **Pipeline status** (executing, complete, blocked, queued):
          - Tailwind hover classes (from PipelineRow.tsx hoverColors)

          **Program state** (COMPLETE, TIER_EXECUTING, REVIEWED, SCAFFOLD, BLOCKED):
          - Tailwind dot classes (from ProgramBoard.tsx PROGRAM_STATE_COLORS)

          **Suitability verdict** (SUITABLE, NOT SUITABLE, SUITABLE WITH CAVEATS):
          - Tailwind badge classes (from SuitabilityBadge.tsx getBadgeClasses)

          ### Exports (interface contract)

          ```typescript
          export type StatusDomain = 'agent' | 'wave' | 'impl' | 'pipeline' | 'program'

          // Tailwind class strings
          export function getStatusBadgeClasses(domain: StatusDomain, status: string): string
          export function getStatusHoverClass(domain: StatusDomain, status: string): string
          export function getStatusLabel(domain: StatusDomain, status: string): string

          // Raw RGB for inline styles (AgentCard glow borders)
          export function getStatusBorderColor(domain: StatusDomain, status: string): string
          export function getStatusGlowStyle(domain: StatusDomain, status: string): {
            borderColor: string; boxShadow: string
          }

          // SVG fills for dependency graph nodes
          export function getNodeFillColors(status: string): {
            bg: string; border: string; text: string
          }

          // Program state dot (Tailwind class)
          export function getProgramStateDotClass(state: string): string

          // Suitability badge (Tailwind class)
          export function getSuitabilityBadgeClasses(verdict: string): string
          ```

          ### Implementation guidance

          - Organize internal data as typed Record maps (similar to the existing
            agentStatusConfig pattern in StatusBadges.tsx).
          - Every function must have a sensible default/fallback for unknown statuses.
          - Preserve exact color values from existing components — do NOT change
            any visual appearance.
          - Export the StatusDomain type for consumer type safety.

          ### Tests (statusColors.test.ts)

          - Each exported function returns expected values for known statuses.
          - Each exported function returns a fallback for unknown status strings.
          - getNodeFillColors returns object with bg, border, text keys.
          - getStatusGlowStyle returns object with borderColor, boxShadow keys.

          ### Verification gate

          ```bash
          cd /Users/dayna.blackwell/code/scout-and-wave-web/web && npx tsc --noEmit && npx vitest run src/lib/statusColors.test.ts
          ```

          ### Constraints

          - Do NOT modify any existing component files. Only create new files.
          - Preserve all exact color values from existing components.
          - All functions must be pure (no DOM access, no side effects).
        files:
          - "web/src/lib/statusColors.ts"
          - "web/src/lib/statusColors.test.ts"
        dependencies: []

      - id: B
        task: |
          ## What to implement

          Create `pkg/api/helpers.go` with shared HTTP handler helper functions,
          and `pkg/api/helpers_test.go` with thorough tests.

          ### Functions to implement

          **respondJSON(w http.ResponseWriter, code int, data interface{})**
          - Set Content-Type: application/json header
          - Write the status code via w.WriteHeader(code)
          - Encode data with json.NewEncoder(w).Encode(data)
          - If encoding fails, log the error (using log.Printf) — do NOT
            call http.Error since headers are already sent

          **respondError(w http.ResponseWriter, msg string, code int)**
          - Set Content-Type: application/json header
          - Write status code
          - Encode `{"error": msg}` as JSON response body
          - This replaces the pattern: http.Error(w, msg, code) which sends
            plain text — our new version sends JSON for API consistency

          **decodeJSON(r *http.Request, v interface{}) error**
          - Limit body to 1MB via http.MaxBytesReader
          - Create json.Decoder from limited body
          - Decoder.DisallowUnknownFields() — skip this, existing handlers
            do not enforce it and adding it would break clients
          - Call Decode(v)
          - Return user-friendly error messages:
            - Empty/nil body: "request body is empty"
            - JSON syntax error: "invalid JSON: <detail>"
            - Body too large: "request body too large (max 1MB)"
            - Other decode errors: pass through error message

          ### Tests (helpers_test.go)

          Test each function:
          - respondJSON: 200 with struct, 201 with slice, handles nil data
          - respondError: 400 with message, 500 with message, verify JSON
            structure {"error": "..."}
          - decodeJSON: valid JSON struct, empty body error, malformed JSON
            error, body exceeding 1MB

          Use httptest.NewRecorder and httptest.NewRequest.

          ### Verification gate

          ```bash
          cd /Users/dayna.blackwell/code/scout-and-wave-web && go vet ./pkg/api/... && go test ./pkg/api/ -run TestHelpers -v
          ```

          ### Constraints

          - Do NOT modify any existing handler files. Only create new files.
          - Package must be `api` (same as other handlers).
          - Keep imports minimal: encoding/json, log, net/http, io.
          - Do NOT add Content-Type checking to decodeJSON — existing handlers
            do not check it and adding it would break callers.
        files:
          - "pkg/api/helpers.go"
          - "pkg/api/helpers_test.go"
        dependencies: []

