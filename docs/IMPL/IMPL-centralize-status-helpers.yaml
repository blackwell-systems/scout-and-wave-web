      likelihood: medium
      impact: low
      mitigation: |
        Agent D's prompt explicitly addresses this: update test assertions
        if they check for plain-text error bodies. The change is intentional
        (API consistency) and mechanical to fix.
    - scenario: "Agent C misses a color value, causing visual regression"
      likelihood: low
      impact: medium
      mitigation: |
        Agent A's task requires preserving exact color values from existing
        components. Agent C's verification gate runs TypeScript type checking
        which catches missing exports. Visual regression is unlikely since
        the color data is copied verbatim.
    - scenario: "Agent D touches 17 files, increasing merge complexity"
      likelihood: low
      impact: low
      mitigation: |
        All changes are mechanical find-and-replace within a single package.
        No two agents touch the same files. Go compiler catches any typos
        immediately via the verification gate.
