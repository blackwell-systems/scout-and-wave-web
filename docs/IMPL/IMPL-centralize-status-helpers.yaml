title: "Centralize status color/badge mappings and Go handler boilerplate"
feature_slug: centralize-status-helpers
verdict: SUITABLE
state: REVIEWED

suitability_assessment: |
  File decomposition: The work splits cleanly into two independent domains —
  frontend status color centralization (TypeScript) and backend Go HTTP helper
  extraction. These share zero files. Within each domain, file ownership is
  disjoint: the new centralized modules (statusColors.ts, helpers.go) are
  created by one agent each, while consumer-file updates are distributed
  across separate agents.

  Investigation-first: No unknowns. The duplication patterns are visible in
  the codebase and the refactoring is mechanical.

  Interface discoverability: Yes — the helper function signatures can be
  fully defined before implementation. Both statusColors.ts exports and
  helpers.go functions have clear, typed contracts.

  Pre-implementation status: StatusBadges.tsx already partially centralizes
  badge configs (agentStatusConfig, waveStatusConfig, implStatusConfig) but
  5+ components still define their own color maps independently. No Go
  helpers.go exists yet.

  Parallelization value: High. Build+test cycle is ~4s for Go, plus npm
  build for frontend. 4 agents across 2 waves, with Wave 1 fully parallel
  (2 agents creating new files). Each agent touches 2-5 files. Clear speedup.

  Estimated times:
  - Scout phase: ~8 min
  - Agent execution: ~12 min (4 agents, 2 waves, ~5 min avg)
  - Merge & verification: ~4 min
  Total SAW time: ~24 min
  Sequential baseline: ~35 min (4 agents x ~8 min avg + context switching)
  Time savings: ~11 min (31% faster)
  Recommendation: Clear speedup.

