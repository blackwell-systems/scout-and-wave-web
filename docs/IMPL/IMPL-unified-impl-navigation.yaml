suitability_assessment: |
  1. File decomposition: Work spans 10+ files across frontend (TSX components, hooks, types)
     and backend (Go handlers). Files decompose cleanly into 4 agents with disjoint ownership.
  2. Investigation-first: No unknowns — all components are well-understood, clear deprecation path.
  3. Interface discoverability: The unified metrics endpoint contract can be fully defined upfront.
     ProgramBoard already consumes program data; adding metrics is additive.
  4. Pre-implementation status: All work is new — no prior partial implementations.
  5. Parallelization value: Build/test cycle is >30s (Go build + npm build + vitest).
     4 agents across 2 waves, with agents touching 2-4 files each. Clear speedup.

  Estimated times:
  - Scout phase: ~8 min
  - Agent execution: ~12 min (4 agents, 2 waves, ~6 min avg per wave)
  - Merge & verification: ~4 min
  Total SAW time: ~24 min

  Sequential baseline: ~40 min (4 agents x 10 min avg)
  Time savings: ~16 min (40% faster)

  Recommendation: Clear speedup. Proceed.

