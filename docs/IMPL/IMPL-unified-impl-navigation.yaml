interface_contracts:
  - name: "GET /api/programs (enhanced)"
    description: |
      Enhance the existing GET /api/programs endpoint to include global pipeline
      metrics (throughput, queue depth, blocked/complete counts) alongside the
      program list. Also returns standalone IMPLs not belonging to any program.
    definition: |
      // Go response type (program_handler.go)
      type ProgramListResponse struct {
        Programs   []protocol.ProgramDiscovery `json:"programs"`
        Metrics    PipelineMetrics             `json:"metrics"`
        Standalone []PipelineEntry             `json:"standalone"`
      }
    location: pkg/api/program_handler.go

  - name: "UnifiedProgramsView props"
    description: |
      The enhanced ProgramBoard becomes the unified view. It receives global
      metrics and standalone IMPLs alongside program data.
    definition: |
      interface UnifiedProgramsViewProps {
        onSelectImpl: (slug: string) => void
        onSelectProgram: (programSlug: string) => void
      }
    location: web/src/components/ProgramBoard.tsx

  - name: "GlobalMetricsBar component"
    description: |
      Extracted metrics bar component that displays pipeline throughput stats.
      Reuses the existing PipelineMetrics type from types/autonomy.ts.
    definition: |
      interface GlobalMetricsBarProps {
        metrics: PipelineMetrics
      }
      export default function GlobalMetricsBar({ metrics }: GlobalMetricsBarProps): JSX.Element
    location: web/src/components/GlobalMetricsBar.tsx

  - name: "OperationsPanel component"
    description: |
      Collapsible sidebar panel containing Queue, Daemon, and Autonomy controls.
      Extracted from PipelineView's right sidebar.
    definition: |
      interface OperationsPanelProps {
        onSelectItem?: (slug: string) => void
      }
      export default function OperationsPanel({ onSelectItem }: OperationsPanelProps): JSX.Element
    location: web/src/components/OperationsPanel.tsx

