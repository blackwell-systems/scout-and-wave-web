waves:
  - number: 1
    agents:
      - id: A
        task: |
          ## Agent A: Go Backend Interview API Handler

          **What to implement:**
          Create `pkg/api/interview_handler.go` with HTTP handlers that wrap the
          existing Go interview engine (`github.com/blackwell-systems/scout-and-wave-go/pkg/interview`).

          The interview engine is already imported by the web app (see go.mod replace directive).
          Use `interview.NewDeterministicManager(docsDir)` to create a manager, where docsDir
          is the repo's `docs/` directory.

          **Endpoints to implement:**

          1. `POST /api/interview/start` - Parse InterviewStartRequest JSON, call manager.Start(),
             save state, return InterviewStartResponse with session_id and slug.

          2. `GET /api/interview/{slug}` - Load interview doc from `docs/INTERVIEW-{slug}.yaml`
             via manager.Resume(), return InterviewStateResponse. Include requirements_preview
             (call `interview.PreviewRequirements(doc)`) when phase is "review" or "complete".

          3. `POST /api/interview/{slug}/answer` - Parse InterviewAnswerRequest, load doc via
             Resume, call manager.Answer(doc, answer), broadcast SSE events on phase change.
             Return updated InterviewStateResponse.

          4. `POST /api/interview/{slug}/resume` - Same as GET but uses Resume to reload from disk.
             Return InterviewStateResponse.

          5. `POST /api/interview/{slug}/compile` - Load complete interview, call manager.Compile()
             with output path `docs/REQUIREMENTS.md`, return InterviewCompileResponse with path
             and content. Broadcast "interview_complete" SSE event.

          6. `GET /api/interview/list` - Glob for `docs/INTERVIEW-*.yaml` in the repo path,
             return array of {slug, status, phase, progress, description, updated_at}.

          **SSE events (broadcast via s.globalBroker):**
          - `interview_phase_changed`: when phase advances after an answer
          - `interview_complete`: when compile succeeds

          Follow the pattern in scout.go for request parsing and response encoding.
          Use `s.getConfiguredRepos()` to resolve the repo path when `repo` is specified.

          **Server struct integration:** Add `interviewManagers sync.Map` field to cache
          manager instances per repo path. Do NOT modify server.go (that is Agent D's task).
          Instead, define handler methods on *Server and export a RegisterInterviewRoutes()
          method that Agent D will call.

          **Interface contracts (binding):**
          - InterviewStartRequest: {description string, slug string, repo string}
          - InterviewStartResponse: {session_id string, slug string}
          - InterviewAnswerRequest: {answer string}
          - InterviewStateResponse: {slug, status, phase, progress, phase_progress, question, history, requirements_preview}
          - InterviewCompileResponse: {requirements_path, content}

          **Tests:** Write `interview_handler_test.go` with table-driven tests:
          - TestHandleInterviewStart: valid request returns 202, invalid returns 400
          - TestHandleInterviewAnswer: submitting an answer advances state
          - TestHandleInterviewList: returns empty list when no interviews exist

          **Verification gate:**
          ```
          cd /Users/dayna.blackwell/code/scout-and-wave-web && go build ./cmd/saw && go test ./pkg/api/ -run TestHandleInterview
          ```

          **Constraints:**
          - Do NOT modify server.go (route registration is Agent D's job in wave 2)
          - Do NOT modify any frontend files
          - Use the existing SSE globalBroker pattern (see global_events.go)
          - Import interview package as: `"github.com/blackwell-systems/scout-and-wave-go/pkg/interview"`
        files:
          - pkg/api/interview_handler.go
          - pkg/api/interview_handler_test.go
        dependencies: []

      - id: B
        task: |
          ## Agent B: TypeScript Types and API Client

          **What to implement:**

          1. Create `web/src/types/interview.ts` with TypeScript interfaces mirroring
             the Go API response types:

          ```typescript
          export type InterviewPhase = 'overview' | 'scope' | 'requirements' | 'interfaces' | 'stories' | 'review' | 'complete'

          export interface InterviewQuestion {
            id: string
            phase: InterviewPhase
            field_name: string
            text: string
            hint?: string
            required: boolean
          }

          export interface InterviewTurn {
            turn_number: number
            phase: InterviewPhase
            question: string
            answer: string
          }

          export interface InterviewState {
            slug: string
            status: 'in_progress' | 'complete'
            phase: InterviewPhase
            progress: number
            phase_progress: string
            question?: InterviewQuestion
            history: InterviewTurn[]
            requirements_preview?: string
          }

          export interface InterviewListEntry {
            slug: string
            status: string
            phase: InterviewPhase
            progress: number
            description: string
            updated_at: string
          }
          ```

          2. Add `interview` namespace to `SawClient` interface in `web/src/lib/apiClient.ts`:

          ```typescript
          interview: {
            start(description: string, repo?: string): Promise<{ sessionId: string; slug: string }>
            get(slug: string): Promise<InterviewState>
            answer(slug: string, answer: string): Promise<InterviewState>
            resume(slug: string): Promise<InterviewState>
            compile(slug: string): Promise<{ requirementsPath: string; content: string }>
            list(): Promise<InterviewListEntry[]>
          }
          ```

          Add the HTTP transport implementation in `createHttpClient()`:
          - start: POST /api/interview/start with {description, repo}
          - get: GET /api/interview/{slug}
          - answer: POST /api/interview/{slug}/answer with {answer}
          - resume: POST /api/interview/{slug}/resume
          - compile: POST /api/interview/{slug}/compile
          - list: GET /api/interview/list

          Follow the existing patterns in apiClient.ts (use enc(), check(), checkShort()).

          **Verification gate:**
          ```
          cd /Users/dayna.blackwell/code/scout-and-wave-web/web && npx tsc --noEmit
          ```

          **Constraints:**
          - Do NOT modify App.tsx or any React components
          - Do NOT modify any Go files
          - Import types from '../types/interview' in apiClient.ts
          - Follow existing code style (no semicolons in type files, use `type` keyword for unions)
        files:
          - web/src/types/interview.ts
          - web/src/lib/apiClient.ts
        dependencies: []

      - id: C
        task: |
          ## Agent C: React Interview Panel Component

          **What to implement:**

          1. Create `web/src/hooks/useInterview.ts` - Custom hook managing interview state:
             - `startInterview(description, repo?)` - calls API, sets slug
             - `submitAnswer(answer)` - calls API, updates state
             - `resumeInterview(slug)` - loads existing interview
             - `compileRequirements()` - calls compile API
             - Tracks: currentState (InterviewState | null), loading, error
             - Listens to global SSE for `interview_phase_changed` and `interview_complete` events

          2. Create `web/src/components/InterviewPanel.tsx` - Full interview UI panel:

          **Layout (top to bottom):**
          - Phase progress bar: horizontal stepper showing 6 phases (overview, scope,
            requirements, interfaces, stories, review) with current phase highlighted.
            Use InterviewPhase type for phase names.
          - Current question display: shows question.text prominently, hint below in muted text,
            required badge if question.required is true
          - Answer input: textarea with placeholder, submit button. Support Enter to submit
            (Shift+Enter for newline). Show "back" button when cursor > 0.
          - Answer history panel: scrollable list of past Q&A turns grouped by phase,
            collapsible per phase. Most recent at top.
          - Requirements preview: when phase is "review" or "complete", render
            requirements_preview as markdown in a bordered panel.
          - Compile button: shown when status is "complete", calls compileRequirements()

          **Component API:**
          ```typescript
          interface InterviewPanelProps {
            initialDescription?: string
            repo?: string
            existingSlug?: string  // for resume
            onComplete?: (slug: string, requirementsPath: string) => void
            onClose?: () => void
          }
          ```

          **Styling:** Use the existing Tailwind classes from the project:
          - bg-card, border-border, text-foreground, text-muted-foreground
          - Follow patterns from ScoutLauncher.tsx and ChatPanel.tsx for panel layout

          **Phase progress indicator implementation:**
          ```
          const phases = ['overview', 'scope', 'requirements', 'interfaces', 'stories', 'review']
          ```
          Render as a horizontal bar with circles for each phase. Completed phases get
          a checkmark, current phase is highlighted, future phases are dimmed.

          **Important:** This component should be self-contained and renderable standalone.
          It will be integrated into LiveRail.tsx by Agent D in wave 2. Do NOT import
          from apiClient.ts directly - receive API functions via the useInterview hook.

          Define local types inline OR import from `../types/interview`. Since Agent B
          creates that file in parallel, define the types inline in this component as a
          fallback (Agent D will reconcile imports in wave 2 if needed). Preferred approach:
          import from `../types/interview` since the file path and type names are defined
          in the interface contract.

          **Verification gate:**
          ```
          cd /Users/dayna.blackwell/code/scout-and-wave-web/web && npx tsc --noEmit
          ```

          **Constraints:**
          - Do NOT modify App.tsx, LiveRail.tsx, or server.go
          - Do NOT modify apiClient.ts (Agent B owns that)
          - Use Tailwind utility classes, no CSS files
          - Keep the component under 400 lines
        files:
          - web/src/components/InterviewPanel.tsx
          - web/src/hooks/useInterview.ts
        dependencies: []

  - number: 2
    type: integration
    agents:
      - id: D
        task: |
          ## Agent D: Integration Wiring

          **What to implement:**
          Wire the interview feature into the existing app shell by modifying 3 files.

          **1. pkg/api/server.go** - Register interview routes:
          Add to the New() function, after the existing route registrations (near line 231,
          after the program routes block):
          ```go
          // Interview mode — requirements gathering
          s.RegisterInterviewRoutes()
          ```
          Agent A's interview_handler.go exports RegisterInterviewRoutes() on *Server.

          **2. web/src/App.tsx** - Add interview mode toggle:
          - Add state: `const [showInterview, setShowInterview] = useState(false)`
          - Add `liveView` type extension: interview panel shows in LiveRail when
            liveView === 'interview'
          - Add "Interview" button to AppHeader's onInterviewClick prop (or add to
            the command palette as an action)
          - When interview completes, optionally trigger a scout run with the generated
            REQUIREMENTS.md path as context

          **3. web/src/components/LiveRail.tsx** - Add interview panel rendering:
          - Import InterviewPanel from './InterviewPanel'
          - Add 'interview' to the LiveView type union
          - When liveView === 'interview', render InterviewPanel with appropriate props
          - Wire onComplete callback to trigger scout run or show success message

          **Integration pattern (follow existing patterns):**
          - LiveRail already handles 'scout', 'wave', 'planner' view types
          - Add 'interview' as a new LiveView variant following the same conditional pattern
          - InterviewPanel.onComplete should call onClose and optionally trigger scout

          **Verification gate:**
          ```
          cd /Users/dayna.blackwell/code/scout-and-wave-web && go build ./cmd/saw && cd web && npx tsc --noEmit
          ```

          **Constraints:**
          - Only modify the 3 files listed above
          - Follow existing patterns exactly (look at how 'planner' was added to LiveRail)
          - Do NOT modify interview_handler.go, apiClient.ts, or InterviewPanel.tsx
        files:
          - pkg/api/server.go
          - web/src/App.tsx
          - web/src/components/LiveRail.tsx
