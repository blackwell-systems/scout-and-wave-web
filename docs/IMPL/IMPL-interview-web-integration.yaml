          - B
          - C

pre_mortem:
  overall_risk: low
  rows:
    - scenario: "Agent C defines interview types inline that conflict with Agent B's types/interview.ts"
      likelihood: medium
      impact: low
      mitigation: "Interface contract specifies exact type names and shapes. Agent D reconciles imports in wave 2 if needed. TypeScript compiler catches mismatches."

    - scenario: "Go interview package API changes between scout and wave execution"
      likelihood: low
      impact: medium
      mitigation: "Interview package is stable and complete. The go.mod replace directive pins to local copy. No engine changes are part of this IMPL."

    - scenario: "SSE event names mismatch between Go handler and TypeScript consumer"
      likelihood: medium
      impact: low
      mitigation: "Event names are specified in interface contracts (interview_phase_changed, interview_complete). Agent D wires the consumer to match."

    - scenario: "RegisterInterviewRoutes method signature mismatch between Agent A definition and Agent D call"
      likelihood: low
      impact: low
      mitigation: "Contract specifies it as a method on *Server with no parameters, matching existing RegisterCriticRoutes pattern."
