title: "Interview Mode Web Integration"
feature_slug: interview-web-integration
verdict: SUITABLE
state: REVIEWED

suitability_assessment: |
  1. File decomposition: Work decomposes cleanly into 4 agents across 2 waves
     touching 8+ disjoint files across two repos (scout-and-wave-web backend
     and frontend). No file conflicts.

  2. Investigation-first: None. The Go engine interview package is complete and
     well-documented. All types and the Manager interface are stable.

  3. Interface discoverability: Yes. The interview.Manager interface is the
     contract. HTTP request/response types and SSE event shapes can be fully
     defined upfront.

  4. Pre-implementation status: The Go engine (scout-and-wave-go/pkg/interview/)
     is 100% complete with DeterministicManager, 6 phases, state persistence,
     resume, back-navigation, validation, and REQUIREMENTS.md compiler. This
     IMPL covers only the web layer (API + React frontend).

  5. Parallelization value: High. Wave 1 has 3 fully independent agents
     (backend API, TypeScript types + API client, React component). Build/test
     cycles are non-trivial (Go compile + npm build). Each agent owns 2-3 files.

  Estimated times:
  - Scout phase: ~8 min
  - Agent execution: ~12 min (3 agents in wave 1 parallel, 1 integration agent wave 2)
  - Merge and verification: ~4 min
  Total SAW time: ~24 min

  Sequential baseline: ~40 min (4 agents x 10 min avg)
  Time savings: ~16 min (40% faster)

  Recommendation: Clear speedup. Proceed.

