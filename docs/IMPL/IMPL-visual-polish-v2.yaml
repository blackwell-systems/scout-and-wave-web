          ## Task: Add Missing CSS Keyframes and Accessibility Guards

          **What to implement:**
          Add 7 missing keyframe definitions and utility classes to `web/src/index.css`:
          - `@keyframes fade-in-up` (entrance from below)
          - `@keyframes fade-in-down` (entrance from above)
          - `@keyframes fade-in-scale` (scale + fade entrance)
          - `@keyframes slide-in-left` (slide from left)
          - `@keyframes shimmer` (skeleton loading shimmer)
          - `@keyframes progress-stripe` (diagonal stripe animation)
          - `@keyframes count-pulse` (number pulse effect)

          Add utility classes:
          - `.stagger-1` through `.stagger-5` (animation-delay: 0.05s increments)
          - `.skeleton-shimmer` (shimmer effect for loading states)
          - `.focus-ring` (accessible focus indicator)

          **CRITICAL ACCESSIBILITY REQUIREMENT:**
          Wrap ALL animation utility classes in `@media (prefers-reduced-motion: no-preference)`.
          Users with `prefers-reduced-motion: reduce` must see static content with no animations.

          **What NOT to do:**
          - Do NOT modify existing orb animations (exec-jewel-fill, exec-node-pulse, etc.)
          - Do NOT change scrollbar styling
          - Do NOT modify theme color variables

          **Interface contracts:**
          Follow the exact keyframe definitions in the Interface Contracts section above.
          Other agents depend on these class names (.animate-fade-in-up, .animate-shimmer, etc.).

          **Tests:**
          Visual verification:
          1. Animations work in browsers with no motion preference set
          2. Animations are suppressed when `prefers-reduced-motion: reduce` is set
          3. All keyframes are valid CSS (no syntax errors)

          **Verification gate:**
          ```bash
          cd /Users/dayna.blackwell/code/scout-and-wave-web/web && \
          npx prettier --check src/index.css && \
          npm run build
          ```

          **Constraints:**
          - Use only transform and opacity properties (GPU-accelerated)
          - Keep animation durations under 500ms for snappy UX
          - All animations must have easing functions (ease-out, ease-in-out)
