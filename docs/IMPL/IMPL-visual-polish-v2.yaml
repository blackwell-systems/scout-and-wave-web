          The card appears to the right of the trigger element. A scale+fade animation
          is more polished than a horizontal slide (which can feel janky with the 400ms
          delay timer). This matches typical tooltip/popover entrance patterns.

          **What NOT to change:**
          - Hover delay logic (400ms setTimeout in handleMouseEnter)
          - Card content (status, waves, agents, suitability)
          - Entry row logic (delete modal, multi-repo grouping, etc.)

          **Tests:**
          Visual verification:
          1. Hover over IMPL entry → card appears after 400ms with scale+fade
          2. Move mouse away → card disappears immediately
          3. Animation plays smoothly without jank

          **Verification gate:**
          ```bash
          cd /Users/dayna.blackwell/code/scout-and-wave-web/web && \
          npx prettier --check src/components/ImplList.tsx && \
          npm run build
          ```
