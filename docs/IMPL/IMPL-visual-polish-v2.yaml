interface_contracts:
  - name: CSS Keyframe Definitions (index.css)
    description: Core animation keyframes consumed by all React components
    location: web/src/index.css
    definition: |
      /* Entrance animations */
      @keyframes fade-in-up {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes fade-in-down {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes fade-in-scale {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }
      @keyframes slide-in-left {
        from { transform: translateX(-100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }

      /* Visual effects */
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      @keyframes progress-stripe {
        0% { background-position: 0 0; }
        100% { background-position: 40px 0; }
      }
      @keyframes count-pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.7; transform: scale(1.05); }
      }

      /* Utility classes */
      .stagger-1 { animation-delay: 0.05s; }
      .stagger-2 { animation-delay: 0.10s; }
      .stagger-3 { animation-delay: 0.15s; }
      .stagger-4 { animation-delay: 0.20s; }
      .stagger-5 { animation-delay: 0.25s; }

      .skeleton-shimmer {
        background: linear-gradient(90deg, hsl(var(--muted)) 25%, hsl(var(--muted-foreground) / 0.1) 50%, hsl(var(--muted)) 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
      }

      .focus-ring {
        outline: 2px solid hsl(var(--ring));
        outline-offset: 2px;
      }

      /* CRITICAL: Wrap all animations in prefers-reduced-motion */
      @media (prefers-reduced-motion: no-preference) {
        .animate-fade-in-up { animation: fade-in-up 0.3s ease-out; }
        .animate-fade-in-down { animation: fade-in-down 0.3s ease-out; }
        .animate-fade-in-scale { animation: fade-in-scale 0.2s ease-out; }
        .animate-slide-in-left { animation: slide-in-left 0.3s ease-out; }
        .animate-shimmer { animation: shimmer 1.5s infinite; }
        .animate-progress-stripe { animation: progress-stripe 1s linear infinite; }
        .animate-count-pulse { animation: count-pulse 1.2s ease-in-out infinite; }
      }

  - name: Tailwind Animation Extensions
    description: Tailwind config for animation utilities
    location: web/tailwind.config.js
    definition: |
      // Add to theme.extend in tailwind.config.js:
      animation: {
        'fade-in-up': 'fade-in-up 0.3s ease-out',
        'fade-in-down': 'fade-in-down 0.3s ease-out',
        'fade-in-scale': 'fade-in-scale 0.2s ease-out',
        'slide-in-left': 'slide-in-left 0.3s ease-out',
        'shimmer': 'shimmer 1.5s infinite',
        'progress-stripe': 'progress-stripe 1s linear infinite',
        'count-pulse': 'count-pulse 1.2s ease-in-out infinite',
      },
      keyframes: {
        'fade-in-up': {
          from: { opacity: '0', transform: 'translateY(8px)' },
          to: { opacity: '1', transform: 'translateY(0)' },
        },
        'fade-in-down': {
          from: { opacity: '0', transform: 'translateY(-8px)' },
          to: { opacity: '1', transform: 'translateY(0)' },
        },
        'fade-in-scale': {
          from: { opacity: '0', transform: 'scale(0.95)' },
          to: { opacity: '1', transform: 'scale(1)' },
        },
        'slide-in-left': {
          from: { transform: 'translateX(-100%)', opacity: '0' },
          to: { transform: 'translateX(0)', opacity: '1' },
        },
        'shimmer': {
          '0%': { backgroundPosition: '-200% 0' },
          '100%': { backgroundPosition: '200% 0' },
        },
        'progress-stripe': {
          '0%': { backgroundPosition: '0 0' },
          '100%': { backgroundPosition: '40px 0' },
        },
        'count-pulse': {
          '0%, 100%': { opacity: '1', transform: 'scale(1)' },
          '50%': { opacity: '0.7', transform: 'scale(1.05)' },
        },
      }

  - name: Lucide React Icons
