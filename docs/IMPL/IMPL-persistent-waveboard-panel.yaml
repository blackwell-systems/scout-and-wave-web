title: "Make WaveBoard a persistent collapsed right panel on ReviewScreen"
feature_slug: persistent-waveboard-panel
verdict: SUITABLE_WITH_CAVEATS
state: REVIEWED

suitability_assessment: |
  1. File decomposition: 5 files change (AppLayout.tsx, App.tsx, ActionButtons.tsx,
     LiveRail.tsx, ReviewScreen.tsx). Disjoint ownership achievable with 3 agents across 2 waves.
  2. Investigation-first: No investigation needed. The collapse pattern already exists in
     OperationsPanel.tsx (40px collapsed strip with icon buttons). WaveBoard already supports
     compact={true} mode.
  3. Interface discoverability: Yes. The cross-agent interface is a small set of React props
     on AppLayout (rightPanelCollapsed, onToggleRightPanel, rightPanelCollapsedContent).
  4. Pre-implementation status: All changes are TODO. No prior attempts found.
  5. Parallelization value: Small feature (5 files, 3 agents). Build/test cycle is moderate
     (tsc + vitest ~15s). The coordination value is moderate — Wave 1 agents are independent
     and Wave 2 wires everything together. SAW overhead is justified by the clean separation
     between layout changes and state wiring.

  Caveat: App.tsx is large (~407 lines) and manages significant state. Agent C (Wave 2) must
  be careful to make targeted additions without disrupting existing liveView logic.

  Estimated times:
  - Scout phase: ~5 min
  - Agent execution: ~8 min (3 agents, Wave 1 parallel ~4 min, Wave 2 ~4 min)
  - Merge & verification: ~3 min
  Total SAW time: ~16 min
  Sequential baseline: ~15 min (3 agents x 5 min avg)
  Time savings: ~marginal (-1 min)
  Recommendation: Coordination value — clean separation of layout vs wiring concerns.

