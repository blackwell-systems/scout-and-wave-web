interface_contracts:
  - name: AppLayout collapsed right panel props
    description: |
      New optional props on AppLayout to support a collapsed right panel strip.
      When rightPanelCollapsed is true and rightPanelCollapsedContent is provided,
      AppLayout renders a 40px-wide strip instead of the full right panel.
      Clicking the strip calls onToggleRightPanel.
    definition: |
      // Added to AppLayoutProps interface in AppLayout.tsx:
      rightPanelCollapsed?: boolean
      onToggleRightPanel?: () => void
      rightPanelCollapsedContent?: React.ReactNode
    location: web/src/components/layout/AppLayout.tsx

  - name: ActionButtons waveBoardExpanded prop
    description: |
      The onViewWaves prop on ActionButtons changes semantics from "toggle
      visibility" to "toggle expand/collapse". The prop name stays the same
      for backward compatibility but the handler in App.tsx changes behavior.
      ActionButtons receives a new optional prop to control button label/icon.
    definition: |
      // ActionButtons receives a new optional prop:
      waveBoardExpanded?: boolean
      // No signature change to onViewWaves?: () => void
    location: web/src/components/ActionButtons.tsx

  - name: ReviewScreen waveBoardExpanded prop threading
    description: |
      ReviewScreen receives waveBoardExpanded from App.tsx and threads it
      to ActionButtons in the sticky footer.
    definition: |
      // Added to ReviewScreenProps:
      waveBoardExpanded?: boolean
    location: web/src/components/ReviewScreen.tsx

