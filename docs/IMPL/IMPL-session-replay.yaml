interface_contracts:
  - name: RecordedEvent
    description: "JSONL line format for recorded SSE events"
    definition: |
      // RecordedEvent is one line of the event-log.jsonl file.
      type RecordedEvent struct {
          TimestampMS int64       `json:"timestamp_ms"`
          EventType   string      `json:"event_type"`
          Data        interface{} `json:"data"`
      }
    location: "pkg/api/event_recorder.go"

  - name: EventRecorder
    description: "Interface for recording SSE events to JSONL during execution"
    definition: |
      // EventRecorder appends SSE events to a JSONL file.
      type EventRecorder struct {
          mu   sync.Mutex
          file *os.File
          enc  *json.Encoder
          t0   int64 // start time in unix ms
      }

      func NewEventRecorder(dir string) (*EventRecorder, error)
      func (r *EventRecorder) Record(eventType string, data interface{})
      func (r *EventRecorder) Close() error
    location: "pkg/api/event_recorder.go"

  - name: "handleGetReplayLog"
    description: "GET /api/replay/{slug} — returns the recorded JSONL event log"
    definition: |
      func (s *Server) handleGetReplayLog(w http.ResponseWriter, r *http.Request)
      // Returns Content-Type: application/x-ndjson
      // Body: one JSON object per line (RecordedEvent)
      // 404 if no event-log.jsonl exists for slug
    location: "pkg/api/replay_handler.go"

  - name: "handleGetReplayExport"
    description: "GET /api/replay/{slug}/export — returns self-contained HTML replay file"
    definition: |
      func (s *Server) handleGetReplayExport(w http.ResponseWriter, r *http.Request)
      // Returns Content-Type: text/html
      // Content-Disposition: attachment; filename="replay-{slug}.html"
      // Embeds event data + minimal React player as inline script
    location: "pkg/api/replay_handler.go"

  - name: "useReplayEvents"
    description: "React hook that replays recorded events through the waveEventsReducer"
    definition: |
      interface ReplayControls {
        playing: boolean
        speed: number        // 1, 2, 5, 10
        progress: number     // 0-1 fraction
        currentTimeMs: number
        totalTimeMs: number
        play: () => void
        pause: () => void
        setSpeed: (s: number) => void
        seek: (fraction: number) => void
      }

      function useReplayEvents(slug: string): {
        state: AppWaveState
        controls: ReplayControls
        loading: boolean
        error: string | null
      }
    location: "web/src/hooks/useReplayEvents.ts"

  - name: "ReplayBoard"
    description: "React component that renders WaveBoard in replay mode with playback controls"
    definition: |
      interface ReplayBoardProps {
        slug: string
      }
      function ReplayBoard(props: ReplayBoardProps): JSX.Element
    location: "web/src/components/ReplayBoard.tsx"

  - name: "fetchReplayLog"
    description: "API client function to fetch the JSONL replay log"
    definition: |
      async function fetchReplayLog(slug: string): Promise<RecordedEvent[]>
      // Fetches GET /api/replay/{slug}, parses NDJSON lines
    location: "web/src/lib/apiClient.ts"

