pre_mortem:
  overall_risk: low
  rows:
    - scenario: "Event log JSONL grows very large for long-running IMPLs (agent_output chunks)"
      likelihood: medium
      impact: low
      mitigation: "agent_output events contain small chunks (~200 bytes). A 5-agent IMPL with verbose output produces ~2-5MB JSONL. Acceptable for MVP. Future: add event filtering or compression."

    - scenario: "seek() performance degrades with many events (replaying from start on each seek)"
      likelihood: low
      impact: low
      mitigation: "Typical session has 50-200 events. Synchronous replay of 200 reducer calls is <10ms. If needed later, add snapshots at intervals."

    - scenario: "Stale disk state from previous runs creates confusing replay"
      likelihood: low
      impact: low
      mitigation: "NewEventRecorder truncates the file on each new run. Only the latest run is recorded."

    - scenario: "HTML export file size too large for sharing"
      likelihood: low
      impact: low
      mitigation: "Event data is compact JSON. The vanilla JS player adds ~5KB. Total export for typical session: 50-500KB. Acceptable."
